<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas · Account One</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Variables (B Claro) ─────────────────────────────────────────────── */
:root {
  --fg:#2A2B2D; --fg-mute:#6b7280; --display:#1f2630;
  --accent:#25AAE1; --accent-dk:#1B87B8;
  --green:#059669; --amber:#d97706; --red:#dc2626;
  --page-bg:#f8f9fb; --line:#eef0f3; --line-soft:#f3f4f6;
  --card-bg:#fff; --card-r:12px; --hover-bg:#f3f6f9;
  --side-bg:#fff; --side-fg:#2A2B2D; --side-mute:#8b8f96; --side-bdr:#eef0f3;
  --side-hover:#f3f6f9; --side-act:#eef8fd; --side-act-fg:#1B87B8;
  --mark-bg:#28368D; --mark-fg:#fff;
}
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:'Poppins',system-ui,sans-serif;font-size:14px;line-height:1.5;color:var(--fg);background:var(--page-bg);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit}
svg.ic{display:block;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
select{font-family:inherit}

/* ── Shell ────────────────────────────────────────────────────────────── */
.sh{display:flex;height:100%}
.side{width:252px;flex-shrink:0;display:flex;flex-direction:column;background:var(--side-bg);border-right:1px solid var(--side-bdr);overflow-y:auto;overflow-x:hidden}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* Sidebar brand */
.side-brand{display:flex;align-items:center;gap:10px;padding:20px 18px 18px}
.side-mark{width:34px;height:34px;border-radius:10px;background:var(--mark-bg);color:var(--mark-fg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.side-bname{font-size:14.5px;font-weight:700;color:var(--side-fg);letter-spacing:-0.01em}
.side-btag{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;color:var(--side-mute);margin-top:2px}

/* Sidebar nav */
.side-nav{flex:1;padding:2px 10px 16px;display:flex;flex-direction:column;gap:2px}
.nav-a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:var(--side-fg);text-decoration:none;position:relative;transition:background .14s}
.nav-a:hover{background:var(--side-hover)}
.nav-a.is-active{background:var(--side-act);color:var(--side-act-fg)}
.nav-a.is-active::before{content:'';position:absolute;left:-10px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-a .ic{opacity:.55}.nav-a:hover .ic{opacity:.75}.nav-a.is-active .ic{opacity:1;color:var(--side-act-fg)}
.nav-lbl{font-size:13px;font-weight:500;flex:1}
.nav-a.is-active .nav-lbl{font-weight:600}
.nav-sec{font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;font-weight:700;color:var(--side-mute);padding:20px 12px 6px}

/* Sidebar user */
.side-user{display:flex;align-items:center;gap:10px;padding:14px 18px;border-top:1px solid var(--side-bdr)}
.side-av{width:32px;height:32px;border-radius:50%;background:var(--mark-bg);color:var(--mark-fg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.side-uname{font-size:12.5px;font-weight:600;color:var(--side-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-urole{font-size:10.5px;color:var(--side-mute);margin-top:1px}
.side-uinfo{flex:1;min-width:0}
.side-ver{padding:0 20px 14px;font-size:10px;color:var(--side-mute);opacity:.65}

/* ── Topbar ───────────────────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:#fff;border-bottom:1px solid var(--line);min-height:52px;flex-shrink:0}
.top-trail{display:flex;align-items:center;gap:8px;font-size:13px}
.top-crumb{color:var(--fg-mute)}.top-sep{color:var(--fg-mute);opacity:.4;font-size:11px}.top-cur{color:var(--display);font-weight:600}
.top-right{display:flex;align-items:center;gap:12px}
.top-chip{font-size:12px;color:var(--fg-mute)}
.top-av{width:30px;height:30px;border-radius:50%;background:var(--mark-bg);color:var(--mark-fg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* ── Page area ────────────────────────────────────────────────────────── */
.page-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-head{padding:24px 28px 0;display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.page-eye{font-size:11px;text-transform:uppercase;letter-spacing:.14em;font-weight:600;color:var(--accent);margin-bottom:6px}
.page-h1{font-size:24px;font-weight:700;letter-spacing:-0.02em;color:var(--display);margin:0 0 2px;line-height:1.15}
.page-sub{font-size:13px;color:var(--fg-mute);margin:0}

/* ── Subtabs ──────────────────────────────────────────────────────────── */
.tabs-bar{display:flex;gap:2px;padding:0 28px;border-bottom:1px solid var(--line);flex-shrink:0}
.sub-tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--fg-mute);cursor:pointer;position:relative;margin-bottom:-1px;border-bottom:2px solid transparent;transition:color .12s,border-color .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.sub-tab:hover{color:var(--fg)}
.sub-tab.is-active{color:var(--display);border-bottom-color:var(--accent)}

/* ── Control bar ──────────────────────────────────────────────────────── */
.ctrl-bar{display:flex;align-items:center;gap:10px;padding:12px 28px;flex-shrink:0;flex-wrap:wrap;background:#fff;border-bottom:1px solid var(--line)}
.pills-wrap{display:flex;gap:4px;flex-wrap:wrap}
.wf-pill{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--fg-mute);background:transparent;cursor:pointer;transition:background .14s,color .14s}
.wf-pill:hover{background:var(--hover-bg);color:var(--fg)}
.wf-pill.is-active{background:var(--display);color:#fff}
.ctrl-sep{width:1px;height:20px;background:var(--line);flex-shrink:0}
.view-toggle{display:flex;background:#f1f3f5;border-radius:8px;padding:2px}
.vt-btn{padding:5px 12px;border-radius:6px;font-size:11.5px;font-weight:600;color:var(--fg-mute);transition:background .12s,color .12s,box-shadow .12s}
.vt-btn.is-active{background:#fff;color:var(--display);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.ctrl-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.ctrl-label{font-size:12px;color:var(--fg-mute);font-weight:500}
.mo-select{border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--fg);background:#fff;cursor:pointer;font-weight:500}
.mo-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,170,225,.12)}

/* ── Kanban ───────────────────────────────────────────────────────────── */
.kb-scroll{flex:1;overflow:auto;padding:20px 28px 40px}
.kb-scroll::-webkit-scrollbar{height:8px}.kb-scroll::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.kb-banner{margin-bottom:14px;font-size:12px;background:#fffbeb;color:#92400e;border:1px solid #fde68a;border-radius:10px;padding:8px 14px;font-weight:500}
.kb-board{display:flex;gap:10px;min-width:max-content;align-items:flex-start}
.kb-col{width:264px;flex-shrink:0;border-radius:var(--card-r);overflow:hidden;background:var(--line-soft);border:1px solid var(--line)}
.kb-col-head{padding:10px 14px;display:flex;align-items:center;gap:8px;background:#fff;border-bottom:1px solid var(--line);position:relative}
.kb-col-head::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.eq-contab .kb-col-head::before,.kb-col-head.eq-contab::before{background:#25AAE1}
.eq-impuestos .kb-col-head::before,.kb-col-head.eq-impuestos::before{background:#d97706}
.eq-cliente .kb-col-head::before,.kb-col-head.eq-cliente::before{background:var(--green)}
.eq-dgii .kb-col-head::before,.kb-col-head.eq-dgii::before{background:#6b7280}
.kb-col-head.eq-done::before{background:var(--green)}
.kb-col-num{font-size:11px;font-weight:700;color:var(--fg-mute);opacity:.5;flex-shrink:0;width:16px}
.kb-col-title{font-size:12.5px;font-weight:600;color:var(--display);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq-badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;white-space:nowrap}
.eq-badge-contab{background:#eef8fd;color:#1B87B8}
.eq-badge-impuestos{background:#fef3c7;color:#b45309}
.eq-badge-cliente{background:#ecfdf5;color:#047857}
.eq-badge-dgii{background:#f1f5f9;color:#475569}
.eq-badge-done{background:#ecfdf5;color:#047857}
.kb-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:360px}
.kb-col.kb-done{border-color:#bbf7d0}
.kb-done .kb-col-body{background:#f0fdf4}
.kb-empty{font-size:11px;color:#c4c8cd;text-align:center;padding:32px 0}

/* Handoff markers */
.kb-handoff{display:flex;align-items:stretch;justify-content:center;align-self:stretch;padding:0 4px;flex-shrink:0}
.kb-handoff-text{font-size:11px;color:#fff;background:#28368D;text-transform:uppercase;letter-spacing:.12em;font-weight:800;writing-mode:vertical-rl;padding:16px 9px;border-radius:9px;white-space:nowrap;box-shadow:0 2px 10px rgba(40,54,141,.4);position:sticky;top:14px;align-self:flex-start;max-height:calc(100vh - 250px)}

/* ── Cards ────────────────────────────────────────────────────────────── */
.kb-card{background:#fff;border-radius:10px;padding:12px 14px;cursor:pointer;border:1px solid var(--line);transition:box-shadow .15s,border-color .15s}
.kb-card:hover{box-shadow:0 2px 8px rgba(40,54,141,.07);border-color:#d1d5db}
.kb-card.is-selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,170,225,.14)}
.kb-card-done{border-color:#bbf7d0}
.kb-card-done:hover{border-color:#86efac}
.kb-card-name{font-size:13px;font-weight:600;color:var(--display);line-height:1.3}
.kb-card-meta{font-size:11px;color:var(--fg-mute);margin-top:2px}
.kb-prog{width:100%;height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:8px}
.kb-prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
.kb-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:6px}
.kb-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;line-height:1.4}
.kb-wait{background:#fef3c7;color:#92400e}.kb-block{background:#fee2e2;color:#991b1b}
.kb-card-counts{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--fg-mute);font-weight:500;margin-left:auto}
.kb-cm{display:inline-flex;align-items:center;gap:3px}
.kb-placeholder{color:var(--fg-mute);font-size:13px;padding:48px 28px;text-align:center}

/* ── Modal ────────────────────────────────────────────────────────────── */
.md-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.md-panel{background:#fff;border-radius:16px;width:100%;max-width:740px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(40,54,141,.15)}
.md-header{padding:18px 22px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.md-eye{font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:600;color:var(--fg-mute);margin-bottom:4px}
.md-title{font-size:18px;font-weight:700;color:var(--display);margin:0;letter-spacing:-0.01em}
.md-sub{font-size:12px;color:var(--fg-mute);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.md-sub b{color:var(--fg);font-weight:600}
.md-close{font-size:22px;color:var(--fg-mute);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;flex-shrink:0;line-height:1}
.md-close:hover{background:var(--hover-bg);color:var(--fg)}
.md-body{flex:1;overflow:hidden;display:flex}
.md-left{width:55%;overflow-y:auto;padding:18px 20px;border-right:1px solid var(--line)}
.md-right{width:45%;overflow-y:auto;padding:18px 20px;background:var(--page-bg)}

/* Checklist */
.chk-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--fg-mute);margin:16px 0 8px}
.chk-team{display:flex;align-items:center;gap:7px;font-size:11px}
.chk-team-contab{color:#1B87B8}.chk-team-impuestos{color:#b45309}.chk-team-cliente{color:#047857}
.chk-divider{border-top:2px solid var(--line);margin:14px 0 2px}
.chk-section:first-child{margin-top:0}
.chk-stage{margin-bottom:10px}
.chk-stage-head{font-size:12px;font-weight:600;color:var(--fg-mute);display:flex;align-items:center;gap:6px;margin-bottom:4px}
.team-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.td-contab{background:#25AAE1}.td-impuestos{background:#d97706}.td-cliente{background:var(--green)}.td-dgii{background:#6b7280}
.chk-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px}
.chk-input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.chk-input:disabled{accent-color:#c4c8cd;cursor:default}
.chk-label{flex:1;line-height:1.35}
.chk-label.is-done{color:var(--fg-mute);text-decoration:line-through}
.chk-label.is-other{color:var(--fg-mute)}
.chk-date{font-size:10px;color:var(--fg-mute);flex-shrink:0}
.chk-hint{font-size:11px;color:var(--fg-mute);margin-top:8px;line-height:1.4;opacity:.7}
.chk-pagado{font-size:12px;font-weight:600;color:#047857;background:#d1fae5;border-radius:8px;padding:7px 11px;margin-top:10px}

/* Estado buttons */
.est-row{display:flex;gap:8px;margin-top:4px}
.est-btn{flex:1;font-size:12px;font-weight:600;padding:8px;border-radius:8px;transition:background .12s,color .12s}
.est-wait{background:#fef9ee;color:var(--amber)}
.est-wait.is-active{background:#fde68a;color:#78350f}
.est-block{background:#fef2f2;color:var(--red)}
.est-block.is-active{background:#fecaca;color:#7f1d1d}
.bloq-box{margin-top:10px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px}
.bloq-box textarea{width:100%;border:1px solid #fecaca;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical}
.bloq-box textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.bloq-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.bloq-cancel{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;font-weight:500}
.bloq-confirm{font-size:12px;padding:6px 12px;border-radius:8px;background:var(--red);color:#fff;font-weight:600}

/* Comments */
.cm-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--fg-mute);margin-bottom:10px}
.cm-pinned{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.cm-pinned-head{font-size:10px;font-weight:700;color:#991b1b;margin-bottom:2px}
.cm-pinned-text{font-size:13px;color:#7f1d1d}
.cm-pinned-meta{font-size:10px;color:#b45309;margin-top:4px}
.cm-input-row{display:flex;gap:8px;margin-bottom:14px}
.cm-input{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px;font-family:inherit;background:#fff}
.cm-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,170,225,.12)}
.cm-send{background:var(--display);color:#fff;padding:0 14px;border-radius:10px;font-size:14px;display:flex;align-items:center;transition:background .12s}
.cm-send:hover{background:#2d3748}
.cm-item{display:flex;gap:8px;margin-bottom:12px}
.cm-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.cm-av.eq-contab{background:#25AAE1}.cm-av.eq-impuestos{background:#d97706}.cm-av.eq-cliente{background:var(--green)}.cm-av.eq-dgii{background:#6b7280}
.cm-body{flex:1;min-width:0}
.cm-bubble{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px}
.cm-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:2px}
.cm-head b{font-size:12.5px;color:var(--display)}
.cm-time{font-size:10px;color:var(--fg-mute);flex-shrink:0}
.cm-actions{display:flex;gap:10px;margin-top:4px}
.cm-act{font-size:10px;color:var(--fg-mute);cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
.cm-act:hover{color:var(--fg)}
.cm-act-del:hover{color:var(--red)}
.cm-empty{font-size:13px;color:var(--fg-mute)}

/* Edit textarea in comments */
.cm-edit{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical}
.cm-edit:focus{outline:none;border-color:var(--accent)}
.cm-edit-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
/* ── M3: Lista / Cronograma / Vistas ──────────────────────────────────── */
.mo-select-on{border-color:var(--accent);color:var(--side-act-fg);font-weight:600}
.lst-wrap,.cal-wrap{max-width:1040px}
.lst{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.lst thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-mute);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--line-soft)}
.lst td{padding:11px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
.lst tbody tr:last-child td{border-bottom:none}
.lst-row{cursor:pointer;transition:background .12s}
.lst-row:hover{background:var(--hover-bg)}
.lst-cli{font-weight:600;color:var(--display)}
.lst-mut{color:var(--fg-mute)}
.prog{display:inline-block;width:84px;height:6px;border-radius:3px;background:var(--line);overflow:hidden;vertical-align:middle}
.prog-bar{display:block;height:100%;background:var(--accent);border-radius:3px}
.lst-pct{font-size:11px;color:var(--fg-mute);margin-left:8px}
.lst-late{color:var(--red);font-weight:600}.lst-soon{color:var(--amber);font-weight:600}.lst-ok{color:var(--green);font-weight:700}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.chip-amber{background:#fef3c7;color:#92400e}.chip-red{background:#fee2e2;color:#991b1b}.chip-wf{background:var(--side-act);color:var(--side-act-fg)}
.eq-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
.eq-dot.eq-contab{background:#25AAE1}.eq-dot.eq-impuestos{background:#d97706}.eq-dot.eq-cliente{background:#059669}.eq-dot.eq-dgii{background:#64748b}
.vista-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.vista-title{font-size:18px;font-weight:700;color:var(--display);margin:0;letter-spacing:-0.01em}
.vista-count{font-size:12px;color:var(--fg-mute)}
.cal-sub{font-size:12.5px;color:var(--fg-mute);margin-bottom:16px}
.cal-row{display:flex;gap:14px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.cal-row.cal-late{border-left-color:var(--red)}.cal-row.cal-soon{border-left-color:var(--amber)}.cal-row.cal-ok{border-left-color:var(--green)}
.cal-date{text-align:center;min-width:48px}
.cal-day{font-size:23px;font-weight:700;color:var(--display);line-height:1}
.cal-mon{font-size:11px;text-transform:uppercase;color:var(--fg-mute);margin-top:2px}
.cal-wf{font-weight:600;color:var(--display);margin-bottom:5px;font-size:14px}
.cal-state{font-size:11px;font-weight:600;color:var(--fg-mute);margin-left:8px;text-transform:uppercase;letter-spacing:.04em}
.cal-pend{font-size:12.5px;color:var(--fg-mute);line-height:1.9}
.cal-cli{font-size:12px;font-weight:600;color:var(--side-act-fg);background:var(--side-act);border-radius:6px;padding:3px 9px;margin:0 5px 4px 0;display:inline-block;cursor:pointer}
.cal-cli:hover{filter:brightness(.96)}
/* equipo backgrounds */
.eq-bg-contab{background:#25AAE1}.eq-bg-impuestos{background:#d97706}.eq-bg-cliente{background:#059669}.eq-bg-dgii{background:#64748b}
/* Matriz */
.mx-wrap{max-width:100%;overflow-x:auto}
.mx{border-collapse:separate;border-spacing:0;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.mx th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-mute);font-weight:700;padding:11px 12px;background:var(--line-soft);border-bottom:1px solid var(--line);text-align:center}
.mx th.mx-cli-h{text-align:left}
.mx td{padding:8px 10px;border-bottom:1px solid var(--line-soft);text-align:center}
.mx tbody tr:last-child td{border-bottom:none}
.mx-cli{text-align:left;font-weight:600;color:var(--display);white-space:nowrap}
.mx-sub{font-size:11px;color:var(--fg-mute);font-weight:400;margin-top:1px}
.mx-cell{cursor:pointer}
.mx-cell:hover{background:var(--hover-bg)}
.mx-pill{display:inline-flex;align-items:center;justify-content:center;min-width:40px;padding:3px 8px;border-radius:7px;color:#fff;font-size:11px;font-weight:700;opacity:.94}
.mx-done{background:var(--green)}
.mx-flag{margin-left:5px;font-size:11px;vertical-align:middle}
.mx-late{color:var(--red)}.mx-soon{color:var(--amber)}
/* Gantt */
.gt-wrap{max-width:1060px}
.gt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.gt-title{font-size:16px;font-weight:700;color:var(--display)}
.gt-legend{display:flex;gap:14px;font-size:11px;color:var(--fg-mute)}
.gt-lg{display:flex;align-items:center;gap:5px}
.gt-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.gt-row{display:flex;align-items:center;gap:12px;padding:9px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff;transition:background .12s}
.gt-row:hover{background:var(--hover-bg)}
.gt-row-late{border-left:3px solid var(--red)}
.gt-name{width:160px;flex-shrink:0;font-weight:600;color:var(--display);font-size:13px}
.gt-sub{font-size:11px;color:var(--fg-mute);font-weight:400;margin-top:1px}
.gt-track{flex:1;display:flex;gap:3px;height:20px}
.gt-seg{flex:1;border-radius:3px}
.gt-done{opacity:1}
.gt-cur{opacity:1;outline:2px solid var(--display);outline-offset:-2px}
.gt-pend{opacity:.2}
.gt-status{width:96px;flex-shrink:0;text-align:right;font-size:12px}
/* Gantt-calendario */
.gc-wrap{min-width:720px}
.gc-sub{font-size:12.5px;color:var(--fg-mute);margin-bottom:14px}
.gc-head{display:flex;align-items:stretch;margin-bottom:2px}
.gc-gutter{width:128px;flex-shrink:0}
.gc-axis{flex:1;display:flex;border-bottom:1px solid var(--line)}
.gc-day{flex:1;text-align:center;font-size:9.5px;color:var(--fg-mute);padding:3px 0;border-left:1px solid var(--line-soft);white-space:nowrap;overflow:hidden}
.gc-we{background:var(--line-soft)}
.gc-today{background:#e0f2fb;color:var(--accent-dk);font-weight:700}
.gc-row{display:flex;align-items:center;height:42px;border-bottom:1px solid var(--line-soft);cursor:pointer}
.gc-row:hover{background:var(--hover-bg)}
.gc-row-lbl{font-size:13px;font-weight:600;color:var(--display);padding-right:8px}
.gc-row-sub{display:block;font-size:10px;color:var(--fg-mute);font-weight:400}
.gc-track{flex:1;position:relative;height:100%;border-left:1px solid var(--line-soft)}
.gc-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);opacity:.45;z-index:1}
.gc-bar{position:absolute;top:10px;height:22px;border-radius:6px;display:flex;align-items:center;padding:0 9px;color:#fff;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.12);z-index:2}
.gc-bar-ok{background:var(--accent)}.gc-bar-soon{background:var(--amber)}.gc-bar-late{background:var(--red)}
/* Lista estilo Asana */
.as-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;justify-content:flex-end}
.as-tb-lbl{font-size:12px;color:var(--fg-mute)}
.as-sel{border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--fg);background:#fff;cursor:pointer;font-weight:500}
.as-sel:focus{outline:none;border-color:var(--accent)}
.as-list{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.as-head,.as-row{display:grid;grid-template-columns:minmax(220px,2.2fr) 1.3fr .9fr 1.4fr 1fr;align-items:center;gap:12px;padding:10px 16px}
.as-head{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-mute);font-weight:700;border-bottom:1px solid var(--line);background:var(--line-soft)}
.as-grp-head{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--line-soft);background:#fcfcfd}
.as-grp-head:hover{background:var(--hover-bg)}
.as-caret{font-size:10px;color:var(--fg-mute);width:12px}
.as-grp-name{font-weight:700;color:var(--display);font-size:13px}
.as-grp-count{font-size:11px;color:var(--fg-mute);background:var(--line);border-radius:10px;padding:1px 8px}
.as-row{border-bottom:1px solid var(--line-soft);cursor:pointer;font-size:13px;transition:background .12s}
.as-row:hover{background:var(--hover-bg)}
.as-col-name{display:flex;align-items:center;gap:8px;color:var(--display);min-width:0}
.as-col-name b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.as-check{color:var(--line);font-size:14px;flex-shrink:0}
.as-wf{font-size:11px;color:var(--fg-mute);font-weight:500}
.as-col-asg{display:flex;align-items:center;gap:8px;color:var(--fg-mute);min-width:0}
.as-av{width:24px;height:24px;border-radius:50%;background:var(--mark-bg);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.as-tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.as-eqt-contab{background:#e0f2fb;color:#1B87B8}.as-eqt-impuestos{background:#fef3c7;color:#b45309}.as-eqt-cliente{background:#d1fae5;color:#047857}.as-eqt-dgii{background:#e2e8f0;color:#475569}
.as-tag-green{background:#d1fae5;color:#047857}.as-tag-red{background:#fee2e2;color:#b91c1c}.as-tag-amber{background:#fef3c7;color:#b45309}.as-tag-gray{background:#f1f5f9;color:#64748b}
.as-stage{font-size:11px;color:var(--fg-mute);margin-left:6px}
/* Comentarios: avatar + tag de departamento */
.cm-av.eq-admin{background:#28368D}.cm-av.eq-implementacion{background:#059669}.cm-av.eq-comercial{background:#7c3aed}.cm-av.eq-equipo{background:#64748b}
.cm-who{display:flex;align-items:center;min-width:0}
.cm-dept{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:1px 6px;border-radius:5px;margin-left:6px;white-space:nowrap}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#1f2630;color:#fff;font-size:13px;font-weight:500;padding:10px 18px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:100;max-width:92vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.toast-err{background:#b91c1c}
.mo-refresh{border:1px solid var(--line);border-radius:8px;width:30px;height:30px;font-size:15px;color:var(--fg-mute);background:#fff;cursor:pointer;flex-shrink:0}
.mo-refresh:hover{background:var(--hover-bg);color:var(--accent-dk)}
/* M4 · Tablero libre */
.tl-board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;padding-bottom:8px}
.tl-col{width:280px;flex-shrink:0;background:var(--line-soft);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 230px)}
.tl-col-head{display:flex;align-items:center;gap:6px;padding:10px 12px 6px}
.tl-col-grip{cursor:grab;color:var(--fg-mute);opacity:.45;font-size:13px;line-height:1;flex-shrink:0;user-select:none}
.tl-col-grip:hover{opacity:.9}
.tl-col-grip:active{cursor:grabbing}
.tl-col-title{flex:1;border:1px solid transparent;border-radius:6px;padding:3px 6px;font-size:13px;font-weight:700;color:var(--display);background:transparent;font-family:inherit}
.tl-col-title:hover{border-color:var(--line)}.tl-col-title:focus{outline:none;border-color:var(--accent);background:#fff}
.tl-col-count{font-size:11px;color:var(--fg-mute);background:var(--line);border-radius:10px;padding:1px 7px}
.tl-col-del{color:var(--fg-mute);font-size:16px;line-height:1;width:20px;border-radius:6px}
.tl-col-del:hover{background:#fee2e2;color:#b91c1c}
.tl-col-body{flex:1;overflow-y:auto;padding:4px 8px;display:flex;flex-direction:column;gap:7px;min-height:40px}
.tl-empty{text-align:center;color:var(--line);font-size:12px;padding:8px}
.tl-card{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.tl-card:hover{border-color:var(--accent)}
.tl-card-title{font-size:13px;color:var(--display);line-height:1.35}
.tl-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px}
.tl-etq{font-size:10px;font-weight:700;padding:1px 8px;border-radius:20px}
.tl-card-etqs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tl-etq2{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.lm-etq-pick{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.lm-etq-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.lm-etq-tag{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 4px 2px 9px;border-radius:14px}
.lm-etq-x{border:none;background:none;color:inherit;cursor:pointer;font-size:14px;line-height:1;padding:0 3px;opacity:.7}
.lm-etq-x:hover{opacity:1}
.lm-etq-row{display:flex;gap:8px;align-items:center}
.lm-etq-row .lm-sel{flex:1}
.lm-etq-chip{font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:14px;border:1px solid;background:#fff;cursor:pointer}
.lm-etq-addbtn{font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:14px;border:1px dashed var(--line);background:#fff;color:var(--fg-mute);cursor:pointer}
.lm-etq-addbtn:hover{border-color:var(--accent);color:var(--accent)}
.lm-etq-form{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.lm-etq-input{flex:1;min-width:140px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff}
.lm-etq-input:focus{outline:none;border-color:var(--accent)}
.lm-etq-sws{display:flex;gap:5px}
.lm-etq-sw{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0}
.lm-etq-sw.on{border-color:#1e293b;box-shadow:0 0 0 1px #fff inset}
.lm-etq-create{border:none;background:var(--accent);color:#fff;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer}
.etq-contab{background:#e0f2fb;color:#1B87B8}.etq-imp{background:#fef3c7;color:#b45309}.etq-impl{background:#d1fae5;color:#047857}.etq-com{background:#ede9fe;color:#6d28d9}.etq-adm{background:#e8eaf6;color:#28368D}
.etq-importante{background:#fee2e2;color:#b91c1c}.etq-urgente{background:#ffedd5;color:#c2410c}.etq-nourg{background:#f1f5f9;color:#475569}.etq-noimp{background:#f8fafc;color:#94a3b8}
.tl-cli{font-size:11px;font-weight:600;color:#1B87B8;background:#e0f2fb;border-radius:6px;padding:1px 7px}
.tl-due{font-size:11px;color:var(--fg-mute);font-weight:600}.tl-due-late{color:#b91c1c}
.tl-av{width:22px;height:22px;border-radius:50%;background:var(--mark-bg);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-left:auto}
.tl-add-btn{margin:4px 8px 10px;border:1px solid transparent;border-radius:7px;padding:7px 10px;font-size:12.5px;font-weight:600;color:var(--fg-mute);background:transparent;cursor:pointer;text-align:left}
.tl-add-btn:hover{background:#fff;border-color:var(--line);color:var(--accent-dk)}
/* modal tarea libre */
.lm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px}
.lm-modal{background:#fff;border-radius:16px;width:100%;max-width:540px;max-height:88vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.lm-head{display:flex;align-items:flex-start;gap:10px;padding:16px 18px 8px}
.lm-title{flex:1;border:1px solid transparent;border-radius:8px;padding:6px 8px;font-size:17px;font-weight:700;color:var(--display);font-family:inherit}
.lm-title:hover{border-color:var(--line)}.lm-title:focus{outline:none;border-color:var(--accent)}
.lm-x{font-size:24px;color:var(--fg-mute);line-height:1}
.lm-body{padding:4px 18px 8px}
.lm-modal.lm-wide{max-width:880px}
.lm-rich-tb{display:flex;gap:6px;margin-bottom:6px}
.lm-rich-btn{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:28px;border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px 8px;font-size:13px;cursor:pointer;color:var(--fg)}
.lm-rich-btn svg{display:block}
.lm-rich-btn:hover{background:#f3f4f6}
.lm-rich{min-height:96px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--fg);background:#fff;overflow:auto;line-height:1.45}
.lm-rich:focus{outline:none;border-color:var(--accent)}
.lm-rich:empty:before{content:attr(data-ph);color:#9aa3af}
.lm-rich ul,.lm-rich ol{margin:4px 0 4px 20px;padding:0}
.lm-desc-save{margin:8px 0 2px;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer}
.lm-desc-save:hover{filter:brightness(.95)}
.lm-link-row{display:flex;align-items:center;gap:8px}
.lm-link-row .lm-sel{flex:1}
.lm-link-open{flex-shrink:0;font-size:12px;font-weight:600;color:#fff;background:var(--accent);border-radius:8px;padding:7px 12px;text-decoration:none;white-space:nowrap}
.lm-link-open:hover{filter:brightness(.95)}
/* Campana de menciones */
.notif-wrap{position:relative;display:inline-flex}
.notif-bell{position:relative;border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 8px;font-size:15px;line-height:1;cursor:pointer}
.notif-bell:hover{background:#f3f4f6}
.notif-badge{position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;border-radius:9px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.notif-backdrop{position:fixed;inset:0;z-index:40}
.notif-drop{position:absolute;top:calc(100% + 6px);right:0;width:320px;max-height:70vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.18);z-index:41}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px}
.notif-readall{border:none;background:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer}
.notif-empty{padding:18px 14px;text-align:center;color:var(--fg-mute);font-size:13px}
.notif-item{padding:10px 14px;border-bottom:1px solid #f1f2f5;cursor:pointer}
.notif-item:hover{background:#f8fafc}
.notif-item.unread{background:#eff6ff}
.notif-item.unread:hover{background:#e6effd}
.notif-it-top{font-size:13px;color:var(--fg);margin-bottom:2px}
.notif-it-txt{font-size:12px;color:var(--fg-mute);margin-bottom:3px}
.notif-it-time{font-size:11px;color:var(--fg-mute)}
/* Autocomplete de @ */
.cm-input-wrap{position:relative}
.cm-mention{position:absolute;bottom:calc(100% + 4px);left:0;min-width:180px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:30;overflow:hidden}
.cm-mention-it{padding:7px 12px;font-size:13px;cursor:pointer;color:var(--fg)}
.cm-mention-it:hover{background:var(--accent);color:#fff}
.lm-body-2col{display:flex;align-items:stretch;flex-wrap:wrap;padding:0}
.lm-body-2col .lm-main{flex:1.5;min-width:300px;padding:4px 18px 12px}
.lm-body-2col .lm-side{flex:1;min-width:270px;border-left:1px solid var(--line);padding:8px 16px 12px;background:#fcfcfd}
/* Checklist estilo Trello */
.lm-chk{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
.lm-chk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lm-chk-count{font-size:11px;font-weight:700;color:var(--fg-mute);background:#eef1f6;border-radius:10px;padding:2px 8px}
.lm-chk-bar{height:7px;background:#eef1f6;border-radius:4px;overflow:hidden;margin-bottom:10px}
.lm-chk-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .2s}
.lm-chk-item{display:flex;align-items:center;gap:8px;padding:4px 0}
.lm-chk-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.lm-chk-txt{flex:1;font-size:13px;color:var(--fg)}
.lm-chk-txt.done{text-decoration:line-through;color:var(--fg-mute)}
.lm-chk-del{border:none;background:none;color:var(--fg-mute);font-size:17px;line-height:1;cursor:pointer;padding:0 4px;opacity:.5}
.lm-chk-del:hover{opacity:1;color:#dc2626}
.lm-chk-add{display:flex;gap:6px;margin-top:8px}
.lm-chk-input{flex:1;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff}
.lm-chk-input:focus{outline:none;border-color:var(--accent)}
.lm-chk-addbtn{border:none;background:var(--accent);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
.tl-chk-badge{font-size:10.5px;font-weight:700;color:var(--fg-mute);background:#eef1f6;border-radius:6px;padding:1px 6px}
.tl-chk-badge.tl-chk-done{color:#15803d;background:#dcfce7}
.lm-lbl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-mute);font-weight:700;margin:10px 0 4px}
/* PROTOTIPO · Tareas Checklist */
.tc-pills{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 16px}
.tc-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;font-family:inherit;color:var(--fg)}
.tc-pill:hover{border-color:var(--pc)}
.tc-pill.is-on{border-color:var(--pc);box-shadow:inset 0 0 0 1px var(--pc)}
.tc-pill-n{font-size:18px;font-weight:800;color:var(--pc);line-height:1}
.tc-pill-l{font-size:12px;font-weight:600}
.tc-table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
.tc-table{width:100%;border-collapse:collapse;font-size:13px}
.tc-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-mute);font-weight:700;padding:9px 14px;border-bottom:2px solid var(--line);background:#fafbfc}
.tc-table td{padding:9px 14px;border-bottom:1px solid var(--line)}
.tc-row{cursor:pointer}

async function loadAll(){

    const {data:{user}}=await sb.auth.getUser();

  }catch(e){}

  if(!CLIENTES.length) CLIENTES=SEED_CLIENTES.slice();
  // Equipo desde la maestra (nombres reales + activo) — no hardcodeado
  try{const {data}=await sb.from('equipo').select('nombre,rol_portal,excluida_contadoras').eq('activo',true);if(data&&data.length){
    const cont=[...new Set(data.filter(e=>e.rol_portal==='contadora'&&e.excluida_contadoras!==true).map(e=>e.nombre).filter(Boolean))].sort((a,b)=>a.localeCompare(b));

// ── Derivation ────────────────────────────────────────────────────────
function contadoraDe(cli){const c=CLIENTES.find(x=>x.nombre===cli);return c?c.contadora:'Sin asignar';}
// esMio = lo que valida la RLS de checklist_contadores: profiles.nombre ILIKE contadora||'%'
// (el nombre del usuario EMPIEZA con el de la contadora). Anclado al inicio → sin falsos
// positivos por substring (antes "Ana" calzaba con "Mariana").
function esMio(c){if(!USER.nombre||!c.contadora)return false;const a=c.contadora.trim().toLowerCase(),u=USER.nombre.trim().toLowerCase();return !!a&&(u===a||u.startsWith(a+' ')||u.startsWith(a));}
// Rol del equipo de impuestos: tolera ambos vocabularios (analista viejo / impuestos nuevo).
function esImpuestos(){const r=(USER.rol||'').toLowerCase();return r==='analista'||r==='impuestos';}
function puedeMarcar(cli,origen){
  if(USER.rol==='admin')return true;
  if(!USER.id)return !DB_OK;                                    // demo local sin sesión
  if(origen==='contadores')return esMio({contadora:contadoraDe(cli)}); // por nombre = igual que la RLS (no por rol)
  if(origen==='impuestos')return esImpuestos();
  return false;
}
function tareaFecha(cli,wfId,tk){if(tk.checklist_origen==='contadores'){const d=CONTAB_DATA[contadoraDe(cli)+'_'+cli+'_'+MES];if(!d)return null;const it=d.datos&&d.datos[tk.tarea_id];return(it&&(it.done===true||it.done==='na'))?(it.fecha||'✓'):null;}else{const r=IMP_MAP[cli+'||'+MES+'||'+wfId];if(!r)return null;const it=r.datos&&r.datos[tk.tarea_id];return(it&&(it.done===true||it.done==='na'))?(it.fecha||'✓'):null;}}
function tareaPor(cli,wfId,tk){const d=tk.checklist_origen==='contadores'?CONTAB_DATA[contadoraDe(cli)+'_'+cli+'_'+MES]:IMP_MAP[cli+'||'+MES+'||'+wfId];const it=d&&d.datos&&d.datos[tk.tarea_id];return(it&&it.por)||'';}
// El PAGO manda: si la tarea de pago final está hecha, el trabajo cuenta como
// completado aunque queden tareas sin marcar (ya se pagó — no hay nada más que hacer).
const PAGO_FINAL_IDS=['pagado','anticipo_pagado'];
function jobState(cli,wfId){const etapas=WF.etapas[wfId]||[];let totalDone=0,totalTasks=0,pagado=false;const doneMap={};etapas.forEach(e=>{const tks=WF.tareas[e.id]||[];let ed=0;tks.forEach(tk=>{totalTasks++;const f=tareaFecha(cli,wfId,tk);if(f){ed++;totalDone++;(doneMap[e.id]=doneMap[e.id]||{})[tk.tarea_id]=f;if(PAGO_FINAL_IDS.includes(tk.tarea_id))pagado=true;}});e._done=ed;e._total=tks.length;});let idx=etapas.findIndex(e=>e._done<e._total);if(idx===-1||pagado)idx=etapas.length;return{etapas,idx,totalDone,totalTasks,doneMap,pagado};}
function jkey(cli){return cli+'||'+MES+'||'+ANIO+'||'+TAX;}

// ── M3: vencimientos, vistas guardadas, lista, cronograma ──
function jkeyW(cli,wf){return cli+'||'+MES+'||'+ANIO+'||'+wf;}
function hoyMid(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function venceInfo(wf){
  const mi=MESES.indexOf(MES);let due=null;
  if(wf==='TSS')due=CAL_TSS[mi];
  else if(CALKEY[wf]&&CAL_DGII[mi])due=CAL_DGII[mi][CALKEY[wf]];
  if(!due)return{date:null,diff:0,overdue:false,soon:false,none:true};
  const dy=due.m<mi?ANIO+1:ANIO;const date=new Date(dy,due.m,due.d);
  const diff=Math.round((date-hoyMid())/86400000);
  return{date,diff,overdue:diff<0,soon:diff>=0&&diff<=3,none:false};
}
function fmtDia(d){return d.toLocaleDateString('es-DO',{day:'numeric',month:'short'});}
function etapaEsMia(cli,et){const tks=WF.tareas[et.id]||[];return tks.length?puedeMarcar(cli,tks[0].checklist_origen):false;}
function pasaVista(cli,wf){
  const st=jobState(cli,wf),completo=st.idx>=st.etapas.length,stat=ESTADO[jkeyW(cli,wf)],vi=venceInfo(wf);
  switch(VISTA){
    case 'esperando':return stat==='esperando';
    case 'bloqueados':return stat==='bloqueado';
    case 'atrasados':return !completo&&vi.overdue;
    case 'vencen':return !completo&&vi.soon;
    case 'midia':return !completo&&(USER.rol==='admin'||esMio({contadora:contadoraDe(cli)}))&&etapaEsMia(cli,st.etapas[st.idx]);
    default:return true;
  }
}
// Filtro de admin: lista CURADA del equipo (la data cruda tiene duplicados e
// inactivas — ej. "Karina"/"Karina Sánchez", Taína — hasta que se limpie la maestra).
// Se cargan de la tabla `equipo` (fuente real, con nombres correctos y activo/inactivo).
// Estos valores son solo respaldo si la tabla no carga.
let EQ_CONTADORAS=['Beliani','Morelia','Victoria','Yessica'];
let EQ_ANALISTAS=['Doriluz','Karina'];
let EQ_TODOS=[];
// match flexible por primer nombre ("Karina" calza con "Karina Sánchez")
function matchPersona(nombre,p){if(!nombre)return false;const n=nombre.trim().toLowerCase(),q=p.trim().toLowerCase();return n===q||n.split(' ')[0]===q;}
// El cliente "pertenece" a una persona si es su contadora de contabilidad O su
// analista de impuestos (contadora_impuestos). Por eso una analista ve MÁS clientes
// (los de todas las contadoras a las que ella es analista).
function personaTiene(c,p){return matchPersona(c.contadora,p)||matchPersona(c.contadoraImp,p);}
function personaTieneCli(cli,p){const c=CLIENTES.find(x=>x.nombre===cli);return c?personaTiene(c,p):false;}
function clienteDePersona(c,p){return personaTiene(c,p);}
function baseClientes(){
  if(USER.rol==='admin')return PERSONA?CLIENTES.filter(c=>clienteDePersona(c,PERSONA)):CLIENTES;
  return (FILTRO==='mio'&&USER.nombre)?CLIENTES.filter(c=>personaTiene(c,USER.nombre)):CLIENTES;
}
function openJob(cli,wf){TAX=wf;SEL=cli;BLOQ_OPEN=false;renderModal();}
function rowHTML(cli,contadora,wf,withImp){
  const st=jobState(cli,wf),completo=st.idx>=st.etapas.length;
  const et=completo?{label:'Completado',equipo:'cliente'}:st.etapas[st.idx];
  const pct=st.totalTasks?Math.round(st.totalDone/st.totalTasks*100):0;
  const stat=ESTADO[jkeyW(cli,wf)],vi=venceInfo(wf);
  const venceTxt=completo?'<span class="lst-ok">✓</span>':(vi.none?'<span class="lst-mut">—</span>':(vi.overdue?'<span class="lst-late">vencido '+(-vi.diff)+'d</span>':(vi.soon?'<span class="lst-soon">'+(vi.diff===0?'hoy':'en '+vi.diff+'d')+'</span>':fmtDia(vi.date))));
  const estadoTxt=stat==='esperando'?'<span class="chip chip-amber">Esperando</span>':stat==='bloqueado'?'<span class="chip chip-red">Bloqueado</span>':'<span class="lst-mut">—</span>';
  return '<tr onclick="openJob(\''+esc(cli)+'\',\''+wf+'\')" class="lst-row">'+
    '<td class="lst-cli">'+escHtml(cli)+'</td>'+
    (withImp?'<td><span class="chip chip-wf">'+wf+'</span></td>':'')+
    '<td class="lst-mut">'+escHtml(contadora)+'</td>'+
    '<td><span class="eq-dot eq-'+et.equipo+'"></span>'+et.label+'</td>'+
    '<td><span class="prog"><span class="prog-bar" style="width:'+pct+'%"></span></span><span class="lst-pct">'+pct+'%</span></td>'+
    '<td>'+estadoTxt+'</td><td>'+venceTxt+'</td></tr>';
}
function listaTabla(rows,withImp){
  let h='<table class="lst"><thead><tr><th>Cliente</th>'+(withImp?'<th>Impuesto</th>':'')+'<th>Contadora</th><th>Etapa actual</th><th>Avance</th><th>Estado</th><th>Vence</th></tr></thead><tbody>';
  rows.forEach(r=>h+=rowHTML(r.cli,r.contadora,r.wf,withImp));
  return h+'</tbody></table>';
}
// LISTA estilo Asana: trabajos (cliente×impuesto) en filas agrupadas, con avatar,
// vence y tags de etapa/estado. Agrupable por impuesto/etapa/contadora/estado.
function toggleGrp(k){COLAPSADO[k]=!COLAPSADO[k];render();}
function grpKey(j){
  switch(GROUPBY){
    case 'etapa':return j.completo?'Completado':(j.et.label||'—');
    case 'contadora':return j.contadora||'Sin asignar';
    case 'estado':return j.completo?'Completado':(j.stat==='bloqueado'?'Bloqueado':(j.stat==='esperando'?'Esperando cliente':'En curso'));
    default:return j.wf;
  }
}
function asRow(j){
  const av=(j.contadora||'?').slice(0,2).toUpperCase();
  const vence=j.completo?'<span class="lst-ok">✓</span>':(j.vi.none?'<span class="lst-mut">—</span>':(j.vi.overdue?'<span class="lst-late">vencido</span>':(j.vi.soon?'<span class="lst-soon">'+(j.vi.diff===0?'hoy':'en '+j.vi.diff+'d')+'</span>':fmtDia(j.vi.date))));
  const etapaTag=j.completo?'<span class="as-stage">—</span>':'<span class="as-tag as-eqt-'+j.et.equipo+'">'+EQ_LABEL[j.et.equipo]+'</span> <span class="as-stage">'+escHtml(j.et.label)+'</span>';
  const estadoTag=j.completo?'<span class="as-tag as-tag-green">Completado</span>':(j.stat==='bloqueado'?'<span class="as-tag as-tag-red">Bloqueado</span>':(j.stat==='esperando'?'<span class="as-tag as-tag-amber">Esperando</span>':'<span class="as-tag as-tag-gray">En curso</span>'));
  return '<div class="as-row" onclick="openJob(\''+esc(j.cli)+'\',\''+j.wf+'\')">'+
    '<div class="as-col-name"><span class="as-check">○</span><b>'+escHtml(j.cli)+'</b>'+(GROUPBY!=='impuesto'?' <span class="as-wf">'+j.wf+'</span>':'')+'</div>'+
    '<div class="as-col-asg"><span class="as-av">'+av+'</span>'+escHtml(j.contadora)+'</div>'+
    '<div>'+vence+'</div><div>'+etapaTag+'</div><div>'+estadoTag+'</div></div>';
}
function buildJobs(filterFn){
  const base=baseClientes(),jobs=[];
  WF.orden.forEach(wf=>base.forEach(c=>{
    const st=jobState(c.nombre,wf),completo=st.idx>=st.etapas.length,stat=ESTADO[jkeyW(c.nombre,wf)];
    const et=completo?{label:'Completado',equipo:'cliente'}:(st.etapas[st.idx]||{label:'—',equipo:'contab'});
    const j={cli:c.nombre,contadora:c.contadora,wf,st,completo,stat,et,vi:venceInfo(wf)};
    if(!filterFn||filterFn(j))jobs.push(j);
  }));
  return jobs;
}
function pasaVistaJob(j){
  switch(VISTA){
    case 'esperando':return j.stat==='esperando';
    case 'bloqueados':return j.stat==='bloqueado';
    case 'atrasados':return !j.completo&&j.vi.overdue;
    case 'vencen':return !j.completo&&j.vi.soon;
    case 'midia':return !j.completo&&(USER.rol==='admin'||personaTieneCli(j.cli,USER.nombre))&&etapaEsMia(j.cli,j.st.etapas[j.st.idx]);
    default:return true;
  }
}
// ¿el trabajo (cli,wf) pasa la vista guardada activa? (filtro aplicable a cualquier vista)
function vistaOK(cli,wf){
  if(!VISTA)return true;
  const st=jobState(cli,wf),completo=st.idx>=st.etapas.length,stat=ESTADO[jkeyW(cli,wf)];
  const et=completo?{label:'Completado',equipo:'cliente'}:(st.etapas[st.idx]||{label:'—',equipo:'contab'});
  return pasaVistaJob({cli,contadora:contadoraDe(cli),wf,st,completo,stat,et,vi:venceInfo(wf)});
}
const VISTA_TIT={esperando:'Esperando al cliente',midia:'Mi día',vencen:'Vencen pronto',bloqueados:'Bloqueados',atrasados:'Atrasados'};
// Render de lista estilo Asana compartido por la vista Lista y por las Vistas guardadas
function asListaHTML(jobs,titulo){
  const groups={},order=[];
  jobs.forEach(j=>{const k=grpKey(j);if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(j);});
  if(GROUPBY==='impuesto')order.sort((a,b)=>WF.orden.indexOf(a)-WF.orden.indexOf(b));else order.sort();
  let h=titulo?'<div class="vista-head"><h2 class="vista-title">'+titulo+'</h2><span class="vista-count">'+jobs.length+' trabajo(s) · '+MES+'</span></div>':'';
  h+='<div class="as-toolbar"><span class="as-tb-lbl">Agrupar por</span><select onchange="GROUPBY=this.value;render()" class="as-sel">'+
    [['impuesto','Impuesto'],['etapa','Etapa'],['contadora','Contadora'],['estado','Estado']].map(([k,l])=>'<option value="'+k+'"'+(GROUPBY===k?' selected':'')+'>'+l+'</option>').join('')+'</select></div>';
  if(!jobs.length)return h+'<div class="kb-placeholder">Nada por aquí 🎉</div>';
  h+='<div class="as-list"><div class="as-head"><div>Nombre del trabajo</div><div>Contadora</div><div>Vence</div><div>Etapa</div><div>Estado</div></div>';
  order.forEach(k=>{
    const rows=groups[k],col=COLAPSADO[k];
    h+='<div class="as-group"><div class="as-grp-head" onclick="toggleGrp(\''+esc(k)+'\')"><span class="as-caret">'+(col?'▸':'▾')+'</span><span class="as-grp-name">'+escHtml(k)+'</span><span class="as-grp-count">'+rows.length+'</span></div>';
    if(!col)rows.forEach(j=>h+=asRow(j));
    h+='</div>';
  });
  return h+'</div>';
}
function renderLista(){
  const center=document.getElementById('center');
  if(!baseClientes().length){center.innerHTML='<div class="kb-placeholder">No hay clientes'+(FILTRO==='mio'?' con tu nombre. Prueba "Todos".':'')+'</div>';return;}
  center.innerHTML=asListaHTML(buildJobs(VISTA?pasaVistaJob:null),VISTA?VISTA_TIT[VISTA]:null);
  if(SEL)renderModal();
}
// GANTT-CALENDARIO: eje de días real; una barra por impuesto en su fecha de
// vencimiento oficial (escalonadas como un Gantt). Clic en una barra abre su Kanban.
const MESES_SHORT=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function renderGantt(){
  const center=document.getElementById('center');const base=baseClientes();
  const taxes=WF.orden.filter(wf=>!venceInfo(wf).none&&(!VISTA||base.some(c=>vistaOK(c.nombre,wf))));
  if(!taxes.length){center.innerHTML='<div class="kb-placeholder">Sin fechas de vencimiento para mostrar.</div>';return;}
  let min=null,max=null;
  taxes.forEach(wf=>{const vi=venceInfo(wf);const n=(WF.etapas[wf]||[]).length||4;const s=new Date(vi.date);s.setDate(s.getDate()-n*3);if(!min||s<min)min=new Date(s);if(!max||vi.date>max)max=new Date(vi.date);});
  min.setDate(min.getDate()-1);max.setDate(max.getDate()+2);
  const span=(max-min)||1,pct=d=>(d-min)/span*100,today=hoyMid();
  const days=[];for(let d=new Date(min);d<=max;d.setDate(d.getDate()+1))days.push(new Date(d));
  let axis='';days.forEach((d,i)=>{const we=d.getDay()===0||d.getDay()===6,isT=d.getTime()===today.getTime(),lbl=(i===0||d.getDate()===1)?d.getDate()+' '+MESES_SHORT[d.getMonth()]:d.getDate();axis+='<div class="gc-day'+(we?' gc-we':'')+(isT?' gc-today':'')+'">'+lbl+'</div>';});
  let rows='';
  taxes.forEach(wf=>{
    const vi=venceInfo(wf),n=(WF.etapas[wf]||[]).length||4,s=new Date(vi.date);s.setDate(s.getDate()-n*3);
    const left=pct(s),width=Math.max(3,pct(vi.date)-left);
    const matching=VISTA?base.filter(c=>vistaOK(c.nombre,wf)):base;
    const tot=matching.length,pend=matching.filter(c=>{const st=jobState(c.nombre,wf);return st.idx<st.etapas.length;}).length,done=tot-pend;
    const cls=vi.overdue?'gc-bar-late':(vi.soon?'gc-bar-soon':'gc-bar-ok');
    rows+='<div class="gc-row" onclick="TAX=\''+wf+'\';VIEW=\'kanban\';VISTA=\'\';render()">'+
      '<div class="gc-gutter gc-row-lbl">'+wf+'<span class="gc-row-sub">'+done+'/'+tot+' listos</span></div>'+
      '<div class="gc-track"><div class="gc-today-line" style="left:'+pct(today)+'%"></div>'+
      '<div class="gc-bar '+cls+'" style="left:'+left+'%;width:'+width+'%" title="'+wf+' vence '+fmtDia(vi.date)+'">'+fmtDia(vi.date)+'</div></div></div>';
  });
  const presMes=MESES[(MESES.indexOf(MES)+1)%12];
  center.innerHTML='<div class="gc-wrap"><div class="gc-sub">Cronograma de vencimientos · período <b>'+MES+' '+ANIO+'</b> (se presenta en '+presMes+') · la línea azul es hoy</div>'+
    '<div class="gc-head"><div class="gc-gutter"></div><div class="gc-axis">'+axis+'</div></div>'+rows+'</div>';
  if(SEL)renderModal();
}

function renderKanban(){
  const center=document.getElementById('center');
  if(VIEW!=='kanban'){center.innerHTML='<div class="kb-placeholder">Vista '+VIEW+'</div>';return;}
  const etapas=WF.etapas[TAX]||[];
  const banner=DB_OK?'':'<div class="kb-banner">Vista local con datos de ejemplo (no hay sesión / faltan las tablas). En el portal, con sesión, carga datos reales.</div>';
  let lista=baseClientes();
  if(VISTA)lista=lista.filter(c=>vistaOK(c.nombre,TAX));
  const cols={};etapas.forEach((e,i)=>cols[i]=[]);const done=[];
  lista.forEach(c=>{const st=jobState(c.nombre,TAX);if(st.idx>=etapas.length)done.push(c);else cols[st.idx].push(c);});
  if(!lista.length){center.innerHTML=banner+'<div class="kb-placeholder">No hay clientes para mostrar'+(FILTRO==='mio'?' con tu nombre. Prueba "Todos".':'')+'</div>';return;}

  let h=banner+'<div class="kb-board">';
  etapas.forEach((s,si)=>{
    if(si>0&&etapas[si-1].equipo==='contab'&&s.equipo==='impuestos') h+='<div class="kb-handoff"><div class="kb-handoff-text">Contabilidad&nbsp;→&nbsp;Impuestos</div></div>';
    h+='<div class="kb-col"><div class="kb-col-head eq-'+s.equipo+'"><span class="kb-col-num">'+String(si+1).padStart(2,'0')+'</span><span class="kb-col-title">'+escHtml(s.label)+'</span><span class="eq-badge eq-badge-'+s.equipo+'">'+EQ_LABEL[s.equipo]+'</span></div>';
    h+='<div class="kb-col-body" ondragover="allowDrop(event)" ondrop="dropCol(event,'+si+')">';
    cols[si].forEach(c=>{h+=cardHTML(c,s);});
    if(!cols[si].length) h+='<div class="kb-empty">Sin clientes en esta etapa</div>';
    h+='</div></div>';
  });
  // Done column
  h+='<div class="kb-col kb-done"><div class="kb-col-head eq-done"><span class="kb-col-title">Completado</span><span class="eq-badge eq-badge-done">'+done.length+'</span></div>';
  h+='<div class="kb-col-body" ondragover="allowDrop(event)" ondrop="dropCol(event,'+etapas.length+')">';
  done.forEach(c=>h+='<div onclick="selectJob(\''+esc(c.nombre)+'\')" class="kb-card kb-card-done"><div class="kb-card-name">'+escHtml(c.nombre)+'</div><div class="kb-card-meta">'+escHtml(c.contadora)+'</div></div>');
  if(!done.length) h+='<div class="kb-empty">—</div>';
  h+='</div></div></div>';
  center.innerHTML=h;
  if(SEL) renderModal();
}

function cardHTML(c,s){
  const st=jobState(c.nombre,TAX),etTks=(WF.tareas[s.id]||[]).length,etDone=s._done||0;
  const stat=ESTADO[jkey(c.nombre)],cm=(COMENTS[jkey(c.nombre)]||[]).length;
  const pct=st.totalTasks?Math.round(st.totalDone/st.totalTasks*100):0;
  let chip='';
  if(stat==='esperando') chip='<span class="kb-status kb-wait">Esperando</span>';
  if(stat==='bloqueado') chip='<span class="kb-status kb-block">Bloqueado</span>';
  return '<div draggable="true" ondragstart="dragStart(event,\''+esc(c.nombre)+'\')" onclick="selectJob(\''+esc(c.nombre)+'\')" class="kb-card'+(SEL===c.nombre?' is-selected':'')+'">'
    +'<div class="kb-card-name">'+escHtml(c.nombre)+'</div>'
    +'<div class="kb-card-meta">'+escHtml(c.contadora)+' · '+st.totalDone+'/'+st.totalTasks+'</div>'
    +'<div class="kb-prog"><div class="kb-prog-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="kb-card-foot">'+chip
    +'<div class="kb-card-counts">'+(cm?'<span class="kb-cm">'+ico('msg',12)+' '+cm+'</span>':'')+'<span>'+etDone+'/'+etTks+'</span></div>'
    +'</div></div>';
}

// ── Modal ─────────────────────────────────────────────────────────────
let BLOQ_OPEN=false, EDIT_ID=null;
function selectJob(cli){SEL=cli;BLOQ_OPEN=false;renderModal();}
function closePanel(){closeCard();}
function closeCard(){SEL=null;BLOQ_OPEN=false;document.getElementById('modal').innerHTML='';}
function fmtFechaHora(iso){if(!iso)return '';try{const d=new Date(iso);return d.toLocaleDateString('es-DO',{day:'numeric',month:'short'})+', '+d.toLocaleTimeString('es-DO',{hour:'numeric',minute:'2-digit',hour12:true});}catch(e){return '';}}

function renderModal(){
  if(!SEL){document.getElementById('modal').innerHTML='';return;}
  const cli=SEL,st=jobState(cli,TAX),etapas=WF.etapas[TAX]||[];

async function setTareaDone(cli,origen,tareaId,val){
  const fecha=new Date().toISOString().slice(0,10);
  const contab=origen==='contadores';
  const key=contab?(contadoraDe(cli)+'_'+cli+'_'+MES):(cli+'||'+MES+'||'+TAX);
  const MAP=contab?CONTAB_DATA:IMP_MAP;
  let e=MAP[key]||(MAP[key]=contab?{_id:null,datos:{}}:{_id:null,datos:{},contadora:contadoraDe(cli)});
  const prevTask=e.datos[tareaId]?{...e.datos[tareaId]}:undefined;
  const por=val?(USER.nombre||'?'):((prevTask&&prevTask.por)||'');
  const item=contab?{done:val,fecha:val?((prevTask&&prevTask.fecha)||fecha):'',nota:(prevTask&&prevTask.nota)||'',por:por}:{done:val,fecha:val?((prevTask&&prevTask.fecha)||fecha):null,por:por};
  e.datos[tareaId]=item;
  let error=null;
  try{
    // 1) Merge atómico server-side (no pisa lo que otro guardó en la misma fila)
    const {error:er}=await sb.rpc('wf_merge_checklist',{p_origen:origen,p_cliente:cli,p_mes:MES,p_anio:ANIO,p_impuesto:contab?null:TAX,p_contadora:contadoraDe(cli),p_item:tareaId,p_val:item});
    if(er&&(er.code==='PGRST202'||/not find the function|does not exist|schema cache/i.test(er.message||''))){
      // Respaldo (aún no se corrió db/workflows-merge-rpc.sql): escritura no-atómica
      if(contab){if(e._id){({error}=await sb.from('checklist_contadores').update({datos:e.datos,updated_at:new Date().toISOString()}).eq('id',e._id));}else{const {data,error:e3}=await sb.from('checklist_contadores').insert({contadora:contadoraDe(cli),cliente:cli,mes:MES,anio:ANIO,datos:e.datos}).select();error=e3;if(data&&data[0])e._id=data[0].id;}}
      else{if(e._id){({error}=await sb.from('impuestos_checklist').update({datos:e.datos}).eq('id',e._id));}else{const {data,error:e3}=await sb.from('impuestos_checklist').insert({cliente:cli,mes:MES,anio:ANIO,impuesto:TAX,contadora:e.contadora||null,datos:e.datos}).select();error=e3;if(data&&data[0])e._id=data[0].id;}}
    }else error=er;
  }catch(ex){error=ex;}
  if(error){ // revertir el cambio local y avisar (la BD lo rechazó — RLS/permiso/conexión)
    if(prevTask===undefined)delete e.datos[tareaId];else e.datos[tareaId]=prevTask;
    console.error('write',origen,error);toast('No se pudo guardar — ¿permiso o conexión? Se revirtió.',true);
    render();if(SEL===cli)renderModal();
    return false;
  }
  return true;
}

  if(!cur&&PAGO_FINAL_IDS.includes(tareaId)&&!confirm('Marcar como PAGADO da el trabajo por terminado. ¿Confirmas?'))return;

function mentionNames(){ const s=new Set(); [...EQ_CONTADORAS,...EQ_ANALISTAS,...(EQ_TODOS||[])].forEach(n=>{const f=firstName(n); if(f)s.add(f);}); if(USER.nombre)s.add(firstName(USER.nombre)); return [...s].sort((a,b)=>a.localeCompare(b)); }
function parseMentions(texto){
  const found=new Set(); const re=/@([\p{L}]+)/gu; let m;
  const names=mentionNames();
  while((m=re.exec(texto||''))){ const tok=m[1].toLowerCase(); const hit=names.find(n=>n.toLowerCase()===tok); if(hit) found.add(hit); }
  return [...found];
}

function libreMentionInput(){
  const inp=document.getElementById('lc-new'); const box=document.getElementById('lc-mention'); if(!inp||!box) return;
  const pos=inp.selectionStart; const upto=inp.value.slice(0,pos);
  const m=upto.match(/@([\p{L}]*)$/u);
  if(!m){ box.style.display='none'; box.innerHTML=''; return; }
  const q=m[1].toLowerCase();
  const names=mentionNames().filter(n=>n.toLowerCase().startsWith(q)).slice(0,6);
  if(!names.length){ box.style.display='none'; box.innerHTML=''; return; }
  box.innerHTML=names.map(n=>'<div class="cm-mention-it" onmousedown="libreMentionPick(event,\''+esc(n)+'\')">@'+escHtml(n)+'</div>').join('');
  box.style.display='block';
}
function libreMentionPick(e,name){
  if(e){e.preventDefault();}
  const inp=document.getElementById('lc-new'); if(!inp) return;
  const pos=inp.selectionStart; const val=inp.value; const upto=val.slice(0,pos);
  const m=upto.match(/@([\p{L}]*)$/u); if(!m) return;
  const start=pos-m[0].length;
  inp.value=val.slice(0,start)+'@'+name+' '+val.slice(pos);
  const box=document.getElementById('lc-mention'); if(box){box.style.display='none';box.innerHTML='';}
  inp.focus(); const np=start+name.length+2; inp.setSelectionRange(np,np);
}

function hoyISO(){return new Date().toISOString().slice(0,10);}
function fmtDiaISO(s){try{return new Date(s+'T00:00:00').toLocaleDateString('es-DO',{day:'numeric',month:'short'});}catch(e){return s;}}
function equipoNombres(){const base=EQ_TODOS.length?EQ_TODOS:[...EQ_CONTADORAS,...EQ_ANALISTAS];const set=new Set(base);if(USER.nombre)set.add(USER.nombre);return [...set].sort((a,b)=>a.localeCompare(b));}
// "Administrativo" = todo el equipo que no es contadora ni analista (resto del equipo)
function eqAdmin(){const ex=new Set([...EQ_CONTADORAS,...EQ_ANALISTAS].map(n=>n.toLowerCase()));return (EQ_TODOS.length?EQ_TODOS:[]).filter(n=>!ex.has(n.toLowerCase())).sort((a,b)=>a.localeCompare(b));}

function tcLastActivity(cli,wf){
  let max=null;
  (WF.etapas[wf]||[]).forEach(e=>{(WF.tareas[e.id]||[]).forEach(tk=>{const f=tareaFecha(cli,wf,tk);if(f&&f!=='✓'&&f>(''+max))max=f;});});
  return max;
}
// ¿el cliente pertenece a esta contadora (por contadora_contabilidad)?
function tcContadoraMatch(cli, nombre){ const a=(contadoraDe(cli)||'').trim().toLowerCase(), b=(nombre||'').trim().toLowerCase(); return !!a&&!!b&&(a===b||a.startsWith(b)||b.startsWith(a)); }
function tcBuildRows(){
  const rows=[];
  if(!WF||!WF.orden)return rows;
  // Admin: ve todo, o filtra por contadora (dropdown). Contadora/analista: SOLO lo suyo (puedeMarcar).
  const isAdmin=(USER.rol==='admin');
  CLIENTES.forEach(c=>{
    const cli=c.nombre;
    if(isAdmin && TC_CONTADORA && !tcContadoraMatch(cli, TC_CONTADORA)) return; // filtro por contadora
    WF.orden.forEach(wf=>{
      const vi=venceInfo(wf); if(vi.none) return;
      const st=jobState(cli,wf); if(st.idx>=st.etapas.length) return; // workflow completo
      const started=st.totalDone>0;
      const last=tcLastActivity(cli,wf);
      const staleDays=last?Math.round((hoyMid()-new Date(last+'T12:00:00'))/86400000):999;
      (WF.etapas[wf]||[]).forEach(e=>{
        (WF.tareas[e.id]||[]).forEach(tk=>{
          if(tareaFecha(cli,wf,tk)) return; // ya hecha
          if(isAdmin){
            if(TC_CONTADORA && tk.checklist_origen!=='contadores') return; // al filtrar contadora, solo sus tareas
          } else {
            if(!puedeMarcar(cli,tk.checklist_origen)) return; // contadora/analista: solo lo suyo
          }
          let status;
          if(vi.overdue) status='atrasado';
          else if(vi.diff===0) status='vencen_hoy';
          else if(!started||staleDays>3) status='sin_actividad';
          else status='en_curso';
          rows.push({cli,wf,wfLabel:WF.wf[wf]||wf,etapa:e.label,tarea:tk.label,vence:vi.date,status});
        });
      });
    });
  });
  return rows;
}

  if(nuevo)setTimeout(()=>{const el=document.getElementById('lm-titulo');if(el)el.focus();},30);
}
async function saveLibre(){
  const nuevo=LIBRE_SEL==='__nuevo';const g=id=>document.getElementById(id);
  const titulo=(g('lm-titulo').value||'').trim();
  if(!titulo){toast('Escribe un título.',true);g('lm-titulo').focus();return;}
  const descEl=g('lm-desc');const bcEl=g('lm-basecamp');const cur=libreCur();
  const upd={titulo:titulo,descripcion:descEl?(sanitizeDesc(descEl.innerHTML)||null):null,link_basecamp:(bcEl&&bcEl.value.trim())||null,etiqueta:g('lm-etq').value||null,etiquetas:(cur&&Array.isArray(cur.etiquetas))?cur.etiquetas:[],asignado:g('lm-asig').value||null,cliente:g('lm-cli').value||null,fecha_limite:g('lm-fecha').value||null,columna_id:g('lm-col').value};
  // Resiliencia: si una columna opcional aún no existe en la BD (migración sin correr),
  // se quita del payload y se reintenta, en vez de fallar todo el guardado.
  const OPC=['link_basecamp','checklist','etiquetas'];const stripped=[];
  async function intentar(payload){
    let res;
    if(nuevo){const orden=LIBRE_TASKS.filter(x=>x.columna_id===payload.columna_id).length+1;res=await sb.from('tl_tareas').insert({...payload,orden:orden,creado_por:USER.id||null}).select();}
    else{const t=LIBRE_TASKS.find(x=>x.id===LIBRE_SEL);res=await sb.from('tl_tareas').update(payload).eq('id',t.id);}
    if(res.error){const m=(res.error.message||'').match(/'?([a-z_]+)'?\s+column/i);if(m&&OPC.includes(m[1])&&(m[1] in payload)){stripped.push(m[1]);const p={...payload};delete p[m[1]];return intentar(p);}}
    return res;
  }
  const avisoStrip=()=>{ if(stripped.includes('link_basecamp')&&upd.link_basecamp) toast('Tarea guardada, pero el Link no: falta correr db/tareas-libres-basecamp.sql en Supabase.',true); };
  if(nuevo){
    closeLibre();
    const {error}=await intentar(upd);
    if(error)toast('No se pudo crear la tarea: '+(error.message||error.code||''),true);else{avisoStrip();await loadLibre();}
    render();
  }else{
    const t=LIBRE_TASKS.find(x=>x.id===LIBRE_SEL);if(!t)return;
    Object.assign(t,upd);closeLibre();render();
    const {error}=await intentar(upd);
    if(error){toast('No se pudo guardar la tarea: '+(error.message||error.code||''),true);await loadLibre();render();}
    else avisoStrip();
  }
}
async function delLibre(){if(!confirm('¿Eliminar esta tarea?'))return;const id=LIBRE_SEL;LIBRE_TASKS=LIBRE_TASKS.filter(x=>x.id!==id);closeLibre();render();const {error}=await sb.from('tl_tareas').delete().eq('id',id);if(error){toast('No se pudo eliminar.',true);await loadLibre();render();}}
// ── Descripción enriquecida (negrita + viñetas, estilo Trello) ──
// Deja solo tags seguros y sin atributos (la escribe el equipo, pero igual se sanea).
function sanitizeDesc(html){
  const allowed=new Set(['B','STRONG','I','EM','U','UL','OL','LI','BR','DIV','P','SPAN']);
  const tmp=document.createElement('div'); tmp.innerHTML=html||'';
  tmp.querySelectorAll('*').forEach(el=>{
    if(!allowed.has(el.tagName)){ el.replaceWith(...el.childNodes); }
    else { [...el.attributes].forEach(a=>el.removeAttribute(a.name)); }
  });
  return tmp.innerHTML;
}
function lmFmt(cmd){ document.execCommand(cmd,false,null); const el=document.getElementById('lm-desc'); if(el) el.focus(); }
async function saveLibreDesc(){
  const id=LIBRE_SEL; if(!id||id==='__nuevo') return;
  const el=document.getElementById('lm-desc'); if(!el) return;
  const html=sanitizeDesc(el.innerHTML);
  const t=LIBRE_TASKS.find(x=>x.id===id); if(!t) return;
  const prev=t.descripcion; t.descripcion=html;
  const {error}=await sb.from('tl_tareas').update({descripcion:html}).eq('id',id);
  if(error){ t.descripcion=prev; toast('No se pudo guardar la descripción.',true); }
  else { toast('Descripción guardada.'); }
}

// ── Checklist estilo Trello en cada tarea libre (vive en tl_tareas.checklist JSONB) ──
function libreChecklistHTML(t){
  const items = Array.isArray(t.checklist) ? t.checklist : [];
  const done = items.filter(i=>i&&i.done).length;
  const pct = items.length ? Math.round(done/items.length*100) : 0;
  let h='<div class="lm-chk"><div class="lm-chk-head"><label class="lm-lbl" style="margin:0">Checklist</label>'+(items.length?'<span class="lm-chk-count">'+done+'/'+items.length+'</span>':'')+'</div>';
  if(items.length) h+='<div class="lm-chk-bar"><div class="lm-chk-fill" style="width:'+pct+'%"></div></div>';
  items.forEach(i=>{
    if(!i||!i.id) return;
    h+='<div class="lm-chk-item"><input type="checkbox"'+(i.done?' checked':'')+' onchange="toggleChkItem(\''+i.id+'\')"><span class="lm-chk-txt'+(i.done?' done':'')+'">'+escHtml(i.texto||'')+'</span><button class="lm-chk-del" onclick="delChkItem(\''+i.id+'\')" title="Eliminar">×</button></div>';
  });
  h+='<div class="lm-chk-add"><input id="lm-chk-new" class="lm-chk-input" placeholder="Agregar ítem…" onkeydown="if(event.key===\'Enter\')addChkItem()"><button class="lm-chk-addbtn" onclick="addChkItem()">Agregar</button></div>';
  h+='</div>';
  return h;
}
function _chkGenId(){ return 'c'+Date.now().toString(36)+Math.floor(Math.random()*1e6).toString(36); }
async function _saveChecklist(t, prev){
  const {error}=await sb.from('tl_tareas').update({checklist: t.checklist}).eq('id', t.id);
  if(error){ t.checklist = prev; toast('No se pudo guardar el checklist.',true); renderLibreModal(); }
  else render();
}
async function addChkItem(){
  const id=LIBRE_SEL; if(!id||id==='__nuevo') return;
  const inp=document.getElementById('lm-chk-new'); const v=((inp&&inp.value)||'').trim(); if(!v) return;
  const t=LIBRE_TASKS.find(x=>x.id===id); if(!t) return;
  const prev = Array.isArray(t.checklist)?t.checklist.slice():[];
  t.checklist = (Array.isArray(t.checklist)?t.checklist.slice():[]).concat([{id:_chkGenId(),texto:v,done:false}]);
  renderLibreModal();
  const i2=document.getElementById('lm-chk-new'); if(i2) i2.focus();
  await _saveChecklist(t, prev);
}
async function toggleChkItem(itemId){
  const t=LIBRE_TASKS.find(x=>x.id===LIBRE_SEL); if(!t||!Array.isArray(t.checklist)) return;
  const prev=t.checklist.map(x=>({...x}));
  t.checklist = t.checklist.map(x=> x.id===itemId ? {...x, done:!x.done} : x);
  renderLibreModal();
  await _saveChecklist(t, prev);
}
async function delChkItem(itemId){
  const t=LIBRE_TASKS.find(x=>x.id===LIBRE_SEL); if(!t||!Array.isArray(t.checklist)) return;
  const prev=t.checklist.slice();
  t.checklist = t.checklist.filter(x=>x.id!==itemId);
  renderLibreModal();
  await _saveChecklist(t, prev);
}

// ── Comentarios del tablero libre (mismo patrón que los workflows) ──────────
function libreComentsHTML(tareaId){
  const list=(LIBRE_COMENTS[tareaId]||[]).slice().sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  let h='<div class="lm-coms"><label class="lm-lbl">Comentarios</label>';
  h+='<div class="cm-input-wrap"><div class="cm-input-row"><input id="lc-new" class="cm-input" placeholder="Escribe un comentario… (@ para mencionar)" autocomplete="off" oninput="libreMentionInput()" onkeydown="if(event.key===\'Enter\')addLibreCom()"><button onclick="addLibreCom()" class="cm-send">'+ico('send',14)+'</button></div><div id="lc-mention" class="cm-mention" style="display:none"></div></div>';
  if(!list.length)h+='<div class="cm-empty">Sin comentarios todavía.</div>';
  list.forEach(c=>{
    const mine=(c.usuario_id&&c.usuario_id===USER.id),canDel=mine||USER.rol==='admin',editing=(LIBRE_EDIT_ID&&LIBRE_EDIT_ID===c.id);
    let inner;
    if(editing){
      inner='<textarea id="lc-edit" rows="2" class="cm-edit">'+escHtml(c.texto)+'</textarea><div class="cm-edit-actions"><button onclick="LIBRE_EDIT_ID=null;renderLibreModal()" class="bloq-cancel">Cancelar</button><button onclick="saveLibreEdit(\''+c.id+'\')" class="cm-send" style="padding:5px 12px;font-size:12px;border-radius:8px">Guardar</button></div>';
    }else{
      const ctrls=(c.id&&(mine||canDel))?'<div class="cm-actions">'+(mine?'<button onclick="LIBRE_EDIT_ID=\''+c.id+'\';renderLibreModal()" class="cm-act">editar</button>':'')+(canDel?'<button onclick="deleteLibreCom(\''+c.id+'\')" class="cm-act cm-act-del">eliminar</button>':'')+'</div>':'';
      inner='<div>'+escHtml(c.texto)+'</div>'+ctrls;
    }
    h+='<div class="cm-item"><div class="cm-av eq-'+(c.autor_equipo||'equipo')+'">'+escHtml((c.autor_nombre||'?')[0])+'</div><div class="cm-body"><div class="cm-bubble"><div class="cm-head"><span class="cm-who"><b>'+escHtml(c.autor_nombre||'—')+'</b></span><span class="cm-time">'+fmtFechaHora(c.created_at)+'</span></div>'+inner+'</div></div></div>';
  });
  h+='</div>';
  return h;
}
async function addLibreCom(){
  const id=LIBRE_SEL;if(!id||id==='__nuevo')return;
  const inp=document.getElementById('lc-new');const v=((inp&&inp.value)||'').trim();if(!v)return;
  if(!USER.id){toast('Inicia sesión para comentar.',true);return;}
  const c={tarea_id:id,texto:v,usuario_id:USER.id,autor_nombre:USER.nombre||'Tú',autor_equipo:USER.equipo,created_at:new Date().toISOString()};
  (LIBRE_COMENTS[id]=LIBRE_COMENTS[id]||[]).push(c);renderLibreModal();
  try{const ins={...c};delete ins.created_at;const {data,error}=await sb.from('tl_comentarios').insert(ins).select();if(error)throw error;if(data&&data[0]){c.id=data[0].id;if(data[0].created_at)c.created_at=data[0].created_at;renderLibreModal();}}
  catch(e){LIBRE_COMENTS[id]=(LIBRE_COMENTS[id]||[]).filter(x=>x!==c);toast('No se pudo enviar el comentario.',true);renderLibreModal();return;}
  // @menciones → notificación a cada persona mencionada (menos uno mismo)
  const mencionados=parseMentions(v).filter(n=>n.toLowerCase()!==firstName(USER.nombre).toLowerCase());
  if(mencionados.length){
    const t=LIBRE_TASKS.find(x=>x.id===id);
    const rows=mencionados.map(n=>({destinatario:n,tipo:'mencion',origen:'tablero',tarea_id:id,tarea_titulo:t?t.titulo:null,texto:v,autor_nombre:USER.nombre||'Alguien',leido:false}));
    try{ await sb.from('notificaciones').insert(rows); if(mencionados.length===1) toast('Se notificó a @'+mencionados[0]+'.'); else toast('Se notificó a '+mencionados.length+' personas.'); }catch(e){}
  }
}
async function saveLibreEdit(cid){
  const ta=document.getElementById('lc-edit');const v=((ta&&ta.value)||'').trim();LIBRE_EDIT_ID=null;if(!v){renderLibreModal();return;}
  const arr=LIBRE_COMENTS[LIBRE_SEL]||[];const c=arr.find(x=>x.id===cid);const prev=c?c.texto:null;if(c)c.texto=v;renderLibreModal();
  try{const {error}=await sb.from('tl_comentarios').update({texto:v}).eq('id',cid);if(error)throw error;}
  catch(e){if(c)c.texto=prev;toast('No se pudo editar el comentario.',true);renderLibreModal();}
}
async function deleteLibreCom(cid){
  if(!confirm('¿Eliminar este comentario?'))return;
  const id=LIBRE_SEL;const arr=LIBRE_COMENTS[id]||[];const removed=arr.find(x=>x.id===cid);
  LIBRE_COMENTS[id]=arr.filter(x=>x.id!==cid);LIBRE_EDIT_ID=null;renderLibreModal();
  try{const {error}=await sb.from('tl_comentarios').delete().eq('id',cid);if(error)throw error;}
  catch(e){if(removed)(LIBRE_COMENTS[id]=LIBRE_COMENTS[id]||[]).push(removed);toast('No se pudo eliminar el comentario.',true);renderLibreModal();}
}
