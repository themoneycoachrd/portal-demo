<style>
:root {
  --navy: #1a2332;
  --navy-mid: #2a3a4e;
  --blue: #4361ee;
  --blue-light: #eef2ff;
  --green: #10b981;
  --green-light: #ecfdf5;
  --red: #ef4444;
  --amber: #f59e0b;
  --amber-light: #fffbeb;
  --purple: #8b5cf6;
  --purple-light: #f5f3ff;
  --orange-light: #fff7ed;
  --bg: #f4f6f9;
  --card: #ffffff;
  --border: #e8ecf1;
  --text: #1a2332;
  --muted: #7c8495;
  --light: #a3aab8;
  --sidebar-w: 240px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

/* ==================== LOGIN ==================== */
.login-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.login-box {
  background: white;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  border: 1px solid var(--border);
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.login-logo-icon {
  width: 36px; height: 36px;
  background: var(--navy);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.login-logo-icon svg { width: 18px; height: 18px; }
.login-logo h2 { font-size: 1.15rem; font-weight: 700; color: var(--text); }
.login-logo p { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.login-box .field { margin-bottom: 16px; }
.login-box .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
.login-box .field input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 0.9rem; font-family: inherit;
  background: #fafbfc;
}
.login-box .field input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(67,97,238,0.1); background: white; }
.login-btn {
  width: 100%; padding: 11px; background: var(--navy); color: white; border: none;
  border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 8px;
  transition: background 0.15s;
}
.login-btn:hover { background: var(--navy-mid); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error { color: var(--red); font-size: 0.8rem; margin-top: 12px; display: none; }

/* ==================== APP LAYOUT ==================== */
.app-layout { display: flex; min-height: 100vh; }

/* ==================== SIDEBAR ==================== */
.sidebar {
  width: var(--sidebar-w);
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 20px 18px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.brand-icon {
  width: 34px; height: 34px;
  background: var(--navy);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.brand-icon svg { width: 16px; height: 16px; }
.brand-text h1 { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.brand-text p { font-size: 0.6rem; color: var(--light); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }

.sidebar-divider { height: 1px; background: var(--border); margin: 0 16px; }

.sidebar-nav { flex: 1; padding: 12px 10px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 10px;
  color: var(--muted);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.12s;
  margin-bottom: 2px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.nav-item:hover {
  background: #f5f7fa;
  color: var(--text);
}
.nav-item.active {
  background: var(--navy);
  color: white;
}
.nav-item.disabled {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}
.nav-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
  transition: background 0.12s;
}
.nav-item.active .nav-icon { background: rgba(255,255,255,0.15); }
.nav-label { flex: 1; }

/* ─── Section landing page ─── */
.section-landing { padding: 32px; flex: 1; }
.section-landing-title { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.section-landing-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }

.nav-badge {
  font-size: 0.58rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.nav-badge-active { background: rgba(16,185,129,0.12); color: #059669; }
.nav-item.active .nav-badge-active { background: rgba(16,185,129,0.25); color: #6ee7b7; }
.nav-badge-pending { background: rgba(245,158,11,0.1); color: #d97706; }
.nav-item.active .nav-badge-pending { background: rgba(245,158,11,0.2); color: #fcd34d; }

/* ─── User section ─── */
.sidebar-user {
  padding: 14px 14px 16px;
  border-top: 1px solid var(--border);
}
.sidebar-user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--blue);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem;
  font-weight: 700;
  flex-shrink: 0;
}
.user-meta { flex: 1; min-width: 0; }
.user-meta-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-meta-role {
  font-size: 0.68rem;
  color: var(--light);
  text-transform: capitalize;
}
.btn-logout-small {
  background: none; border: none; cursor: pointer;
  color: var(--light); font-size: 0.72rem; font-weight: 500;
  padding: 4px 0; font-family: inherit;
  transition: color 0.15s;
}
.btn-logout-small:hover { color: var(--red); }

/* ==================== MAIN CONTENT ==================== */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ─── Welcome / Home view ─── */
.home-view { padding: 32px; flex: 1; }

.welcome-banner {
  background: var(--navy);
  border-radius: 14px;
  padding: 28px 32px;
  color: white;
  margin-bottom: 28px;
}
.welcome-banner h2 {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.welcome-banner p {
  font-size: 0.88rem;
  opacity: 0.6;
}
.welcome-date {
  font-size: 0.75rem;
  opacity: 0.35;
  margin-top: 10px;
}

/* ─── Dashboard ─── */
.dash-section-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 12px;
  margin-top: 24px;
}
.dash-section-title:first-child { margin-top: 0; }
.dash-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 8px;
}
.dash-stat {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--border);
}
.dash-stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--light);
}
.dash-stat-value {
  font-size: 28px;
  font-weight: 800;
  margin-top: 4px;
}
.dash-stat-sub {
  font-size: 11px;
  color: var(--light);
  margin-top: 4px;
}
.dash-green { color: #10b981; }
.dash-red { color: #ef4444; }
.dash-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.dash-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 6px;
  text-align: center;
}
.dash-card .label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.dash-card .value { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
.dash-card .value.green { color: var(--green); }
.dash-card .value.amber { color: #f59e0b; }
.dash-card .value.red { color: var(--red); }
.dash-card .value.blue { color: var(--blue); }
.dash-card .value.navy { color: var(--navy); }
.dash-loading {
  text-align: center;
  padding: 40px;
  color: var(--light);
  font-size: 0.85rem;
}

.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: all 0.15s;
  cursor: pointer;
}
.module-card:hover {
  border-color: var(--blue);
  box-shadow: 0 2px 12px rgba(67,97,238,0.08);
}
.module-card.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
.module-card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.module-card-body h3 { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.module-card-body p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.module-card-badge {
  margin-left: auto;
  font-size: 0.6rem; font-weight: 700; padding: 2px 8px;
  border-radius: 6px; text-transform: uppercase; letter-spacing: 0.3px;
  white-space: nowrap; flex-shrink: 0; align-self: center;
}
.badge-active { background: #ecfdf5; color: #059669; }
.badge-pending { background: #fef3c7; color: #d97706; }

/* ─── Module iframe view ─── */
.module-view {
  flex: 1;
  display: none;
}
.module-view.active { display: flex; flex-direction: column; }
.module-iframe {
  flex: 1;
  width: 100%;
  border: none;
  min-height: 100vh;
}

.hidden { display: none; }
</style>
</head>

// Helpers para buscar modulos en la estructura plana
function findModule(moduleId) {
  for (const section of MENU) {
    if (section.children) {
      const child = section.children.find(c => c.id === moduleId);
      if (child) return child;
    } else if (section.id === moduleId) {
      return section;
    }
  }
  return null;
}

function findParentSection(moduleId) {
  for (const section of MENU) {
    if (section.children && section.children.some(c => c.id === moduleId)) {
      return section;
    }
  }
  return null;
}

function getAllModulesFlat() {
  const flat = [];
  MENU.forEach(section => {
    if (section.children) {
      section.children.forEach(child => {
        flat.push({ ...child, parentTitle: section.title, parentIcon: section.icon, parentIconBg: section.iconBg, roles: section.roles });
      });
    } else {
      flat.push(section);
    }
  });
  return flat;
}

function getInitials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Buenos dias';
  if (h < 18) return 'Buenas tardes';
  return 'Buenas noches';
}

function formatToday() {
  const d = new Date();
  const dias = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return dias[d.getDay()] + ' ' + d.getDate() + ' de ' + meses[d.getMonth()] + ', ' + d.getFullYear();
}

// ==================== DASHBOARD ====================

const MESES_DASH = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

async function loadDashboardData() {
  var mesIdx = new Date().getMonth();
  var currentMes = MESES_DASH[mesIdx];
  var prevMes = mesIdx > 0 ? MESES_DASH[mesIdx - 1] : null;
  var mesLabel = currentMes.charAt(0).toUpperCase() + currentMes.slice(1);

  // 1) Clientes contabilidad — meses_resumen
  var contaTotal = 0, contaPrevTotal = 0, contaNuevos = [], contaChurn = [], contaTxServ = 0, contaTxAdm = 0;
  try {
    var res1 = await sb.from('meses_resumen').select('*').eq('anio', 2026);
    var resumen = res1.data;
    if (resumen) {
      var curr = resumen.find(function(r) { return r.mes === currentMes; });
      var prev = prevMes ? resumen.find(function(r) { return r.mes === prevMes; }) : null;
      if (curr) {
        contaTotal = curr.total_clientes || 0;
        contaNuevos = curr.nuevos || [];
        contaChurn = curr.churn || [];
        contaTxServ = parseFloat(curr.serv_total) || 0;
        contaTxAdm = parseFloat(curr.adm_total) || 0;
      }
      contaPrevTotal = prev ? (prev.total_clientes || 0) : 0;
    }
  } catch(e) { console.error('Dashboard meses_resumen:', e); }

  // 2) Clientes software
  var softTotal = 0, softPrev = 0, softBase = 0, softNuevosMes = [];
  try {
    var res2 = await sb.from('software_clientes').select('*');
    var softData = res2.data || [];
    var nuevosHasta = 0, nuevosHastaPrev = 0;
    softData.forEach(function(c) {
      if (c.periodo === '2025') { softBase++; }
      else {
        var idx = MESES_DASH.indexOf(c.periodo);
        if (idx >= 0 && idx <= mesIdx) nuevosHasta++;
        if (idx >= 0 && idx < mesIdx) nuevosHastaPrev++;
        if (c.periodo === currentMes) softNuevosMes.push(c.cliente);
      }
    });
    softTotal = softBase + nuevosHasta;
    softPrev = softBase + nuevosHastaPrev;
  } catch(e) { console.error('Dashboard software_clientes:', e); }

  // 3) Leads y ROAS del mes actual
  var totalLeads = 0, cierres = 0, vendido = 0, cotizado = 0, ejecutado = 0;
  var nombresRec = [], nombresImpl = [], nombresFE = [], nombresSinCat = [], nombresSoft = [];
  try {
    var res3 = await sb.from('leads').select('*').eq('anio', 2026).eq('mes', currentMes);
    var leads = res3.data || [];
    var includeSoft = mesIdx >= 2;
    totalLeads = leads.length;
    leads.forEach(function(l) {
      var impl = parseFloat(l.impl) || 0;
      var lfe = parseFloat(l.fe) || 0;
      var serv = parseFloat(l.serv) || 0;
      var soft = parseFloat(l.soft) || 0;
      var desc = parseFloat(l.descuento) || 0;
      cotizado += impl + lfe + serv + soft;
      if (l.funnel === 'Cerrado Ganado') {
        cierres++;
        var tl = impl + lfe + serv + (includeSoft ? soft : 0);
        vendido += tl * (1 - desc / 100);
        var nombre = l.nombre || '';
        var cat = (l.categoria || '').trim();
        if (cat === 'Recurrente') nombresRec.push(nombre);
        else if (cat === 'Implementacion') nombresImpl.push(nombre);
        else if (cat === 'Facturacion Electronica') nombresFE.push(nombre);
        else nombresSinCat.push(nombre);
        if (soft > 0) nombresSoft.push(nombre);
      }
    });
    vendido = Math.round(vendido * 100) / 100;
    cotizado = Math.round(cotizado * 100) / 100;
  } catch(e) { console.error('Dashboard leads:', e); }

  try {
    var res4 = await sb.from('roas_mensual').select('*').eq('anio', 2026).eq('mes', currentMes);
    if (res4.data && res4.data.length > 0) {
      ejecutado = parseFloat(res4.data[0].ejecutado) || 0;
    }
  } catch(e) { console.error('Dashboard roas_mensual:', e); }

  var cpl = totalLeads > 0 ? ejecutado / totalLeads : 0;
  var cpa = cierres > 0 ? ejecutado / cierres : 0;
  var pctCierre = totalLeads > 0 ? (cierres / totalLeads * 100) : 0;
  var ganancia = vendido - ejecutado;
  var roasVal = ejecutado > 0 ? vendido / ejecutado : 0;

  return {
    mesLabel: mesLabel,
    contabilidad: { total: contaTotal, prevTotal: contaPrevTotal, nuevos: contaNuevos, churn: contaChurn, txServ: contaTxServ, txAdm: contaTxAdm },
    software: { total: softTotal, prev: softPrev, base: softBase, nuevosMes: softNuevosMes },
    comercial: { totalLeads: totalLeads, cierres: cierres, cpl: cpl, cpa: cpa, pctCierre: pctCierre, cotizado: cotizado, vendido: vendido, ejecutado: ejecutado, ganancia: ganancia, roas: roasVal, nombresRec: nombresRec, nombresImpl: nombresImpl, nombresFE: nombresFE, nombresSinCat: nombresSinCat, nombresSoft: nombresSoft }
  };
}

function renderDashboard(d) {
  var el = document.getElementById('dashboard-kpis');

  function fmt(n) { return n.toLocaleString(); }
  function fmtCurr(n) { return 'US$ ' + Math.round(n).toLocaleString(); }
  function fmtPct(n) { return n.toFixed(1) + '%'; }
  function pills(arr, color) {
    if (!arr || arr.length === 0) return '<span style="font-size:11px;color:var(--light)">—</span>';
    var bg = color === 'green' ? '#ecfdf5;color:#10b981' : '#fef2f2;color:#ef4444';
    return arr.map(function(n) {
      return '<span style="display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin:2px;background:' + bg + '">' + n + '</span>';
    }).join('');
  }

  var html = '';

  // ── Seccion 1: Clientes Recurrentes ──
  var neto = d.contabilidad.total - d.contabilidad.prevTotal;
  var netoSign = neto > 0 ? '+' : '';
  var netoColor = neto > 0 ? 'dash-green' : neto < 0 ? 'dash-red' : '';
  var pctPrev = d.contabilidad.prevTotal > 0 ? (neto / d.contabilidad.prevTotal * 100).toFixed(1) : '0.0';

  html += '<h3 class="dash-section-title">Clientes Recurrentes</h3>';
  html += '<div class="dash-stats">';
  html += '<div class="dash-stat"><div class="dash-stat-label">Total ' + d.mesLabel.substring(0,3) + '</div><div class="dash-stat-value">' + d.contabilidad.total + '</div></div>';
  html += '<div class="dash-stat"><div class="dash-stat-label">Crecimiento neto</div><div class="dash-stat-value ' + netoColor + '">' + netoSign + neto + '</div>';
  html += '<div class="dash-stat-sub">' + (neto >= 0 ? '+' : '') + pctPrev + '% vs mes anterior</div></div>';
  html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:#10b981">Entraron</div>';
  html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.contabilidad.nuevos, 'green') + '</div></div>';
  html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:#ef4444">Salieron</div>';
  html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.contabilidad.churn, 'red') + '</div></div>';
  html += '<div class="dash-stat"><div class="dash-stat-label">Transacciones</div><div class="dash-stat-value">' + fmt(d.contabilidad.txServ) + '</div>';
  html += '<div class="dash-stat-sub">Adm: ' + fmt(d.contabilidad.txAdm) + '</div></div>';
  html += '</div>';

  // ── Seccion 2: Clientes Software ──
  var softDelta = d.software.total - d.software.prev;
  var softSign = softDelta > 0 ? '+' : '';
  var softColor = softDelta > 0 ? 'dash-green' : softDelta < 0 ? 'dash-red' : '';
  var softPct = d.software.prev > 0 ? (softDelta / d.software.prev * 100).toFixed(1) : '0.0';

  html += '<h3 class="dash-section-title">Clientes Software</h3>';
  html += '<div class="dash-stats">';
  html += '<div class="dash-stat"><div class="dash-stat-label">Software actual</div><div class="dash-stat-value">' + d.software.total + '</div>';
  html += '<div class="dash-stat-sub">Base 2026: ' + d.software.base + '</div></div>';
  html += '<div class="dash-stat"><div class="dash-stat-label">Crecimiento ultimo mes</div><div class="dash-stat-value ' + softColor + '">' + softSign + softDelta + '</div>';
  html += '<div class="dash-stat-sub">' + (softDelta >= 0 ? '+' : '') + softPct + '% vs mes anterior</div></div>';
  html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:#10b981">Nuevos en ' + d.mesLabel + '</div>';
  html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.software.nuevosMes, 'green') + '</div></div>';
  html += '</div>';

  // ── Seccion 3: Cierres Equipo Comercial ──
  html += '<h3 class="dash-section-title">Cierres Equipo Comercial — ' + d.mesLabel + '</h3>';
  html += '<div class="dash-grid">';
  html += '<div class="dash-card"><div class="label">Total Leads</div><div class="value navy">' + fmt(d.comercial.totalLeads) + '</div></div>';
  html += '<div class="dash-card"><div class="label">Costo x Lead</div><div class="value amber">' + fmtCurr(d.comercial.cpl) + '</div></div>';
  html += '<div class="dash-card"><div class="label">Cierres</div><div class="value green">' + fmt(d.comercial.cierres) + '</div></div>';
  html += '<div class="dash-card"><div class="label">Costo Adquisicion</div><div class="value amber">' + fmtCurr(d.comercial.cpa) + '</div></div>';
  html += '<div class="dash-card"><div class="label">% de Cierre</div><div class="value green">' + fmtPct(d.comercial.pctCierre) + '</div></div>';
  html += '</div>';
  html += '<div class="dash-grid">';
  html += '<div class="dash-card"><div class="label">Total Cotizado</div><div class="value blue">' + fmtCurr(d.comercial.cotizado) + '</div></div>';
  html += '<div class="dash-card"><div class="label">Total Vendido</div><div class="value green">' + fmtCurr(d.comercial.vendido) + '</div></div>';
  html += '<div class="dash-card"><div class="label">Invertido</div><div class="value amber">' + fmtCurr(d.comercial.ejecutado) + '</div></div>';
  html += '<div class="dash-card"><div class="label">Ganancia</div><div class="value ' + (d.comercial.ganancia >= 0 ? 'green' : 'red') + '">' + fmtCurr(d.comercial.ganancia) + '</div></div>';
  html += '<div class="dash-card"><div class="label">ROAS</div><div class="value blue">' + d.comercial.roas.toFixed(2) + 'x</div></div>';
  html += '</div>';

  // ── Seccion 4: Cierres por categoria ──
  if (d.comercial.cierres > 0) {
    html += '<h3 class="dash-section-title">Cierres — ' + d.mesLabel + '</h3>';
    html += '<div class="dash-stats">';
    if (d.comercial.nombresRec.length > 0) {
      html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:#10b981">Recurrente (' + d.comercial.nombresRec.length + ')</div>';
      html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.comercial.nombresRec, 'green') + '</div></div>';
    }
    if (d.comercial.nombresImpl.length > 0) {
      html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:var(--blue)">Implementacion (' + d.comercial.nombresImpl.length + ')</div>';
      html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.comercial.nombresImpl, 'green') + '</div></div>';
    }
    if (d.comercial.nombresFE.length > 0) {
      html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:#8b5cf6">Facturacion Electronica (' + d.comercial.nombresFE.length + ')</div>';
      html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.comercial.nombresFE, 'green') + '</div></div>';
    }
    if (d.comercial.nombresSinCat.length > 0) {
      html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:var(--light)">Sin categoria (' + d.comercial.nombresSinCat.length + ')</div>';
      html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.comercial.nombresSinCat, 'green') + '</div></div>';
    }
    if (d.comercial.nombresSoft.length > 0) {
      html += '<div class="dash-stat" style="min-width:180px"><div class="dash-stat-label" style="color:#8b5cf6">Software (' + d.comercial.nombresSoft.length + ')</div>';
      html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">' + pills(d.comercial.nombresSoft, 'green') + '</div></div>';
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

function hideAllViews() {
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('section-landing').classList.add('hidden');
  document.getElementById('module-view').classList.remove('active');
  document.getElementById('module-iframe').src = '';
}

async function goHome() {
  activeModule = null;
  activeSection = null;
  hideAllViews();
  document.getElementById('home-view').style.display = '';
  renderSidebar();

  // Refrescar dashboard
  try {
    var dashData = await loadDashboardData();
    renderDashboard(dashData);
  } catch(e) { console.error('Error refrescando dashboard:', e); }
}

function openSection(sectionId) {
  const section = MENU.find(s => s.id === sectionId);
  if (!section || !section.children) return;

  activeModule = null;
  activeSection = sectionId;
  hideAllViews();

  // Mostrar landing con las tarjetas de sub-modulos
  const landing = document.getElementById('section-landing');
  landing.classList.remove('hidden');
  document.getElementById('section-title').textContent = section.title;
  document.getElementById('section-desc').textContent = 'Selecciona un modulo para continuar.';

  const grid = document.getElementById('section-grid');
  grid.innerHTML = section.children.map(child => {
    const badgeClass = child.active ? 'badge-active' : 'badge-pending';
    const badgeText = child.active ? 'Activo' : 'Pendiente';
    const disabledClass = child.active ? '' : ' disabled';
    const onclick = child.active ? ' onclick="openModule(\'' + child.id + '\')"' : '';

    return '<div class="module-card' + disabledClass + '"' + onclick + '>' +
      '<div class="module-card-icon" style="background:' + section.iconBg + '">' + section.icon + '</div>' +
      '<div class="module-card-body">' +
        '<h3>' + child.title + '</h3>' +
        '<p>' + child.desc + '</p>' +
      '</div>' +
      '<span class="module-card-badge ' + badgeClass + '">' + badgeText + '</span>' +
    '</div>';
  }).join('');

  renderSidebar();
}

function openModule(moduleId) {
  const m = findModule(moduleId);
  if (!m || !m.active) return;

  activeModule = moduleId;

  // Detectar si pertenece a una seccion padre
  const parent = findParentSection(moduleId);
  activeSection = parent ? parent.id : null;

  hideAllViews();
  document.getElementById('module-view').classList.add('active');
  document.getElementById('module-iframe').src = m.href + '?embed=1';
  renderSidebar();
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const visible = MENU.filter(s => s.roles.includes(userRole));

  let html = '';

  // Home
  const isHome = activeModule === null && activeSection === null;
  html += '<button class="nav-item' + (isHome ? ' active' : '') + '" onclick="goHome()">';
  html += '<div class="nav-icon" style="background:' + (isHome ? 'rgba(255,255,255,0.15)' : '#f5f7fa') + '">';
  html += '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="' + (isHome ? 'white' : '#7c8495') + '" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
  html += '</div>';
  html += '<span class="nav-label">Inicio</span>';
  html += '</button>';

  html += '<div style="height:6px"></div>';

  visible.forEach(section => {
    if (section.children) {
      // Seccion con hijos: clic abre landing page
      const isActive = activeSection === section.id;
      const allDisabled = section.children.every(c => !c.active);

      html += '<button class="nav-item' + (isActive ? ' active' : '') + (allDisabled ? ' disabled' : '') + '" onclick="openSection(\'' + section.id + '\')">';
      html += '<div class="nav-icon" style="background:' + (isActive ? 'rgba(255,255,255,0.15)' : section.iconBg) + '">' + section.icon + '</div>';
      html += '<span class="nav-label">' + section.title + '</span>';
      html += '</button>';

    } else {
      // Modulo directo
      const isActive = activeModule === section.id;
      const disabledClass = section.active ? '' : ' disabled';

      html += '<button class="nav-item' + (isActive ? ' active' : '') + disabledClass + '" onclick="openModule(\'' + section.id + '\')">';
      html += '<div class="nav-icon" style="background:' + (isActive ? 'rgba(255,255,255,0.15)' : section.iconBg) + '">' + section.icon + '</div>';
      html += '<span class="nav-label">' + section.title + '</span>';
      html += '</button>';
    }
  });

  nav.innerHTML = html;
}

function renderModules() {
  const grid = document.getElementById('modules-grid');
  const allFlat = getAllModulesFlat().filter(m => m.roles.includes(userRole));

  grid.innerHTML = allFlat.map(m => {
    const badgeClass = m.active ? 'badge-active' : 'badge-pending';
    const badgeText = m.active ? 'Activo' : 'Pendiente';
    const disabledClass = m.active ? '' : ' disabled';
    const onclick = m.active ? ' onclick="openModule(\'' + m.id + '\')"' : '';
    const parentIcon = m.parentIcon || m.icon;
    const parentIconBg = m.parentIconBg || m.iconBg;
    const subtitle = m.parentTitle ? '<span style="font-size:0.68rem;color:var(--light);font-weight:400"> — ' + m.parentTitle + '</span>' : '';

    return '<div class="module-card' + disabledClass + '"' + onclick + '>' +
      '<div class="module-card-icon" style="background:' + (m.iconBg || parentIconBg) + '">' + parentIcon + '</div>' +
      '<div class="module-card-body">' +
        '<h3>' + m.title + subtitle + '</h3>' +
        '<p>' + m.desc + '</p>' +
      '</div>' +
      '<span class="module-card-badge ' + badgeClass + '">' + badgeText + '</span>' +
    '</div>';
  }).join('');
}

function renderWelcome() {
  const el = document.getElementById('welcome-banner');
  const firstName = userName.split(' ')[0];

  el.innerHTML =
    '<h2>' + getGreeting() + ', ' + firstName + '</h2>' +
    '<p>Resumen de la firma al dia de hoy.</p>' +
    '<div class="welcome-date">' + formatToday() + '</div>';
}

function renderUserInfo() {
  document.getElementById('user-avatar').textContent = getInitials(userName);
  document.getElementById('user-display-name').textContent = userName;
  document.getElementById('user-display-role').textContent = ROLE_LABELS[userRole] || userRole;
}

// ==================== AUTH ====================

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  if (!email || !password) {
    errorEl.textContent = 'Ingresa email y contrasena.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errorEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = 'Email o contrasena incorrectos.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  await loadUserProfile();
  showApp();
}

async function handleLogout() {
  await sb.auth.signOut();
  userRole = null;
  userName = '';
  activeModule = null;
  activeSection = null;
  document.getElementById('app-wrapper').classList.add('hidden');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('module-iframe').src = '';
}

async function loadUserProfile() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  const { data: profile } = await sb.from('profiles')
    .select('nombre, rol')
    .eq('id', user.id)
    .single();

  if (profile) {
    userRole = profile.rol;
    userName = profile.nombre || user.email;
  } else {
    userRole = 'contadora';
    userName = user.email;
  }
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrapper').classList.remove('hidden');

  renderUserInfo();
  renderSidebar();
  renderWelcome();

  // Cargar dashboard
  try {
    var dashData = await loadDashboardData();
    renderDashboard(dashData);
  } catch(e) {
    console.error('Error cargando dashboard:', e);
    document.getElementById('dashboard-kpis').innerHTML = '<div class="dash-loading">Error cargando datos.</div>';
  }
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadUserProfile();
    showApp();
  }
}

init();
</script>
