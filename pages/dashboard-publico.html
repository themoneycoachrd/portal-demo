<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Account One</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #1a2332;
  --blue: #4361ee;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --purple: #8b5cf6;
  --border: #e8ecf0;
  --muted: #64748b;
  --light: #a3aab8;
  --bg: #f8f9fb;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--navy);
}

.tv { display:flex; flex-direction:column; height:100vh; padding:16px 22px; gap:12px; }

/* Header */
.tv-header { display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.tv-logo { font-size:14px; font-weight:700; color:var(--navy); letter-spacing:0.5px; }
.tv-date { font-size:11px; color:var(--light); }

/* Sections (pills) */
.tv-sections { display:grid; grid-template-columns:1fr 1fr; gap:20px; flex-shrink:0; }
.tv-section-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:6px; }
.tv-pills { display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; }
.tv-pill { background:white; border:1px solid var(--border); border-radius:10px; padding:10px 10px 8px; text-align:center; }
.tv-pill-label { font-size:8px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); margin-bottom:2px; }
.tv-pill-value { font-size:22px; font-weight:800; line-height:1.2; }
.tv-pill-sub { font-size:8px; color:var(--light); margin-top:1px; }
.t-green { color:var(--green); }
.t-red { color:var(--red); }
.t-navy { color:var(--navy); }
.t-purple { color:var(--purple); }
.t-blue { color:var(--blue); }

/* Middle row: bars + tables */
.tv-mid { display:grid; grid-template-columns:1fr 1fr; gap:14px; flex-shrink:0; }
.tv-card { background:white; border:1px solid var(--border); border-radius:10px; padding:10px 14px; }
.tv-card-title { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:6px; }

/* Horizontal bars */
.bar-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
.bar-label { font-size:9px; color:var(--muted); width:24px; text-align:right; flex-shrink:0; font-weight:600; }
.bar-track { flex:1; height:14px; background:var(--bg); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; }
.bar-val { font-size:10px; font-weight:700; color:var(--navy); width:24px; flex-shrink:0; }

/* Tables */
.tv-tbl { width:100%; border-collapse:collapse; font-size:11px; }
.tv-tbl th { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; color:var(--light); padding:4px 5px; text-align:center; border-bottom:1px solid var(--border); }
.tv-tbl th:first-child { text-align:left; }
.tv-tbl td { padding:4px 5px; text-align:center; border-bottom:1px solid #f3f4f6; color:var(--navy); }
.tv-tbl td:first-child { text-align:left; color:var(--muted); font-weight:600; }
.tv-tbl .tg { color:var(--green); font-weight:600; }
.tv-tbl .tr { color:var(--red); font-weight:600; }
.tv-tbl .tb { font-weight:800; }

/* Bottom row: últimos clientes */
.tv-bottom { display:grid; grid-template-columns:1fr 1fr; gap:14px; flex:1; min-height:0; }
.tv-list-wrap { background:white; border:1px solid var(--border); border-radius:10px; padding:10px 14px; display:flex; flex-direction:column; overflow:hidden; }
.tv-list { flex:1; overflow:hidden; }
.client-row { display:flex; align-items:center; padding:6px 0; border-bottom:1px solid #f3f4f6; }
.client-row:last-child { border-bottom:none; }
.client-badge { font-size:8px; font-weight:700; text-transform:uppercase; padding:2px 8px; border-radius:8px; flex-shrink:0; margin-right:10px; }
.badge-new { background:#ecfdf5; color:var(--green); }
.badge-churn { background:#fef2f2; color:var(--red); }
.badge-sw { background:#f5f3ff; color:var(--purple); }
.client-name { font-size:12px; font-weight:600; color:var(--navy); flex:1; }
.client-date { font-size:10px; color:var(--light); flex-shrink:0; }
.client-tipo { font-size:9px; color:var(--muted); margin-left:8px; flex-shrink:0; font-weight:600; }

/* Loading */
.loading { text-align:center; padding:80px 20px; color:var(--muted); font-size:0.9rem; }
</style>
</head>
<body>

<div class="tv" id="dashboard">
  <div class="loading">Cargando dashboard...</div>
</div>

<script>
var SUPABASE_URL = 'https://ouetusstqvpyjeycfdio.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZXR1c3N0cXZweWpleWNmZGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDcwNzksImV4cCI6MjA5MjIyMzA3OX0.Bsys947JLGEuf3zdBF2GPFdbJVJtaZdC4YEmyBU5Bow';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var MESES_LABEL = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function todayStr() {
  var d = new Date();
  return d.getDate() + ' ' + ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][d.getMonth()] + ' ' + d.getFullYear();
}

function fmtMoney(n) {
  if (n >= 1000) return '$' + Math.round(n/1000) + 'k';
  return '$' + n.toLocaleString();
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  var parts = dateStr.split('-');
  return parseInt(parts[2]) + ' ' + MESES_LABEL[parseInt(parts[1])-1];
}

async function init() {
  var [resC, resSw] = await Promise.all([
    sb.from('clientes').select('nombre, fecha_entrada, fecha_salida, activo, monto_adm, responsabilidad_contabilidad'),
    sb.from('clientes_software').select('*')
  ]);
  var clientes = resC.data || [];
  var software = resSw.data || [];

  var now = new Date();
  var currentMonth = now.getMonth();

  // ─── OUTSOURCING ───
  var outData = [];
  for (var m = 0; m <= currentMonth; m++) {
    var year = 2026;
    var lastDay = new Date(year, m + 1, 0);
    var lastDayStr = year + '-' + String(m+1).padStart(2,'0') + '-' + String(lastDay.getDate()).padStart(2,'0');

    var nuevos = clientes.filter(function(c) {
      if (!c.fecha_entrada) return false;
      var d = new Date(c.fecha_entrada + 'T00:00:00');
      return d.getFullYear() === 2026 && d.getMonth() === m;
    });
    var churn = clientes.filter(function(c) {
      if (!c.fecha_salida) return false;
      var d = new Date(c.fecha_salida + 'T00:00:00');
      return d.getFullYear() === 2026 && d.getMonth() === m;
    });
    var activos = clientes.filter(function(c) {
      if (!c.fecha_entrada) return false;
      if (c.fecha_entrada > lastDayStr) return false;
      if (c.fecha_salida && c.fecha_salida <= lastDayStr) return false;
      return true;
    });
    var servTotal = activos.reduce(function(sum, c) {
      if (c.responsabilidad_contabilidad === false) return sum;
      return sum + (parseInt(c.monto_adm) || 0);
    }, 0);

    outData.push({ mes:m, total:activos.length, nuevos:nuevos.length, churn:churn.length, servTotal:servTotal,
      nuevosNames: nuevos.map(function(c){return {n:c.nombre, f:c.fecha_entrada}}),
      churnNames: churn.map(function(c){return {n:c.nombre, f:c.fecha_salida}})
    });
  }

  var baseLine = outData.length > 0 ? outData[0].total - outData[0].nuevos + outData[0].churn : 0;

  // ─── SOFTWARE ───
  var swClientes = software.map(function(r) {
    return { nombre:r.nombre, monto:parseFloat(r.monto_mensual)||0, fecha_entrada:r.fecha_entrada, fecha_salida:r.fecha_salida, activo:r.activo !== false };
  });
  var baseCount = swClientes.filter(function(c) { return c.fecha_entrada && c.fecha_entrada < '2026-01-01'; }).length;

  var swData = [];
  var swRunning = baseCount;
  for (var m = 0; m <= currentMonth; m++) {
    var nuevos = swClientes.filter(function(c) {
      if (!c.fecha_entrada) return false;
      var d = new Date(c.fecha_entrada + 'T00:00:00');
      return d.getFullYear() === 2026 && d.getMonth() === m;
    });
    var churn = swClientes.filter(function(c) {
      if (!c.fecha_salida) return false;
      var d = new Date(c.fecha_salida + 'T00:00:00');
      return d.getFullYear() === 2026 && d.getMonth() === m;
    });
    swRunning = swRunning + nuevos.length - churn.length;

    var year = 2026;
    var lastDay = new Date(year, m + 1, 0);
    var lastDayStr = year + '-' + String(m+1).padStart(2,'0') + '-' + String(lastDay.getDate()).padStart(2,'0');
    var activosSw = swClientes.filter(function(c) {
      if (!c.fecha_entrada) return false;
      if (c.fecha_entrada > lastDayStr) return false;
      if (c.fecha_salida && c.fecha_salida <= lastDayStr) return false;
      return true;
    });
    var monto = activosSw.reduce(function(sum, c) { return sum + c.monto; }, 0);

    swData.push({ mes:m, total:swRunning, nuevos:nuevos.length, churn:churn.length, monto:monto,
      nuevosNames: nuevos.map(function(c){return {n:c.nombre, f:c.fecha_entrada}}),
      churnNames: churn.map(function(c){return {n:c.nombre, f:c.fecha_salida}})
    });
  }

  // ─── CÁLCULOS RESUMEN ───
  var last = outData[outData.length - 1] || { total:0, nuevos:0, churn:0 };
  var totalNuevos = outData.reduce(function(s,d){return s+d.nuevos},0);
  var totalChurn = outData.reduce(function(s,d){return s+d.churn},0);
  var crecPct = baseLine > 0 ? ((last.total - baseLine) / baseLine * 100) : 0;
  var crecNeto = last.total - baseLine;
  var crecSign = crecNeto >= 0 ? '+' : '';
  var crecClass = crecNeto >= 0 ? 't-green' : 't-red';
  var nuevoPct = baseLine > 0 ? (totalNuevos / baseLine * 100).toFixed(0) : 0;
  var churnPct = baseLine > 0 ? (totalChurn / baseLine * 100).toFixed(0) : 0;

  var swLast = swData[swData.length - 1] || { total:0, nuevos:0, churn:0, monto:0 };
  var swTotalNuevos = swData.reduce(function(s,d){return s+d.nuevos},0);
  var swTotalChurn = swData.reduce(function(s,d){return s+d.churn},0);
  var swCrecPct = baseCount > 0 ? ((swLast.total - baseCount) / baseCount * 100) : 0;
  var swCrecNeto = swLast.total - baseCount;
  var swCrecSign = swCrecNeto >= 0 ? '+' : '';
  var swCrecClass = swCrecNeto >= 0 ? 't-green' : 't-red';
  var swNuevoPct = baseCount > 0 ? (swTotalNuevos / baseCount * 100).toFixed(0) : 0;
  var swChurnPct = baseCount > 0 ? (swTotalChurn / baseCount * 100).toFixed(0) : 0;

  var outMax = Math.max.apply(null, outData.map(function(d){return d.total})) || 1;
  var swMax = Math.max.apply(null, swData.map(function(d){return d.total})) || 1;

  // ─── ÚLTIMOS CLIENTES (movimientos recientes) ───
  var movimientos = [];
  // Outsourcing nuevos y churn
  for (var i = 0; i < outData.length; i++) {
    for (var j = 0; j < outData[i].nuevosNames.length; j++) {
      var c = outData[i].nuevosNames[j];
      movimientos.push({ nombre:c.n, fecha:c.f, tipo:'nuevo', linea:'Outsourcing' });
    }
    for (var j = 0; j < outData[i].churnNames.length; j++) {
      var c = outData[i].churnNames[j];
      movimientos.push({ nombre:c.n, fecha:c.f, tipo:'churn', linea:'Outsourcing' });
    }
  }
  // Software nuevos y churn
  for (var i = 0; i < swData.length; i++) {
    for (var j = 0; j < swData[i].nuevosNames.length; j++) {
      var c = swData[i].nuevosNames[j];
      movimientos.push({ nombre:c.n, fecha:c.f, tipo:'nuevo', linea:'Software' });
    }
    for (var j = 0; j < swData[i].churnNames.length; j++) {
      var c = swData[i].churnNames[j];
      movimientos.push({ nombre:c.n, fecha:c.f, tipo:'churn', linea:'Software' });
    }
  }
  // Ordenar por fecha más reciente primero
  movimientos.sort(function(a,b) { return (b.fecha||'').localeCompare(a.fecha||''); });

  var nuevosRecientes = movimientos.filter(function(m){return m.tipo === 'nuevo'});
  var churnRecientes = movimientos.filter(function(m){return m.tipo === 'churn'});

  // ─── RENDER ───
  var html = '';

  // Header
  html += '<div class="tv-header"><span class="tv-logo">Account One</span><span class="tv-date">' + todayStr() + '</span></div>';

  // Pills
  html += '<div class="tv-sections">';
  html += '<div><div class="tv-section-label">Outsourcing</div><div class="tv-pills">';
  html += '<div class="tv-pill"><div class="tv-pill-label">Clientes</div><div class="tv-pill-value t-navy">' + last.total + '</div><div class="tv-pill-sub">' + MESES_LABEL[currentMonth] + ' 2026</div></div>';
  html += '<div class="tv-pill"><div class="tv-pill-label">Nuevos</div><div class="tv-pill-value t-green">' + totalNuevos + '</div><div class="tv-pill-sub">' + nuevoPct + '% crecimiento</div></div>';
  html += '<div class="tv-pill"><div class="tv-pill-label">Churn</div><div class="tv-pill-value t-red">' + totalChurn + '</div><div class="tv-pill-sub">' + churnPct + '% churn</div></div>';
  html += '<div class="tv-pill"><div class="tv-pill-label">Crecimiento</div><div class="tv-pill-value ' + crecClass + '">' + crecSign + crecPct.toFixed(1) + '%</div><div class="tv-pill-sub">' + crecSign + crecNeto + ' neto</div></div>';
  html += '</div></div>';
  html += '<div><div class="tv-section-label">Software</div><div class="tv-pills">';
  html += '<div class="tv-pill"><div class="tv-pill-label">Clientes</div><div class="tv-pill-value t-purple">' + swLast.total + '</div><div class="tv-pill-sub">' + MESES_LABEL[currentMonth] + ' 2026</div></div>';
  html += '<div class="tv-pill"><div class="tv-pill-label">Nuevos</div><div class="tv-pill-value t-green">' + swTotalNuevos + '</div><div class="tv-pill-sub">' + swNuevoPct + '% crecimiento</div></div>';
  html += '<div class="tv-pill"><div class="tv-pill-label">Churn</div><div class="tv-pill-value t-red">' + swTotalChurn + '</div><div class="tv-pill-sub">' + swChurnPct + '% churn</div></div>';
  html += '<div class="tv-pill"><div class="tv-pill-label">Crecimiento</div><div class="tv-pill-value ' + swCrecClass + '">' + swCrecSign + swCrecPct.toFixed(1) + '%</div><div class="tv-pill-sub">' + swCrecSign + swCrecNeto + ' neto</div></div>';
  html += '</div></div>';
  html += '</div>';

  // Evolution bars + Summary tables (2x2 grid)
  html += '<div class="tv-mid">';

  // Outsourcing bars
  html += '<div class="tv-card"><div class="tv-card-title">Evolución outsourcing</div>';
  for (var i = 0; i < outData.length; i++) {
    var pct = (outData[i].total / outMax * 100).toFixed(0);
    html += '<div class="bar-row"><span class="bar-label">' + MESES_LABEL[outData[i].mes] + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--blue)"></div></div><span class="bar-val">' + outData[i].total + '</span></div>';
  }
  html += '</div>';

  // Software bars
  html += '<div class="tv-card"><div class="tv-card-title">Evolución software</div>';
  for (var i = 0; i < swData.length; i++) {
    var pct = (swData[i].total / swMax * 100).toFixed(0);
    html += '<div class="bar-row"><span class="bar-label">' + MESES_LABEL[swData[i].mes] + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--purple)"></div></div><span class="bar-val">' + swData[i].total + '</span></div>';
  }
  html += '</div>';

  // Outsourcing table
  html += '<div class="tv-card"><div class="tv-card-title">Resumen mensual outsourcing</div><table class="tv-tbl">';
  html += '<thead><tr><th>Mes</th><th>Inicio</th><th>Nuevos</th><th>Churn</th><th>Neto</th><th>Cierre</th><th>%</th></tr></thead><tbody>';
  var runBase = baseLine;
  for (var i = 0; i < outData.length; i++) {
    var d = outData[i];
    var inicio = runBase;
    var neto = d.nuevos - d.churn;
    var pct = inicio > 0 ? ((neto / inicio) * 100).toFixed(1) : '0.0';
    html += '<tr><td>' + MESES_LABEL[d.mes] + '</td><td>' + inicio + '</td><td class="tg">' + d.nuevos + '</td><td class="tr">' + d.churn + '</td><td>' + (neto>=0?'+':'') + neto + '</td><td class="tb">' + d.total + '</td><td>' + (neto>=0?'+':'') + pct + '%</td></tr>';
    runBase = d.total;
  }
  html += '</tbody></table></div>';

  // Software table
  html += '<div class="tv-card"><div class="tv-card-title">Resumen mensual software</div><table class="tv-tbl">';
  html += '<thead><tr><th>Mes</th><th>Inicio</th><th>Nuevos</th><th>Churn</th><th>Neto</th><th>Cierre</th><th>%</th><th>Monto</th></tr></thead><tbody>';
  var swRunBase = baseCount;
  for (var i = 0; i < swData.length; i++) {
    var d = swData[i];
    var inicio = swRunBase;
    var neto = d.nuevos - d.churn;
    var pct = inicio > 0 ? ((neto / inicio) * 100).toFixed(1) : '0.0';
    html += '<tr><td>' + MESES_LABEL[d.mes] + '</td><td>' + inicio + '</td><td class="tg">' + d.nuevos + '</td><td class="tr">' + d.churn + '</td><td>' + (neto>=0?'+':'') + neto + '</td><td class="tb">' + d.total + '</td><td>' + (neto>=0?'+':'') + pct + '%</td><td>' + fmtMoney(d.monto) + '</td></tr>';
    swRunBase = d.total;
  }
  html += '</tbody></table></div>';
  html += '</div>';

  // Bottom: últimos clientes
  html += '<div class="tv-bottom">';

  // Nuevos clientes
  html += '<div class="tv-list-wrap"><div class="tv-card-title">Clientes nuevos en 2026</div><div class="tv-list">';
  if (nuevosRecientes.length === 0) {
    html += '<div style="padding:12px 0;color:var(--light);font-size:11px">Sin movimientos</div>';
  } else {
    for (var i = 0; i < nuevosRecientes.length; i++) {
      var m = nuevosRecientes[i];
      var badgeClass = m.linea === 'Software' ? 'badge-sw' : 'badge-new';
      html += '<div class="client-row">';
      html += '<span class="client-badge ' + badgeClass + '">' + (m.linea === 'Software' ? 'SW' : 'OUT') + '</span>';
      html += '<span class="client-name">' + m.nombre + '</span>';
      html += '<span class="client-date">' + fmtDate(m.fecha) + '</span>';
      html += '</div>';
    }
  }
  html += '</div></div>';

  // Churn
  html += '<div class="tv-list-wrap"><div class="tv-card-title">Bajas en 2026</div><div class="tv-list">';
  if (churnRecientes.length === 0) {
    html += '<div style="padding:12px 0;color:var(--light);font-size:11px">Sin bajas</div>';
  } else {
    for (var i = 0; i < churnRecientes.length; i++) {
      var m = churnRecientes[i];
      html += '<div class="client-row">';
      html += '<span class="client-badge badge-churn">' + (m.linea === 'Software' ? 'SW' : 'OUT') + '</span>';
      html += '<span class="client-name">' + m.nombre + '</span>';
      html += '<span class="client-date">' + fmtDate(m.fecha) + '</span>';
      html += '</div>';
    }
  }
  html += '</div></div>';

  html += '</div>';

  document.getElementById('dashboard').innerHTML = html;
}

init();
setInterval(init, 5 * 60 * 1000);
</script>
</body>
</html>
