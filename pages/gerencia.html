<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerencia — Account One 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #1a2332;
    --navy-mid: #2a3a4e;
    --blue: #4361ee;
    --green: #10b981;
    --red: #ef4444;
    --amber: #f59e0b;
    --purple: #8b5cf6;
    --pink: #ec4899;
    --orange: #f97316;
    --indigo: #6366f1;
    --bg: #f4f6f9;
    --card: #ffffff;
    --border: #e8ecf1;
    --text: #1a2332;
    --muted: #7c8495;
    --light: #a3aab8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }

  /* ─── Header ─── */
  .header { background:var(--navy); color:white; padding:20px 24px; }
  .header-inner { display:flex; justify-content:space-between; align-items:center; }
  .header h1 { font-size:1.3rem; font-weight:700; }
  .header p { font-size:0.85rem; opacity:0.6; margin-top:2px; }

  /* ─── Breadcrumb ─── */
  .breadcrumb-bar { display:flex; align-items:center; gap:6px; padding:10px 24px; background:white; border-bottom:1px solid var(--border); font-size:13px; }
  .breadcrumb-bar a { color:var(--muted); text-decoration:none; font-weight:500; }
  .breadcrumb-bar a:hover { color:var(--navy); text-decoration:underline; }
  .breadcrumb-bar .sep { color:var(--light); font-size:11px; }
  .breadcrumb-bar .current { color:var(--text); font-weight:600; }

  /* ─── Main tabs (gerencia level) ─── */
  .main-tabs { display:flex; background:var(--card); border-bottom:2px solid var(--border); }
  .main-tab { padding:12px 24px; cursor:pointer; font-weight:600; font-size:0.95rem; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.2s; background:none; border-top:none; border-left:none; border-right:none; }
  .main-tab:hover { color:var(--text); }
  .main-tab.active { color:var(--navy); border-bottom-color:var(--navy); }

  /* ─── CC sub-tabs (Dashboard/Impl/Software/Perfiles) ─── */
  .sub-tabs { display:flex; gap:4px; padding:10px 24px; background:#f4f6f9; border-bottom:1px solid var(--border); overflow-x:auto; }
  .sub-tab { padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:white; color:var(--muted); white-space:nowrap; transition:all 0.15s; }
  .sub-tab:hover { background:#e2e8f0; }
  .sub-tab.active { background:var(--navy); color:white; border-color:var(--navy); }
  .sub-tab.disabled { opacity:0.35; cursor:not-allowed; }

  /* ─── Content ─── */
  .content { padding:20px 24px; max-width:1200px; margin:0 auto; }

  /* ─── Stats (CC) ─── */
  .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px; margin-bottom:20px; }
  .stat { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); }
  .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--light); }
  .stat-value { font-size:28px; font-weight:800; margin-top:4px; }
  .stat-sub { font-size:11px; color:var(--light); margin-top:4px; }
  .stat-green { color:var(--green); }
  .stat-red { color:var(--red); }
  .cc-serv-stat { transition:border-color 0.15s, box-shadow 0.15s; }
  .cc-serv-stat:hover { border-color:var(--blue); }
  .cc-serv-stat.active { border-color:var(--navy); box-shadow:0 0 0 2px rgba(26,35,50,0.15); }

  /* ─── Cards ─── */
  .card { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); margin-bottom:16px; }
  .card h3 { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:12px; }

  .note { background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:10px 14px; font-size:12px; color:#92400e; margin-bottom:16px; }

  /* ─── Bar rows (CC) ─── */
  .bar-row { display:flex; align-items:center; gap:10px; padding:6px 0; }
  .bar-name { font-size:13px; font-weight:600; width:100px; min-width:100px; color:var(--text); }
  .bar-track { flex:1; height:24px; background:#f1f5f9; border-radius:6px; overflow:hidden; position:relative; }
  .bar-fill { height:100%; border-radius:6px; display:flex; align-items:center; padding-left:8px; transition:width 0.4s ease; min-width:30px; }
  .bar-fill span { font-size:11px; font-weight:700; color:white; }
  .bar-extra { font-size:11px; color:var(--muted); width:60px; text-align:right; }

  /* ─── Client groups (CC) ─── */
  .client-group { margin-bottom:16px; }
  .client-group-header { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .client-dot { width:10px; height:10px; border-radius:50%; }
  .client-group-name { font-size:13px; font-weight:600; }
  .client-group-count { font-size:11px; color:var(--light); }
  .badges { display:flex; flex-wrap:wrap; gap:5px; margin-left:16px; }
  .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:500; border:1px solid; }
  .badge-neutral { background:#f9fafb; color:#4b5563; border-color:#e5e7eb; }
  .badge-new { background:#ecfdf5; color:#065f46; border-color:#a7f3d0; }
  .badge-churn { background:#fef2f2; color:#991b1b; border-color:#fecaca; }

  /* ─── Charts (CC) ─── */
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  @media (max-width:768px) { .charts-grid { grid-template-columns:1fr; } }

  /* ─── Tables ─── */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { text-align:left; padding:8px 10px; background:#f8fafc; border-bottom:2px solid var(--border); font-weight:700; color:var(--muted); text-transform:uppercase; font-size:10px; letter-spacing:0.5px; }
  td { padding:8px 10px; border-bottom:1px solid #f1f5f9; }
  tr:hover td { background:#fafbfc; }

  .empty { text-align:center; padding:60px 20px; color:var(--light); font-size:14px; }
  .footer { text-align:center; font-size:11px; color:var(--light); padding:20px; }

  /* ─── Toggle / contadora cards (CC) ─── */
  .toggle-row { display:flex; gap:8px; margin-bottom:12px; }
  .toggle-btn { padding:6px 12px; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:white; color:var(--muted); }
  .toggle-btn.active { background:var(--navy); color:white; border-color:var(--navy); }

  .contadora-card { border:1px solid var(--border); border-radius:10px; margin-bottom:10px; overflow:hidden; transition:all 0.2s; }
  .contadora-card:hover { border-color:#cbd5e1; }
  .cc-contadora-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; background:white; transition:background 0.15s; }
  .cc-contadora-header:hover { background:#fafbfc; }
  .cc-contadora-header.expanded { background:#f1f5f9; border-bottom:1px solid var(--border); }
  .contadora-color { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .contadora-info { flex:1; }
  .contadora-name-row { display:flex; align-items:center; gap:8px; }
  .contadora-title { font-size:14px; font-weight:700; }
  .contadora-pills { display:flex; gap:6px; flex-wrap:wrap; }
  .pill { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }
  .pill-blue { background:#eff6ff; color:#1d4ed8; }
  .pill-amber { background:#fffbeb; color:#b45309; }
  .pill-green { background:#ecfdf5; color:#065f46; }
  .pill-red { background:#fef2f2; color:#991b1b; }
  .contadora-arrow { font-size:16px; color:var(--light); transition:transform 0.2s; }
  .contadora-arrow.open { transform:rotate(180deg); }
  .contadora-detail { padding:0; max-height:0; overflow:hidden; transition:max-height 0.3s ease, padding 0.3s ease; background:#fafbfc; }
  .contadora-detail.open { max-height:800px; padding:16px; }
  .detail-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
  .detail-stat { background:white; border-radius:8px; padding:10px; border:1px solid #f1f5f9; text-align:center; }
  .detail-stat-label { font-size:10px; text-transform:uppercase; color:var(--light); letter-spacing:0.3px; }
  .detail-stat-value { font-size:18px; font-weight:800; margin-top:2px; }
  .detail-table { width:100%; border-collapse:collapse; font-size:12px; }
  .detail-table th { text-align:left; padding:6px 10px; background:#f1f5f9; font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:0.3px; border:none; }
  .detail-table td { padding:6px 10px; border-bottom:1px solid #f1f5f9; }
  .gap-positive { color:var(--green); }
  .gap-negative { color:var(--red); }
  .utilization-bar { width:60px; height:6px; background:#f1f5f9; border-radius:3px; display:inline-block; overflow:hidden; vertical-align:middle; margin-left:4px; }
  .utilization-fill { height:100%; border-radius:3px; }

  /* ─── Implementacion cards (CC) ─── */
  .impl-card { background:white; border-radius:12px; border:1px solid var(--border); padding:20px; margin-bottom:14px; }
  .impl-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .impl-name { font-size:16px; font-weight:800; }
  .impl-status { padding:4px 12px; border-radius:8px; font-size:12px; font-weight:700; }
  .impl-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px; }
  .impl-item { background:#f8fafc; border-radius:8px; padding:10px; text-align:center; }
  .impl-item-label { font-size:10px; text-transform:uppercase; color:var(--light); letter-spacing:0.3px; }
  .impl-item-value { font-size:14px; font-weight:700; margin-top:2px; }
  .impl-progress { width:100%; height:8px; background:#f1f5f9; border-radius:4px; overflow:hidden; }
  .impl-progress-fill { height:100%; border-radius:4px; transition:width 0.3s; }
  .impl-timeline { display:flex; justify-content:space-between; margin-top:6px; }
  .impl-timeline span { font-size:10px; color:var(--light); }
  @media (max-width:600px) { .impl-grid { grid-template-columns:repeat(2,1fr); } }

  /* ─── Perfiles (CC) ─── */
  .perfil-card { background:white; border-radius:12px; border:1px solid var(--border); margin-bottom:14px; overflow:hidden; }
  .perfil-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer; transition:background 0.15s; }
  .perfil-header:hover { background:#fafbfc; }
  .perfil-header.expanded { background:#f1f5f9; border-bottom:1px solid var(--border); }
  .perfil-name { font-size:15px; font-weight:700; }
  .perfil-status { padding:3px 10px; border-radius:8px; font-size:11px; font-weight:600; }
  .perfil-arrow { font-size:16px; color:var(--light); transition:transform 0.2s; }
  .perfil-arrow.open { transform:rotate(180deg); }
  .perfil-body { padding:0; max-height:0; overflow:hidden; transition:max-height 0.4s ease, padding 0.4s ease; }
  .perfil-body.open { max-height:1200px; padding:20px; }
  .perfil-section { margin-bottom:16px; }
  .perfil-section-title { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--light); font-weight:700; margin-bottom:8px; }
  .perfil-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:600px) { .perfil-grid { grid-template-columns:1fr; } }
  .perfil-field { background:#f8fafc; border-radius:8px; padding:10px 14px; }
  .perfil-field-label { font-size:10px; text-transform:uppercase; letter-spacing:0.3px; color:var(--light); font-weight:600; margin-bottom:3px; }
  .perfil-field-value { font-size:14px; font-weight:600; color:var(--text); }
  .perfil-field-input { width:100%; border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-size:13px; font-family:inherit; background:white; }
  .perfil-field-input:focus { outline:none; border-color:var(--blue); }
  .perfil-actions { display:flex; gap:8px; margin-top:10px; }
  .perfil-btn { padding:8px 16px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:white; color:var(--muted); transition:all 0.15s; }
  .perfil-btn:hover { background:#f1f5f9; }
  .perfil-btn-primary { background:var(--navy); color:white; border-color:var(--navy); }
  .perfil-btn-primary:hover { background:var(--navy-mid); }
  .perfil-btn-danger { color:var(--red); border-color:#fecaca; }
  .perfil-btn-danger:hover { background:#fef2f2; }
  .perfil-empty { text-align:center; padding:40px 20px; color:var(--light); }
  .perfil-empty p { font-size:14px; margin-bottom:16px; }

  /* ─── CTD: Month tabs (pill style) ─── */
  .month-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px; }
  .month-tab { padding:6px 14px; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:500; background:var(--card); border:1px solid var(--border); color:var(--muted); transition:all 0.2s; }
  .month-tab:hover { border-color:var(--blue); color:var(--blue); }
  .month-tab.active { background:var(--navy); color:white; border-color:var(--navy); }

  /* ─── CTD: Contadora filter pills ─── */
  .ctd-contadora-pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
  .contadora-pill { padding:6px 16px; border-radius:20px; cursor:pointer; font-size:0.82rem; font-weight:600; background:var(--card); border:1px solid var(--border); color:var(--muted); transition:all 0.2s; }
  .contadora-pill:hover { border-color:var(--navy); color:var(--navy); }
  .contadora-pill.active { background:var(--navy); color:white; border-color:var(--navy); }

  /* ─── CTD: KPI Dashboard ─── */
  .kpi-dashboard { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; margin-bottom:24px; }
  .kpi-card { background:white; border-radius:12px; border:1px solid var(--border); padding:18px 20px; }
  .kpi-card-title { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); font-weight:700; margin-bottom:10px; }
  .kpi-card-value { font-size:1.6rem; font-weight:800; margin-bottom:6px; }
  .kpi-card-sub { font-size:0.72rem; color:var(--light); margin-bottom:10px; }
  .kpi-bar-bg { height:8px; background:#f1f3f7; border-radius:4px; overflow:hidden; }
  .kpi-bar-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }

  /* ─── CTD: Mini KPI bars ─── */
  .mini-kpis { display:flex; gap:16px; padding:0 20px 14px; flex-wrap:wrap; }
  .mini-kpi { flex:1; min-width:120px; }
  .mini-kpi-label { font-size:0.68rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.3px; margin-bottom:4px; }
  .mini-kpi-row { display:flex; align-items:center; gap:8px; }
  .mini-kpi-bar-bg { flex:1; height:6px; background:#f1f3f7; border-radius:3px; overflow:hidden; }
  .mini-kpi-bar-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }
  .mini-kpi-pct { font-size:0.75rem; font-weight:700; min-width:36px; text-align:right; }

  /* ─── CTD: Contadora expandable section ─── */
  .contadora-section { background:white; border-radius:12px; border:1px solid var(--border); margin-bottom:14px; overflow:hidden; }
  .ctd-contadora-header { display:flex; align-items:center; gap:14px; padding:16px 20px; cursor:pointer; transition:background 0.12s; }
  .ctd-contadora-header:hover { background:#fafbfc; }
  .ctd-contadora-header.expanded { background:#f5f7fa; border-bottom:1px solid var(--border); }
  .contadora-header-avatar { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.9rem; flex-shrink:0; }
  .contadora-header-info { flex:1; }
  .contadora-header-name { font-size:0.95rem; font-weight:700; }
  .contadora-header-count { font-size:0.75rem; color:var(--muted); }
  .contadora-header-arrow { font-size:14px; color:var(--light); transition:transform 0.2s; }
  .contadora-header-arrow.open { transform:rotate(180deg); }
  .contadora-body { max-height:0; overflow:hidden; transition:max-height 0.35s ease; }
  .contadora-body.open { max-height:5000px; }

  /* ─── CTD: Semaforo table ─── */
  .report-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  .report-table thead th { text-align:left; padding:12px 14px; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); background:#f8f9fb; border-bottom:2px solid var(--border); font-weight:700; }
  .report-table thead th.center { text-align:center; }
  .report-table tbody td { padding:12px 14px; border-bottom:1px solid #f1f3f7; vertical-align:middle; }
  .report-table tbody td.center { text-align:center; }
  .report-table tbody tr:hover td { background:#fafbfc; }
  .report-table tbody tr:last-child td { border-bottom:none; }
  .client-name-cell { font-weight:600; font-size:0.85rem; }

  /* ─── CTD: Semaforo dots ─── */
  .semaforo { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; font-size:12px; font-weight:700; }
  .sem-green { background:#ecfdf5; color:#059669; }
  .sem-yellow { background:#fffbeb; color:#d97706; }
  .sem-red { background:#fef2f2; color:#dc2626; }
  .sem-gray { background:#f5f7fa; color:var(--light); }
  .sem-link { font-size:11px; color:var(--blue); text-decoration:none; display:block; margin-top:2px; }
  .sem-link:hover { text-decoration:underline; }
  .sem-date { font-size:10px; color:var(--light); display:block; margin-top:1px; }

  /* ─── CTD: Contadora edit view ─── */
  .edit-card { background:white; border-radius:12px; border:1px solid var(--border); margin-bottom:14px; overflow:hidden; }
  .edit-header { display:flex; align-items:center; gap:12px; padding:16px 20px; cursor:pointer; transition:background 0.12s; }
  .edit-header:hover { background:#fafbfc; }
  .edit-header.expanded { background:#f5f7fa; border-bottom:1px solid var(--border); }
  .edit-client-name { font-size:0.95rem; font-weight:700; flex:1; }
  .edit-status { font-size:0.72rem; font-weight:600; padding:3px 10px; border-radius:8px; }
  .edit-arrow { font-size:14px; color:var(--light); transition:transform 0.2s; }
  .edit-arrow.open { transform:rotate(180deg); }
  .edit-body { max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
  .edit-body.open { max-height:800px; padding:20px; }
  .edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .edit-field { background:var(--bg); border-radius:10px; padding:14px; }
  .edit-field-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.3px; color:var(--muted); font-weight:700; margin-bottom:8px; }
  .edit-field input { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:0.85rem; font-family:inherit; background:white; }
  .edit-field input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(67,97,238,0.1); }
  .edit-field-row { display:flex; gap:8px; }
  .edit-field-row input { flex:1; }
  .edit-field-hint { font-size:0.68rem; color:var(--light); margin-top:4px; }
  .edit-save { margin-top:16px; display:flex; gap:8px; }
  .btn { padding:8px 18px; border-radius:8px; font-size:0.82rem; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all 0.12s; }
  .btn-primary { background:var(--navy); color:white; }
  .btn-primary:hover { background:var(--navy-mid); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }

  /* ─── CTD: Client table (admin) ─── */
  .ctd-client-table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; border:1px solid var(--border); }
  .ctd-client-table th { background:#f8f9fb; padding:10px 12px; text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); font-weight:700; border-bottom:1px solid var(--border); }
  .ctd-client-table td { padding:10px 12px; font-size:0.82rem; border-bottom:1px solid #f0f2f5; }
  .ctd-client-table tr:hover td { background:#fafbfc; cursor:pointer; }
  .ctd-client-table tr:last-child td { border-bottom:none; }
  .ctd-client-name { font-weight:600; color:var(--navy); }
  .ctd-client-name:hover { color:var(--blue); text-decoration:underline; }
  .ctd-progress-bar { width:100px; height:8px; background:#eef0f4; border-radius:4px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:6px; }
  .ctd-progress-fill { height:100%; border-radius:4px; }
  .ctd-progress-text { font-size:0.75rem; color:var(--muted); }

  /* ─── BD: Contadoras table ─── */

// Helpers para calcular mes a partir de fecha
function ccMonthIdx(dateStr) {
  if (!dateStr) return -1;
  var parts = dateStr.split('-');
  if (parts.length < 2) return -1;
  return parseInt(parts[1], 10) - 1; // 0-based
}
function ccYear(dateStr) {
  if (!dateStr) return 0;
  return parseInt(dateStr.split('-')[0], 10);
}

async function ccLoadData() {
  var data = {};
  MESES.forEach(function(m) { data[m] = null; });

  // 1. Cargar todos los clientes de la maestra
  var { data: clientes } = await sb.from('clientes').select('nombre, fecha_entrada, fecha_salida, activo, monto_adm, contadora_contabilidad, contadora_impuestos, responsabilidad_contabilidad, tipo_servicio, rnc');
  clientes = clientes || [];
  ccAllClientes = clientes;

  // 2. Cargar asignaciones para el detalle por contadora (serv/adm por mes)
  var { data: asig } = await sb.from('asignaciones').select('*').eq('anio', 2026);
  asig = asig || [];

  // 3. Cargar notas de meses_resumen (si existen, solo para las notas)
  var { data: resumen } = await sb.from('meses_resumen').select('mes, notas').eq('anio', 2026);
  var notasPorMes = {};
  (resumen || []).forEach(function(r) { if (r.notas) notasPorMes[r.mes] = r.notas; });

  // 4. Para cada mes, calcular movimientos desde la maestra
  var currentMonthIdx = new Date().getMonth(); // 0-based (0=jan)

  MESES.forEach(function(mes, mesIdx) {
    // Solo generar datos hasta el mes actual
    if (mesIdx > currentMonthIdx) return;

    // Nuevos: fecha_entrada cae en este mes y año 2026
    var nuevos = [];
    var churn = [];

    clientes.forEach(function(c) {
      if (c.fecha_entrada && ccYear(c.fecha_entrada) === 2026 && ccMonthIdx(c.fecha_entrada) === mesIdx) {
        nuevos.push(c.nombre);
      }
      if (c.fecha_salida && ccYear(c.fecha_salida) === 2026 && ccMonthIdx(c.fecha_salida) === mesIdx) {
        churn.push(c.nombre);
      }
    });

    // Cierre: clientes activos al final del mes
    // Un cliente está activo al final del mes si:
    //   - fecha_entrada IS NULL (pre-existente) o fecha_entrada <= último día del mes
    //   - Y fecha_salida IS NULL o fecha_salida > último día del mes
    var lastDay = new Date(2026, mesIdx + 1, 0); // último día del mes
    var lastDayStr = '2026-' + String(mesIdx + 1).padStart(2, '0') + '-' + String(lastDay.getDate()).padStart(2, '0');

    var total = 0;
    clientes.forEach(function(c) {
      var entered = !c.fecha_entrada || c.fecha_entrada <= lastDayStr;
      var notLeft = !c.fecha_salida || c.fecha_salida > lastDayStr;
      if (entered && notLeft) total++;
    });

    // Asignaciones del mes (para detalle por contadora)
    var asigMes = asig.filter(function(a) { return a.mes === mes; });
    var asignaciones = {};
    asigMes.forEach(function(a) {
      if (!asignaciones[a.contadora]) asignaciones[a.contadora] = [];
      asignaciones[a.contadora].push({ n: a.cliente, s: parseFloat(a.serv) || 0, a: parseFloat(a.adm) || 0 });
    });

    // Transacciones: sumar monto_adm de clientes activos ese mes
    var servTotal = 0;
    var admTotal = 0;
    clientes.forEach(function(c) {
      var entered = !c.fecha_entrada || c.fecha_entrada <= lastDayStr;
      var notLeft = !c.fecha_salida || c.fecha_salida > lastDayStr;
      if (entered && notLeft && c.responsabilidad_contabilidad !== false) {
        servTotal += (c.monto_adm || 0);
      }
    });
    // adm real viene de asignaciones
    asigMes.forEach(function(a) { admTotal += (parseFloat(a.adm) || 0); });

    data[mes] = {
      total: total,
      nuevos: nuevos,
      churn: churn,
      notas: notasPorMes[mes] || '',
      txTotal: { serv: servTotal, adm: admTotal },
      asignaciones: asignaciones
    };
  });

  ccDATA = data;
}

function ccSumClients(asig) { return Object.values(asig).reduce((s,arr)=>s+arr.length,0); }

function ccGetImplStatus(impl) {
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  if (!impl.implInicio) return { label:"Pendiente", color:"#a3aab8", bg:"#f1f5f9", icon:"⏳", pct:0 };
  const inicio = ccParseLocalDate(impl.implInicio);
  const fin = ccParseLocalDate(impl.implFin);
  if (hoy < inicio) return { label:"Por iniciar", color:"#4361ee", bg:"#eff6ff", icon:"📅", pct:0 };
  if (hoy > fin) return { label:"Completada", color:"#10b981", bg:"#ecfdf5", icon:"✓", pct:100 };
  const total = fin - inicio;
  const avance = hoy - inicio;
  const pct = total > 0 ? Math.round(avance / total * 100) : 0;
  return { label:"En progreso", color:"#f59e0b", bg:"#fffbeb", icon:"⚡", pct:pct };
}

function ccParseLocalDate(dateStr) {
  const parts = dateStr.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}

function ccFormatFecha(dateStr) {
  if (!dateStr) return "—";
  const d = ccParseLocalDate(dateStr);
  const dia = d.getDate();
  const mesLabel = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][d.getMonth()];
  return dia + ' ' + mesLabel + ' ' + d.getFullYear();
}

function ccDiasRestantes(dateStr) {
  if (!dateStr) return null;
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  const fin = ccParseLocalDate(dateStr);
  const diff = Math.ceil((fin - hoy) / (1000*60*60*24));
  return diff;
}

function ccGetAllMonths() { return MESES.filter(m=>ccDATA[m]); }

function ccGetPrevMonth(mes) {
  const idx = MESES.indexOf(mes);
  if (idx <= 0) return null;
  const prev = MESES[idx-1];
  return ccDATA[prev] ? prev : null;
}

function ccGetGrowth(mes, d) {
  const prev = ccGetPrevMonth(mes);
  if (!prev) {
    const prevTotal = d.total - d.nuevos.length + d.churn.length;
    if (prevTotal === 0) return {neto: d.nuevos.length - d.churn.length, pct: 0, prevTotal: 0};
    const neto = d.nuevos.length - d.churn.length;
    return {neto, pct: (neto/prevTotal*100), prevTotal};
  }
  const prevTotal = ccDATA[prev].total;
  const neto = d.nuevos.length - d.churn.length;
  return {neto, pct: prevTotal>0?(neto/prevTotal*100):0, prevTotal};
}

function ccGetDashboardStats() {
  const months = ccGetAllMonths();
  const last = ccDATA[months[months.length-1]];
  const first = ccDATA[months[0]];
  const totalNuevos = months.reduce((s,m)=>s+ccDATA[m].nuevos.length,0);
  const totalChurn = months.reduce((s,m)=>s+ccDATA[m].churn.length,0);
  const baseLine = first.total - first.nuevos.length + first.churn.length;
  const ytdGrowth = baseLine > 0 ? ((last.total - baseLine) / baseLine * 100) : 0;
  const ytdNeto = last.total - baseLine;
  const growthData = months.map((m,i)=>{
    if (i===0) { const prev=ccDATA[m].total-ccDATA[m].nuevos.length+ccDATA[m].churn.length; return prev>0?((ccDATA[m].nuevos.length-ccDATA[m].churn.length)/prev*100):0; }
    const prev=ccDATA[months[i-1]].total;
    return prev>0?((ccDATA[m].nuevos.length-ccDATA[m].churn.length)/prev*100):0;
  });
  return { months, last, first, totalNuevos, totalChurn, growthData, ytdGrowth, ytdNeto, baseLine };
}

function ccGetMonthViewData(mes) {

    return asig[b].length - asig[a].length;
  });
  const maxC = Math.max(...names.map(n=>asig[n].length),1);
  const growth = ccGetGrowth(mes, d);
  const growthSign = growth.neto >= 0 ? '+' : '';
  const growthColor = growth.neto >= 0 ? 'stat-green' : 'stat-red';
  const pctStr = growth.pct >= 0 ? '+'+growth.pct.toFixed(1)+'%' : growth.pct.toFixed(1)+'%';
  const nuevosHtml = d.nuevos.length > 0
    ? d.nuevos.map(n=>'<span class="badge badge-new" style="margin:1px 2px">'+n+'</span>').join('')
    : '<span style="color:#94a3b8;font-size:13px">Ninguno</span>';
  const churnHtml = d.churn.length > 0
    ? d.churn.map(n=>'<span class="badge badge-churn" style="margin:1px 2px">'+n+'</span>').join('')
    : '<span style="color:#94a3b8;font-size:13px">Ninguno</span>';
  return { d, idx, asig, names, maxC, growth, growthSign, growthColor, pctStr, nuevosHtml, churnHtml };
}

function ccRenderContent() {
  ccDestroyCharts();
  const el = document.getElementById("cc-content");
  if (ccActiveMainTab === "servicios") return ccRenderServicios(el);
  if (ccActiveMainTab === "implementacion") return ccRenderImplementacion(el);

// ─── Servicios tab ───
var ccServFiltro = null; // null = todos, o 'Contabilidad completa', 'Solo impuestos', 'Solo supervisión'
var ccServMes = MESES[new Date().getMonth()]; // mes actual para tab Servicios

function ccServGetActivosMes(mesKey) {
  var mesIdx = MESES.indexOf(mesKey);
  var lastDay = new Date(2026, mesIdx + 1, 0);
  var lastDayStr = '2026-' + String(mesIdx + 1).padStart(2, '0') + '-' + String(lastDay.getDate()).padStart(2, '0');
  return ccAllClientes.filter(function(c) {
    var entered = !c.fecha_entrada || c.fecha_entrada <= lastDayStr;
    var notLeft = !c.fecha_salida || c.fecha_salida > lastDayStr;
    return entered && notLeft;
  });
}

function ccRenderServicios(el) {
  var mesIdx = MESES.indexOf(ccServMes);
  var currentMonthIdx = new Date().getMonth();

  // Month tabs
  var html = '<div class="nav-area" style="padding:12px 24px;background:var(--bg);border-bottom:1px solid var(--border);margin:-24px -24px 20px -24px">';
  html += '<div class="month-tabs">';
  MESES.forEach(function(m, i) {
    if (i > currentMonthIdx) return;
    html += '<button class="month-tab' + (m === ccServMes ? ' active' : '') + '" onclick="ccServMes=\'' + m + '\';ccRenderContent()">' + MESES_LABEL[i] + '</button>';
  });
  html += '</div></div>';

  // Filter clients active in selected month
  var activos = ccServGetActivosMes(ccServMes);
  var total = activos.length;
  var imp = activos.filter(function(c) { return c.tipo_servicio === 'Solo impuestos'; });
  var contab = activos.filter(function(c) { return c.tipo_servicio === 'Contabilidad completa'; });
  var sup = activos.filter(function(c) { return c.tipo_servicio === 'Solo supervisión'; });
  var sinTipo = activos.filter(function(c) { return !c.tipo_servicio; });

  function statClass(key) { return ccServFiltro === key ? 'stat cc-serv-stat active' : 'stat cc-serv-stat'; }

  html += '<div class="stats">';
  html += '<div class="' + statClass(null) + '" onclick="ccServFilter(null)" style="cursor:pointer">';
  html += '<div class="stat-label">Total clientes</div><div class="stat-value">' + total + '</div>';
  html += '<div class="stat-sub">' + MESES_FULL[mesIdx] + ' 2026</div></div>';

  html += '<div class="' + statClass('Solo impuestos') + '" onclick="ccServFilter(\'Solo impuestos\')" style="cursor:pointer">';
  html += '<div class="stat-label">Tax One</div><div class="stat-value" style="color:var(--blue)">' + imp.length + '</div>';
  html += '<div class="stat-sub">' + (total > 0 ? (imp.length / total * 100).toFixed(0) : 0) + '%</div></div>';

  html += '<div class="' + statClass('Contabilidad completa') + '" onclick="ccServFilter(\'Contabilidad completa\')" style="cursor:pointer">';
  html += '<div class="stat-label">Contabilidad</div><div class="stat-value stat-green">' + contab.length + '</div>';
  html += '<div class="stat-sub">' + (total > 0 ? (contab.length / total * 100).toFixed(0) : 0) + '%</div></div>';

  html += '<div class="' + statClass('Solo supervisión') + '" onclick="ccServFilter(\'Solo supervisión\')" style="cursor:pointer">';
  html += '<div class="stat-label">Supervisión</div><div class="stat-value" style="color:var(--amber)">' + sup.length + '</div>';
  html += '<div class="stat-sub">' + (total > 0 ? (sup.length / total * 100).toFixed(0) : 0) + '%</div></div>';

  if (sinTipo.length > 0) {
    html += '<div class="' + statClass('__sin_tipo') + '" onclick="ccServFilter(\'__sin_tipo\')" style="cursor:pointer">';
    html += '<div class="stat-label">Sin asignar</div><div class="stat-value" style="color:var(--muted)">' + sinTipo.length + '</div>';
    html += '<div class="stat-sub">' + (total > 0 ? (sinTipo.length / total * 100).toFixed(0) : 0) + '%</div></div>';
  }
  html += '</div>';

  // Determine which list to show
  var lista, titulo;
  if (ccServFiltro === 'Solo impuestos') { lista = imp; titulo = 'Tax One'; }
  else if (ccServFiltro === 'Contabilidad completa') { lista = contab; titulo = 'Contabilidad completa'; }
  else if (ccServFiltro === 'Solo supervisión') { lista = sup; titulo = 'Supervisión'; }
  else if (ccServFiltro === '__sin_tipo') { lista = sinTipo; titulo = 'Sin servicio asignado'; }
  else { lista = activos; titulo = 'Todos los clientes'; }

  // Sort: group by service type (imp → contab → sup → sin tipo), then alphabetical
  var tipoOrden = { 'Solo impuestos': 0, 'Contabilidad completa': 1, 'Solo supervisión': 2 };
  lista.sort(function(a, b) {
    var aOrd = a.tipo_servicio ? (tipoOrden[a.tipo_servicio] != null ? tipoOrden[a.tipo_servicio] : 99) : 99;
    var bOrd = b.tipo_servicio ? (tipoOrden[b.tipo_servicio] != null ? tipoOrden[b.tipo_servicio] : 99) : 99;
    if (aOrd !== bOrd) return aOrd - bOrd;
    return (a.nombre || '').localeCompare(b.nombre || '', 'es');
  });

  html += '<div class="card">';
  html += '<h3>' + titulo + ' (' + lista.length + ') — ' + MESES_FULL[mesIdx] + ' 2026</h3>';

  if (sinTipo.length > 0 && ccServFiltro === null) {
    html += '<div class="note">' + sinTipo.length + ' cliente(s) sin tipo de servicio. Asígnalo desde BD Clientes → Editar.</div>';
  }

  html += '<div class="table-wrap"><table>';
  html += '<tr><th>#</th><th>Cliente</th><th>RNC</th><th>Servicio</th><th>Cont. contab</th><th>Cont. imp</th><th>Adm</th></tr>';

  var lastTipo = null;
  var counter = 0;
  lista.forEach(function(c) {
    var tipoKey = c.tipo_servicio || '__sin_tipo';

    // Group header when showing all (no filter active)
    if (ccServFiltro === null && tipoKey !== lastTipo) {
      var groupLabel = '';
      if (tipoKey === 'Solo impuestos') groupLabel = 'Tax One';
      else if (tipoKey === 'Contabilidad completa') groupLabel = 'Contabilidad completa';
      else if (tipoKey === 'Solo supervisión') groupLabel = 'Supervisión';
      else groupLabel = 'Sin servicio asignado';
      html += '<tr style="background:#f1f5f9"><td colspan="7" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);padding:10px 12px">' + groupLabel + '</td></tr>';
      lastTipo = tipoKey;
    }

    counter++;
    var tipoLabel = '';
    var tipoColor = 'var(--muted)';
    if (c.tipo_servicio === 'Contabilidad completa') { tipoLabel = 'Contabilidad'; tipoColor = 'var(--green)'; }
    else if (c.tipo_servicio === 'Solo impuestos') { tipoLabel = 'Tax One'; tipoColor = 'var(--blue)'; }
    else if (c.tipo_servicio === 'Solo supervisión') { tipoLabel = 'Supervisión'; tipoColor = 'var(--amber)'; }
    else { tipoLabel = 'Sin asignar'; tipoColor = '#94a3b8'; }

    html += '<tr>';
    html += '<td>' + counter + '</td>';
    html += '<td><strong>' + esc(c.nombre || '') + '</strong></td>';
    html += '<td>' + esc(c.rnc || '') + '</td>';
    html += '<td><span style="font-size:11px;font-weight:600;color:' + tipoColor + '">' + tipoLabel + '</span></td>';
    html += '<td>' + esc(c.contadora_contabilidad || '—') + '</td>';
    html += '<td>' + esc(c.contadora_impuestos || '—') + '</td>';
    html += '<td>' + (c.monto_adm || '—') + '</td>';
    html += '</tr>';
  });
  html += '</table></div></div>';

  el.innerHTML = html;
}

          let capCell='';

              const capColor=capUtil<=70?'var(--green)':capUtil<=90?'var(--amber)':'var(--red)';

            } else {

  ccCharts.push(new Chart(document.getElementById("chartMonthC"),{

    data:{labels:names, datasets:[{data:names.map(n=>asig[n].length),backgroundColor:cColors,borderRadius:4}]},

  const servData = names.map(n=>ccContadoraServ(asig,n));
  const admData = names.map(n=>ccContadoraAdm(asig,n));
  ccCharts.push(new Chart(document.getElementById("chartMonthTx"),{

      {label:"Serv. Contratado",data:servData,backgroundColor:cColors,borderRadius:4}

  }));

function ccTogglePerfil(idx) {
  ccPerfilOpen[idx] = !ccPerfilOpen[idx];
  ccRenderPerfiles(document.getElementById('cc-content'));
}

function ccStartEditPerfil(idx) {
  ccPerfilEditing[idx] = true;
  ccRenderPerfiles(document.getElementById('cc-content'));
}

function ccCancelEditPerfil(idx) {
  delete ccPerfilEditing[idx];
  ccRenderPerfiles(document.getElementById('cc-content'));
}

async function ccSavePerfil(idx) {
  ccPERFIL_FIELDS.forEach(sec => {
    sec.fields.forEach(f => {
      const input = document.getElementById('pf-'+idx+'-'+f.id);
      if (input) ccPERFILES[idx][f.id] = input.value.trim();
    });
  });
  await ccSavePerfilToDB(ccPERFILES[idx]);
  delete ccPerfilEditing[idx];
  ccRenderPerfiles(document.getElementById('cc-content'));
}

async function ccAddPerfil() {
  const nombre = prompt('Nombre del cliente:');
  if (!nombre || !nombre.trim()) return;
  const nuevo = { _nombre: nombre.trim() };
  ccPERFIL_FIELDS.forEach(sec => sec.fields.forEach(f => { nuevo[f.id] = ''; }));
  const newId = await ccInsertPerfilToDB(nuevo);
  nuevo._id = newId;
  ccPERFILES.push(nuevo);
  const idx = ccPERFILES.length - 1;
  ccPerfilOpen[idx] = true;
  ccPerfilEditing[idx] = true;
  ccRenderPerfiles(document.getElementById('cc-content'));
}

async function ccDeletePerfil(idx) {
  if (!confirm('Seguro que quieres eliminar este perfil?')) return;
  const perfil = ccPERFILES[idx];
  if (perfil._id) {
    await ccDeletePerfilFromDB(perfil._id);
  }
  ccPERFILES.splice(idx, 1);
  ccPerfilOpen = {};
  ccPerfilEditing = {};
  ccRenderPerfiles(document.getElementById('cc-content'));
}

function ccGetPerfilCompleteness(p) {
  let total = 0, filled = 0;
  ccPERFIL_FIELDS.forEach(sec => sec.fields.forEach(f => {
    total++;
    if (p[f.id] && p[f.id].trim()) filled++;
  }));
  return { total, filled, pct: total > 0 ? Math.round(filled/total*100) : 0 };
}

function ccParseFiscalOrder(str) {
  if (!str) return 9999;
  var s = str.toLowerCase();
  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  for (var i = 0; i < meses.length; i++) {
    if (s.indexOf(meses[i]) !== -1) return i;
  }
  return 9999;
}

function ccRenderPerfiles(el) {
  const perfiles = ccPERFILES;
  const indices = perfiles.map((p, i) => i);
  indices.sort((a, b) => ccParseFiscalOrder(perfiles[a].inicio_fiscal) - ccParseFiscalOrder(perfiles[b].inicio_fiscal));
  let html = '';

  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">';
  html += '<div><div style="font-size:16px;font-weight:800">Fichas de Clientes</div><div style="font-size:12px;color:var(--muted)">Perfil de cada cliente con servicio contratado, fechas y datos generales</div></div>';
  html += '<button class="perfil-btn perfil-btn-primary" onclick="ccAddPerfil()">+ Nuevo cliente</button>';
  html += '</div>';

  if (perfiles.length === 0) {
    html += '<div class="perfil-empty"><p>No hay perfiles creados todavia.</p><button class="perfil-btn perfil-btn-primary" onclick="ccAddPerfil()">Crear primer perfil</button></div>';
    el.innerHTML = html;
    return;
  }

  indices.forEach(idx => {
    const p = perfiles[idx];
    const isOpen = ccPerfilOpen[idx] || false;
    const isEdit = ccPerfilEditing[idx] || false;
    const comp = ccGetPerfilCompleteness(p);
    const statusColor = comp.pct === 100 ? 'var(--green)' : comp.pct > 50 ? 'var(--amber)' : 'var(--light)';
    const statusLabel = comp.pct === 100 ? 'Completo' : comp.filled + '/' + comp.total;

    html += '<div class="perfil-card">';
    html += '<div class="perfil-header '+(isOpen?'expanded':'')+'" onclick="ccTogglePerfil('+idx+')">';
    html += '<div style="flex:1">';
    html += '<div class="perfil-name">'+(p.nombre_empresa||p._nombre||'Sin nombre')+'</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:10px">';
    if (p.inicio_fiscal) {
      html += '<div class="impl-item" style="padding:6px 12px"><div class="impl-item-label">Primer mes fiscal</div><div class="impl-item-value" style="color:var(--navy)">'+p.inicio_fiscal+'</div></div>';
    }
    html += '<span class="perfil-arrow '+(isOpen?'open':'')+'">▼</span>';
    html += '</div>';
    html += '</div>';

    html += '<div class="perfil-body '+(isOpen?'open':'')+'">';

    ccPERFIL_FIELDS.forEach(sec => {
      html += '<div class="perfil-section">';
      html += '<div class="perfil-section-title">'+sec.section+'</div>';
      html += '<div class="perfil-grid">';
      sec.fields.forEach(f => {
        const val = p[f.id] || '';
        html += '<div class="perfil-field">';
        html += '<div class="perfil-field-label">'+f.label+'</div>';
        if (isEdit) {
          html += '<input class="perfil-field-input" id="pf-'+idx+'-'+f.id+'" value="'+val.replace(/"/g,'&quot;')+'" placeholder="'+f.placeholder+'">';
        } else {
          html += '<div class="perfil-field-value">'+(val || '<span style="color:var(--light);font-weight:400">—</span>')+'</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';
    });

    html += '<div class="perfil-actions">';
    if (isEdit) {
      html += '<button class="perfil-btn perfil-btn-primary" onclick="event.stopPropagation();ccSavePerfil('+idx+')">Guardar</button>';
      html += '<button class="perfil-btn" onclick="event.stopPropagation();ccCancelEditPerfil('+idx+')">Cancelar</button>';
      html += '<button class="perfil-btn perfil-btn-danger" style="margin-left:auto" onclick="event.stopPropagation();ccDeletePerfil('+idx+')">Eliminar</button>';
    } else {
      html += '<button class="perfil-btn" onclick="event.stopPropagation();ccStartEditPerfil('+idx+')">Editar</button>';
    }
    html += '</div>';

    html += '</div></div>';
  });

  el.innerHTML = html;
}

// ─── CTD State ───
var ctdContadorasMap = {};
var ctdSelectedMes = '';
var ctdSelectedContadora = 'Todas';
var ctdReporteData = [];
var ctdChecklistData = {};
var ctdOpenSections = {};
var ctdOpenCards = {};
var ctdDetailCliente = null;

// ─── CTD Utils ───
function ctdGetCurrentReportMonth() {
  var now = new Date();
  var m = now.getMonth();
  var prev = m === 0 ? 11 : m - 1;
  return MESES[prev];
}

function ctdSortContadoras(names) {
  var regular = [];
  var last = [];
  names.forEach(function(n) {
    if (ctdCONTADORA_LAST.indexOf(n) >= 0) last.push(n);
    else regular.push(n);
  });
  regular.sort();
  return regular.concat(last);
}

function ctdKpiColor(pct) {
  if (pct >= 80) return 'var(--green)';
  if (pct >= 50) return 'var(--amber)';
  return 'var(--red)';
}

function ctdGetSemaforo(fechaStr) {
  if (!fechaStr) return { color:'gray', label:'—' };
  var fecha = new Date(fechaStr + 'T12:00:00');
  var dia = fecha.getDate();
  if (dia <= 24) return { color:'green', label:dia + '/' + (fecha.getMonth()+1) };
  if (dia <= 30) return { color:'yellow', label:dia + '/' + (fecha.getMonth()+1) };
  return { color:'red', label:dia + '/' + (fecha.getMonth()+1) };
}

function ctdSemaforoHTML(fechaStr, link) {
  var s = ctdGetSemaforo(fechaStr);
  var html = '<span class="semaforo sem-' + s.color + '">' + (s.color === 'gray' ? '—' : '✓') + '</span>';
  if (s.color !== 'gray') html += '<span class="sem-date">' + s.label + '</span>';
  if (link) html += '<a class="sem-link" href="' + link + '" target="_blank">Ver</a>';
  return html;
}

function ctdCompletionCount(row) {
  var done = 0;
  ctdITEMS.forEach(function(item) { if (row[item.id + '_fecha']) done++; });
  return done;
}

function ctdEsc(s) {
  if (!s) return '';
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ─── CTD KPI Calc ───
function ctdCalcKPI(clients, lookup, contadora) {
  var results = [];
  ctdKPI_GROUPS.forEach(function(kpi) {
    if (clients.length === 0) { results.push({ id:kpi.id, label:kpi.label, pct:0, done:0, total:0 }); return; }
    var total = 0;
    var sum = 0;
    clients.forEach(function(c) {
      var key = contadora ? (contadora + '_' + c) : c;
      var row = lookup[key] || {};
      total++;
      sum += kpi.calc(row);
    });
    var pct = total > 0 ? Math.round((sum / total) * 100) : 0;
    results.push({ id:kpi.id, label:kpi.label, pct:pct, done:Math.round(sum * 10)/10, total:total });
  });
  return results;
}

// ─── CTD Supabase ───
async function ctdLoadContadoras() {
  var result = await sb.from('asignaciones')
    .select('contadora, cliente, mes')
    .eq('anio', 2026)
    .order('contadora');

  var data = result.data || [];
  var map = {};

  var maxIdx = -1; var maxMes = '';
  for (var i = 0; i < data.length; i++) {
    var idx = MESES.indexOf(data[i].mes);
    if (idx > maxIdx) { maxIdx = idx; maxMes = data[i].mes; }
  }
  if (!maxMes) maxMes = ctdGetCurrentReportMonth();

  for (var i = 0; i < data.length; i++) {
    var row = data[i];
    if (row.mes !== maxMes) continue;
    if (!map[row.contadora]) map[row.contadora] = [];
    if (map[row.contadora].indexOf(row.cliente) === -1) {
      map[row.contadora].push(row.cliente);
    }
  }
  ctdContadorasMap = map;
}

async function ctdLoadReporteData(mes) {
  var result = await sb.from('reporte_mensual')
    .select('*').eq('mes', mes).eq('anio', 2026).order('contadora');
  return result.data || [];
}

async function ctdLoadChecklistData() {
  var result = await sb.from('checklist_contadores').select('*').eq('anio', 2026);
  if (result.error) { console.error('Error cargando checklist:', result.error); return; }
  ctdChecklistData = {};
  (result.data || []).forEach(function(r) {
    var key = r.contadora + '_' + r.cliente + '_' + r.mes;
    ctdChecklistData[key] = { _id: r.id, datos: r.datos || {} };
  });
}

function ctdGetCheckEntry(contadora, cliente, mes) {
  var key = contadora + '_' + cliente + '_' + mes;
  if (!ctdChecklistData[key]) {
    ctdChecklistData[key] = { _id: null, datos: {} };
  }
  var d = ctdChecklistData[key].datos;
  ctdCHECKLIST_ITEMS.forEach(function(item) {
    if (!d[item.id]) d[item.id] = { done: false, fecha: '' };
  });
  return ctdChecklistData[key];
}

function ctdGetProgress(contadora, cliente, mes) {
  var entry = ctdGetCheckEntry(contadora, cliente, mes);
  var done = 0;
  ctdCHECKLIST_ITEMS.forEach(function(item) {
    if (entry.datos[item.id] && entry.datos[item.id].done) done++;
  });
  return { done: done, total: ctdCHECKLIST_ITEMS.length, pct: Math.round(done / ctdCHECKLIST_ITEMS.length * 100) };
}

async function ctdSaveReporte(contadora, cliente, mes, fields) {
  var record = { contadora: contadora, cliente: cliente, mes: mes, anio: 2026 };
  for (var key in fields) record[key] = fields[key];
  var result = await sb.from('reporte_mensual').upsert(record, { onConflict: 'contadora,cliente,mes,anio' });
  if (result.error) { console.error('Error guardando:', result.error); alert('Error guardando. Verifica tus permisos.'); return false; }
  return true;
}

async function ctdRenderApp() {
  if (userRole === 'admin') {
    await ctdRenderGerencial();
  } else {
    await ctdRenderContadoraView();
  }
}

async function ctdRenderGerencial() {
  var el = document.getElementById('ctd-content');
  el.innerHTML = '<div class="empty">Cargando...</div>';

  // Load checklist data alongside report data
  await Promise.all([
    ctdLoadReporteData(ctdSelectedMes).then(function(d) { ctdReporteData = d; }),
    ctdLoadChecklistData()
  ]);

  // If detail view is active, render that instead
  if (ctdDetailCliente) {
    ctdRenderDetail(el);
    return;
  }

  var lookup = {};
  ctdReporteData.forEach(function(r) { lookup[r.contadora + '_' + r.cliente] = r; });

  var allNames = Object.keys(ctdContadorasMap).filter(function(n) {
    return !ctdIsExcluida(n);
  });
  var contadoraNames = ctdSortContadoras(allNames);

  var html = '';

  // Month tabs
  html += '<div class="month-tabs">';
  MESES.forEach(function(m, i) {
    html += '<button class="month-tab' + (m === ctdSelectedMes ? ' active' : '') + '" onclick="ctdSelectedMes=\'' + m + '\';ctdRenderApp()">' + MESES_LABEL[i] + '</button>';
  });
  html += '</div>';

  // Contadora filter pills
  html += '<div class="ctd-contadora-pills">';
  html += '<button class="contadora-pill' + (ctdSelectedContadora === 'Todas' ? ' active' : '') + '" onclick="ctdSelectedContadora=\'Todas\';ctdRenderApp()">Todas</button>';
  contadoraNames.forEach(function(name) {
    html += '<button class="contadora-pill' + (ctdSelectedContadora === name ? ' active' : '') + '" onclick="ctdSelectedContadora=\'' + ctdEsc(name) + '\';ctdRenderApp()">' + name + '</button>';
  });
  html += '</div>';

  var visibleContadoras = ctdSelectedContadora === 'Todas' ? contadoraNames : [ctdSelectedContadora];

  var allVisibleClients = [];
  visibleContadoras.forEach(function(contadora) {
    var clients = ctdContadorasMap[contadora] || [];
    clients.forEach(function(c) {
      allVisibleClients.push({ contadora: contadora, cliente: c });
    });
  });

  // KPI Dashboard
  var kpiResults = [];
  ctdKPI_GROUPS.forEach(function(kpi) {
    var total = allVisibleClients.length;
    var sum = 0;
    allVisibleClients.forEach(function(item) {
      var row = lookup[item.contadora + '_' + item.cliente] || {};
      sum += kpi.calc(row);
    });
    var pct = total > 0 ? Math.round((sum / total) * 100) : 0;
    kpiResults.push({ id:kpi.id, label:kpi.label, pct:pct, done:Math.round(sum * 10)/10, total:total });
  });

  html += '<div class="kpi-dashboard">';
  kpiResults.forEach(function(kpi) {
    var color = ctdKpiColor(kpi.pct);
    html += '<div class="kpi-card">';
    html += '<div class="kpi-card-title">' + kpi.label + '</div>';
    html += '<div class="kpi-card-value" style="color:' + color + '">' + kpi.pct + '%</div>';
    html += '<div class="kpi-card-sub">' + kpi.done + ' de ' + kpi.total + ' clientes</div>';
    html += '<div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:' + kpi.pct + '%;background:' + color + '"></div></div>';
    html += '</div>';
  });
  html += '</div>';

  // Client table (flat, all clients)
  if (allVisibleClients.length === 0) {
    html += '<div class="empty">No hay datos para mostrar.</div>';
  } else {
    html += '<table class="ctd-client-table">';
    html += '<thead><tr><th style="width:36px">#</th><th>Cliente</th><th>Contadora</th><th>Checklist</th><th>Reportes</th><th>Estado</th></tr></thead>';
    html += '<tbody>';

    allVisibleClients.sort(function(a, b) { return a.cliente.localeCompare(b.cliente, 'es'); });

    allVisibleClients.forEach(function(item, idx) {
      var prog = ctdGetProgress(item.contadora, item.cliente, ctdSelectedMes);
      var reportRow = lookup[item.contadora + '_' + item.cliente] || {};

      // Report completion (facturas + 4 items)
      var repDone = 0;
      var repTotal = 5;
      if (reportRow.facturas_mes && reportRow.facturas_mes > 0) repDone++;
      ctdITEMS.forEach(function(itm) { if (reportRow[itm.id + '_fecha']) repDone++; });
      var repPct = Math.round(repDone / repTotal * 100);

      var barColor = prog.pct >= 90 ? 'var(--green)' : prog.pct >= 70 ? 'var(--amber)' : 'var(--red)';
      var statusClass = prog.pct === 100 ? 'ctd-status-completo' : prog.pct > 0 ? 'ctd-status-progreso' : 'ctd-status-pendiente';
      var statusText = prog.pct === 100 ? 'Completo' : prog.pct > 0 ? 'En progreso' : 'Pendiente';

      html += '<tr onclick="ctdOpenDetail(\'' + ctdEsc(item.cliente) + '\',\'' + ctdEsc(item.contadora) + '\')">';
      html += '<td style="color:var(--muted);font-size:0.75rem">' + (idx + 1) + '</td>';
      html += '<td class="ctd-client-name">' + item.cliente + '</td>';
      html += '<td style="font-size:0.8rem;color:var(--muted)">' + item.contadora + '</td>';
      html += '<td><div style="display:flex;align-items:center;gap:8px">';
      html += '<div class="ctd-progress-bar"><div class="ctd-progress-fill" style="width:' + prog.pct + '%;background:' + barColor + '"></div></div>';
      html += '<span class="ctd-progress-text">' + prog.done + '/' + prog.total + '</span>';
      html += '</div></td>';
      html += '<td><span class="ctd-progress-text">' + repDone + '/' + repTotal + '</span></td>';
      html += '<td><span class="ctd-status-badge ' + statusClass + '">' + statusText + '</span></td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
  }

  el.innerHTML = html;
}

function ctdOpenDetail(cliente, contadora) {
  ctdDetailCliente = cliente;
  ctdDetailContadora = contadora;
  ctdRenderApp();
}

function ctdCloseDetail() {

  ctdRenderApp();
}

function ctdRenderDetail(el) {
  var entry = ctdGetCheckEntry(ctdDetailContadora, ctdDetailCliente, ctdSelectedMes);
  var prog = ctdGetProgress(ctdDetailContadora, ctdDetailCliente, ctdSelectedMes);

  var barColor = prog.pct >= 90 ? 'var(--green)' : prog.pct >= 70 ? 'var(--amber)' : 'var(--red)';
  var mesIdx = MESES.indexOf(ctdSelectedMes);
  var mesFull = MESES_FULL ? MESES_FULL[mesIdx] : ctdSelectedMes;

  var html = '';

  // Month tabs
  html += '<div class="month-tabs">';
  MESES.forEach(function(m, i) {
    html += '<button class="month-tab' + (m === ctdSelectedMes ? ' active' : '') + '" onclick="ctdSelectedMes=\'' + m + '\';ctdRenderApp()">' + MESES_LABEL[i] + '</button>';
  });
  html += '</div>';

  html += '<button class="ctd-detail-back" onclick="ctdCloseDetail()">← Volver al control</button>';

  // Header card
  html += '<div class="ctd-detail-header">';
  html += '<div class="ctd-detail-name">' + ctdDetailCliente + '</div>';
  html += '<div class="ctd-detail-sub">Contadora: ' + ctdDetailContadora + ' · ' + mesFull + ' 2026</div>';
  html += '<div class="ctd-detail-stats">';
  html += '<div class="ctd-detail-pending"><strong>' + (prog.total - prog.done) + '</strong> tareas pendientes de ' + prog.total + '</div>';
  html += '<div class="ctd-detail-progress-bar"><div class="ctd-detail-progress-fill" style="width:' + prog.pct + '%;background:' + barColor + '"></div></div>';
  html += '<div class="ctd-detail-pct">' + prog.pct + '%</div>';
  html += '</div></div>';

  // Checklist table
  html += '<table class="ctd-checklist-table">';
  html += '<thead><tr><th style="width:30px">#</th><th>Tarea</th><th style="width:80px">Deadline</th><th style="width:130px">Estado</th><th style="width:100px">Completado</th></tr></thead>';
  html += '<tbody>';

  var lastGroup = '';

  ctdCHECKLIST_ITEMS.forEach(function(item) {
    // Group header
    if (item.impuesto !== lastGroup) {
      lastGroup = item.impuesto;
      html += '<tr class="ctd-group-row"><td colspan="5">' + item.impuesto + ' — Día ' + item.dia + '</td></tr>';
    }

    var d = entry.datos[item.id] || { done: false, fecha: '' };
    var isDone = d.done;

    // Deadline calculation
    var dlDay = item.dia;
    var dlMonth = mesIdx + (item.mesRel || 1);
    var dlYear = 2026;
    if (dlMonth > 11) { dlMonth -= 12; dlYear++; }
    var dlDate = new Date(dlYear, dlMonth, dlDay);
    var dlStr = dlDay + ' ' + ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][dlMonth];

    html += '<tr>';
    html += '<td style="color:var(--muted);font-size:0.78rem">' + item.n + '</td>';
    html += '<td>';
    html += '<label style="cursor:pointer;display:flex;align-items:center;gap:8px">';
    html += '<input type="checkbox"' + (isDone ? ' checked' : '') + ' onchange="ctdToggleTask(\'' + ctdEsc(ctdDetailContadora) + '\',\'' + ctdEsc(ctdDetailCliente) + '\',\'' + ctdSelectedMes + '\',\'' + item.id + '\',this.checked)" style="cursor:pointer;width:16px;height:16px;accent-color:var(--green)">';
    html += '<span' + (isDone ? ' style="text-decoration:line-through;color:var(--muted)"' : '') + '>' + item.label + '</span>';
    html += '</label></td>';
    html += '<td style="font-size:0.78rem;font-weight:600">' + dlStr + '</td>';
    html += '<td><span class="ctd-status-badge ' + (isDone ? 'ctd-status-completo' : 'ctd-status-pendiente') + '">' + (isDone ? 'Completado' : 'Pendiente') + '</span></td>';
    html += '<td style="font-size:0.78rem;color:var(--muted)">' + (d.fecha || '—') + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';

  el.innerHTML = html;
}

async function ctdToggleTask(contadora, cliente, mes, itemId, checked) {
  var key = contadora + '_' + cliente + '_' + mes;
  var entry = ctdGetCheckEntry(contadora, cliente, mes);
  entry.datos[itemId].done = checked;
  entry.datos[itemId].fecha = checked ? new Date().toISOString().slice(0,10) : '';

  // Save immediately
  try {
    if (entry._id) {
      await sb.from('checklist_contadores')
        .update({ datos: entry.datos, updated_at: new Date().toISOString() })
        .eq('id', entry._id);
    } else {
      var result = await sb.from('checklist_contadores')
        .insert({ contadora: contadora, cliente: cliente, mes: mes, anio: 2026, datos: entry.datos })
        .select();
      if (result.data && result.data[0]) entry._id = result.data[0].id;
    }
  } catch(e) {
    console.error('Error guardando checklist:', e);
  }

  ctdRenderApp();
}

async function ctdRenderContadoraView() {
  var el = document.getElementById('ctd-content');
  el.innerHTML = '<div class="empty">Cargando...</div>';

  var myName = '';
  var firstName = userName.split(' ')[0];
  for (var key in ctdContadorasMap) {
    if (key === firstName || key === userName) { myName = key; break; }
  }

  var clients = [];
  if (myName && ctdContadorasMap[myName] && ctdContadorasMap[myName].length > 0) {
    clients = ctdContadorasMap[myName].slice().sort();
  } else {
    var nameVariants = [userName, firstName];
    for (var v = 0; v < nameVariants.length; v++) {
      var tryName = nameVariants[v];
      if (!tryName) continue;
      var asigResult = await sb.from('asignaciones')
        .select('cliente, contadora').eq('contadora', tryName).eq('anio', 2026);
      if (asigResult.data && asigResult.data.length > 0) {
        myName = tryName;
        var seen = {};
        asigResult.data.forEach(function(r) {
          if (!seen[r.cliente]) { clients.push(r.cliente); seen[r.cliente] = true; }
        });
        clients.sort();
        break;
      }
    }
  }

  if (!myName || clients.length === 0) {
    el.innerHTML = '<div class="empty">No tienes clientes asignados.</div>';
    return;
  }

  ctdReporteData = await ctdLoadReporteData(ctdSelectedMes);
  var lookup = {};
  ctdReporteData.forEach(function(r) { if (r.contadora === myName) lookup[r.cliente] = r; });

  var html = '';

  // Month tabs
  html += '<div class="month-tabs">';
  MESES.forEach(function(m, i) {
    html += '<button class="month-tab' + (m === ctdSelectedMes ? ' active' : '') + '" onclick="ctdSelectedMes=\'' + m + '\';ctdRenderApp()">' + MESES_LABEL[i] + '</button>';
  });
  html += '</div>';

  html += '<span id="ctd-save-msg" class="saving-indicator"></span>';

  clients.forEach(function(cliente) {
    var row = lookup[cliente] || {};
    var done = ctdCompletionCount(row);
    var total = ctdITEMS.length;
    var isOpen = ctdOpenCards[cliente] || false;

    var statusColor = done === total ? 'background:#ecfdf5;color:#059669;' : done > 0 ? 'background:#fffbeb;color:#d97706;' : 'background:#f5f7fa;color:var(--light);';
    var statusLabel = done === total ? 'Completo' : done + '/' + total;

    html += '<div class="edit-card">';
    html += '<div class="edit-header' + (isOpen ? ' expanded' : '') + '" onclick="ctdToggleCard(\'' + ctdEsc(cliente) + '\')">';
    html += '<span class="edit-client-name">' + cliente + '</span>';
    html += '<span class="edit-status" style="' + statusColor + '">' + statusLabel + '</span>';
    html += '<span class="edit-arrow' + (isOpen ? ' open' : '') + '">▼</span>';
    html += '</div>';

    html += '<div class="edit-body' + (isOpen ? ' open' : '') + '">';
    if (isOpen) {
      html += '<div class="edit-field" style="margin-bottom:16px">';
      html += '<div class="edit-field-label">Cantidad de facturas del mes</div>';
      html += '<input type="number" id="ctdf_' + ctdEsc(cliente) + '_facturas" value="' + (row.facturas_mes || '') + '" placeholder="0">';
      html += '</div>';

      html += '<div class="edit-grid">';
      ctdITEMS.forEach(function(item) {
        var fechaVal = row[item.id + '_fecha'] || '';
        var linkVal = row[item.id + '_link'] || '';
        html += '<div class="edit-field">';
        html += '<div class="edit-field-label">' + item.label + '</div>';
        html += '<div class="edit-field-row"><input type="date" id="ctdf_' + ctdEsc(cliente) + '_' + item.id + '_fecha" value="' + fechaVal + '"></div>';
        html += '<input type="url" id="ctdf_' + ctdEsc(cliente) + '_' + item.id + '_link" value="' + linkVal + '" placeholder="Link (opcional)" style="margin-top:6px">';
        html += '<div class="edit-field-hint">Fecha de entrega + link al documento</div>';
        html += '</div>';
      });
      html += '</div>';

      html += '<div class="edit-save">';
      html += '<button class="btn btn-primary" onclick="ctdHandleSave(\'' + ctdEsc(myName) + '\',\'' + ctdEsc(cliente) + '\')">Guardar</button>';
      html += '<button class="btn btn-ghost" onclick="ctdToggleCard(\'' + ctdEsc(cliente) + '\')">Cerrar</button>';
      html += '</div>';
    }
    html += '</div></div>';
  });

  if (clients.length === 0) {
    html += '<div class="empty">No tienes clientes asignados para este periodo.</div>';
  }
  el.innerHTML = html;
}

function ctdToggleCard(cliente) {
  ctdOpenCards[cliente] = !ctdOpenCards[cliente];
  ctdRenderApp();
}

async function ctdHandleSave(contadora, cliente) {
  var prefix = 'ctdf_' + cliente.replace(/'/g, "\\'") + '_';
  var fields = { facturas_mes: parseInt(document.getElementById(prefix + 'facturas').value) || 0 };
  ctdITEMS.forEach(function(item) {
    fields[item.id + '_fecha'] = document.getElementById(prefix + item.id + '_fecha').value || null;
    fields[item.id + '_link'] = document.getElementById(prefix + item.id + '_link').value || '';
  });

  var msg = document.getElementById('ctd-save-msg');
  msg.textContent = 'Guardando...';
  var ok = await ctdSaveReporte(contadora, cliente, ctdSelectedMes, fields);
  if (ok) {
    msg.textContent = 'Guardado';
    setTimeout(function() { msg.textContent = ''; }, 2000);
    ctdReporteData = await ctdLoadReporteData(ctdSelectedMes);
    ctdRenderApp();
  } else { msg.textContent = 'Error'; }
}

async function handleLogin() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  var errorEl = document.getElementById('login-error');
  var btn = document.getElementById('btn-login');
  if (!email || !password) { errorEl.textContent = 'Ingresa email y contrasena.'; errorEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...'; errorEl.style.display = 'none';
  var result = await sb.auth.signInWithPassword({ email: email, password: password });
  if (result.error) { errorEl.textContent = 'Email o contrasena incorrectos.'; errorEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Entrar'; return; }
  await loadUserProfile();
  await showApp();
}

async function handleLogout() {
  await sb.auth.signOut();
  userRole = null;
  userName = '';
  document.getElementById('app-wrapper').classList.add('hidden');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

async function loadUserProfile() {
  var result = await sb.auth.getUser();
  var user = result.data ? result.data.user : null;
  if (!user) return;
  var pr = await sb.from('profiles').select('nombre, rol').eq('id', user.id).single();
  if (pr.data) { userRole = pr.data.rol; userName = pr.data.nombre || user.email; }
  else { userRole = 'contadora'; userName = user.email; }
}

function clFormatDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : d;
}

function bdRenderClientes() {
  var el = document.getElementById('bd-content');
  var h = '';

  var activos = bdClientes.filter(function(c) { return c.activo !== false; }).length;
  var inactivos = bdClientes.length - activos;
  h += '<div class="cl-stats">';
  h += '<div class="cl-stat"><div class="cl-stat-count">' + activos + '</div><div class="cl-stat-label">Clientes activos</div></div>';
  h += '<div class="cl-stat"><div class="cl-stat-count">' + inactivos + '</div><div class="cl-stat-label">Inactivos</div></div>';
  h += '<div class="cl-stat"><div class="cl-stat-count">' + bdClientes.length + '</div><div class="cl-stat-label">Total</div></div>';
  h += '</div>';

  h += '<div class="cl-toolbar">';
  h += '<input class="cl-search" type="text" placeholder="Buscar cliente..." value="' + esc(clSearch) + '" oninput="clSearch=this.value;bdRenderClientes()">';
  if (userRole === 'admin') {
    h += '<button class="btn-add" onclick="clOpenModal()">+ Nuevo cliente</button>';
  }
  h += '</div>';

  var filtered = bdClientes;
  if (clSearch) {
    var q = clSearch.toLowerCase();
    filtered = bdClientes.filter(function(c) {
      return (c.nombre || '').toLowerCase().indexOf(q) >= 0
        || (c.rnc || '').toLowerCase().indexOf(q) >= 0
        || (c.contadora_contabilidad || '').toLowerCase().indexOf(q) >= 0
        || (c.contadora_impuestos || '').toLowerCase().indexOf(q) >= 0
        || (c.contacto || '').toLowerCase().indexOf(q) >= 0;
    });
  }

  if (filtered.length === 0) {
    if (bdClientes.length === 0) {
      h += '<div class="cl-empty"><div class="emoji">👥</div><p>No hay clientes registrados.</p>';
      if (userRole === 'admin') h += '<p style="font-size:0.82rem">Usa el botón de arriba para agregar el primero.</p>';
      h += '</div>';
    } else {
      h += '<div class="cl-empty"><p>No se encontraron resultados para "' + esc(clSearch) + '"</p></div>';
    }
    el.innerHTML = h;
    return;
  }

  // Ordenar: activos primero (alfabético), inactivos al final (alfabético)
  filtered.sort(function(a, b) {
    var aActivo = a.activo !== false ? 0 : 1;
    var bActivo = b.activo !== false ? 0 : 1;
    if (aActivo !== bActivo) return aActivo - bActivo;
    return (a.nombre || '').localeCompare(b.nombre || '', 'es');
  });

  h += '<table class="cl-table">';
  h += '<thead><tr>';
  h += '<th style="width:36px">#</th><th>Cliente</th><th>RNC</th><th>Servicio</th><th>Cont. contab</th><th>Cont. imp</th><th>Adm</th><th>Estado</th>';
  if (userRole === 'admin') h += '<th></th>';
  h += '</tr></thead><tbody>';

  filtered.forEach(function(c, idx) {
    var isInactivo = c.activo === false;
    var rowStyle = isInactivo ? ' style="opacity:0.55"' : '';
    h += '<tr' + rowStyle + '>';
    h += '<td style="color:var(--muted);font-size:0.75rem">' + (idx + 1) + '</td>';
    h += '<td class="cl-name">' + esc(c.nombre) + '</td>';
    h += '<td style="font-size:0.8rem">' + (c.rnc ? esc(c.rnc) : '<span style="color:var(--light)">—</span>') + '</td>';
    h += '<td style="font-size:0.8rem">' + (c.tipo_servicio ? esc(c.tipo_servicio) : '<span style="color:var(--light)">—</span>') + '</td>';
    h += '<td>' + (c.responsabilidad_contabilidad === false ? '<span style="color:var(--light);font-size:0.75rem">N/A</span>' : (c.contadora_contabilidad ? esc(c.contadora_contabilidad) : '<span style="color:var(--light)">Sin asignar</span>')) + '</td>';
    h += '<td>' + (c.responsabilidad_impuestos === false ? '<span style="color:var(--light);font-size:0.75rem">N/A</span>' : (c.contadora_impuestos ? esc(c.contadora_impuestos) : '<span style="color:var(--light)">Sin asignar</span>')) + '</td>';
    h += '<td style="font-size:0.8rem">' + (c.monto_adm || '<span style="color:var(--light)">—</span>') + '</td>';
    if (isInactivo) {
      var salida = c.fecha_salida ? c.fecha_salida.split('-').reverse().join('/') : '';
      h += '<td><span class="cl-badge-inactivo">Inactivo</span>' + (salida ? '<div style="font-size:0.7rem;color:var(--muted);margin-top:2px">Salida: ' + salida + '</div>' : '') + '</td>';
    } else {
      h += '<td><span class="cl-badge-activo">Activo</span></td>';
    }
    if (userRole === 'admin') {
      h += '<td style="white-space:nowrap">';
      h += '<button style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:white;font-size:0.75rem;cursor:pointer;color:var(--muted)" onclick="clEditClient(\'' + c.id + '\')">Editar</button> ';
      h += '<button style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:white;font-size:0.75rem;cursor:pointer;color:var(--muted)" onclick="clShowHistory(\'' + c.id + '\',\'' + (c.nombre||'').replace(/'/g,"\\'") + '\')" title="Historial de contadoras">&#128337;</button>';
      h += '</td>';
    }
    h += '</tr>';
  });

  h += '</tbody></table>';
  el.innerHTML = h;
}

function clPopulateContadoraSelects() {
  var selC = document.getElementById('cl-m-contadora-contab');
  var selI = document.getElementById('cl-m-contadora-imp');
  var base = '<option value="">Sin asignar</option>';
  selC.innerHTML = base;
  selI.innerHTML = base;
  var names = {};
  bdContadoras.forEach(function(c) { if (c.activa) names[c.nombre] = true; });
  if (Object.keys(names).length === 0) {
    bdClientes.forEach(function(c) {
      if (c.contadora_contabilidad) names[c.contadora_contabilidad] = true;
      if (c.contadora_impuestos) names[c.contadora_impuestos] = true;
    });
  }
  Object.keys(names).sort().forEach(function(n) {
    var opt = '<option value="' + n + '">' + n + '</option>';
    selC.innerHTML += opt;
    selI.innerHTML += opt;
  });
}
