async function clSaveClient() {
  var nombre = document.getElementById('cl-m-nombre').value.trim();
  if (!nombre) {
    document.getElementById('cl-m-nombre-err').style.display = 'block';
    return;
  }
  document.getElementById('cl-m-nombre-err').style.display = 'none';

  var montoVal = document.getElementById('cl-m-monto-adm').value;
  var newContab = document.getElementById('cl-m-contadora-contab').value || null;
  var newImp = document.getElementById('cl-m-contadora-imp').value || null;
  var contadoraChanged = clEditingId && (
    (newContab || '') !== clOrigContab || (newImp || '') !== clOrigImp
  );
  var motivo = document.getElementById('cl-m-motivo').value.trim() || null;

  var record = {
    nombre: nombre,
    rnc: document.getElementById('cl-m-rnc').value.trim() || null,
    contacto: document.getElementById('cl-m-contacto').value.trim() || null,
    email: document.getElementById('cl-m-email').value.trim() || null,
    telefono: document.getElementById('cl-m-telefono').value.trim() || null,
    tipo_servicio: document.getElementById('cl-m-tipo-servicio').value || null,
    responsabilidad_contabilidad: document.getElementById('cl-m-resp-contab').checked,
    contadora_contabilidad: newContab,
    responsabilidad_impuestos: document.getElementById('cl-m-resp-imp').checked,
    contadora_impuestos: newImp,
    monto_adm: montoVal ? parseInt(montoVal) : null,
    fecha_entrada: document.getElementById('cl-m-fecha-entrada').value || null,
    fecha_salida: document.getElementById('cl-m-fecha-salida').value || null,
    activo: clModalActivo,
    inicio_responsabilidad_fiscal: document.getElementById('cl-m-inicio-fiscal').value || null,
    notas: document.getElementById('cl-m-notas').value.trim() || null
  };

  var btn = document.getElementById('cl-m-save');
  btn.disabled = true; btn.textContent = 'Guardando...';

  var result;
  if (clEditingId) {
    result = await sb.from('clientes').update(record).eq('id', clEditingId);
  } else {
    result = await sb.from('clientes').insert(record);
  }

  if (result.error) {
    btn.disabled = false; btn.textContent = 'Guardar';
    gerShowToast('Error: ' + result.error.message, 'error');
    console.error(result.error);
    return;
  }

  // Si cambió la contadora, actualizar el motivo en los registros del log
  // (el trigger ya creó las filas con motivo NULL)
  if (contadoraChanged && motivo && clEditingId) {
    await sb.from('clientes_cambios_contadora')
      .update({ motivo: motivo })
      .eq('cliente_id', clEditingId)
      .is('motivo', null)
      .order('fecha', { ascending: false })
      .limit(2);
  }

  btn.disabled = false; btn.textContent = 'Guardar';

  var wasEditing = !!clEditingId;
  clCloseModal();
  await bdLoadClientes();
  bdRenderClientes();
  gerShowToast(wasEditing ? 'Cliente actualizado' : 'Cliente agregado');
}

// ═══════════════════════════════════════════
// BD SUB-TAB: CONTADORAS
// ═══════════════════════════════════════════

function bdRenderContadoras() {
  var el = document.getElementById('bd-content');

  if (bdContadoras.length === 0) {
    var h = '<div class="bd-note">La tabla <b>contadoras</b> aún no existe en Supabase. Ejecuta el script <code>db/contadoras-table.sql</code> en el SQL Editor para habilitarla.</div>';
    h += '<div class="cl-empty"><p>No hay contadoras registradas.</p></div>';
    el.innerHTML = h;
    return;
  }

  var h = '';
  var activas = bdContadoras.filter(function(c) { return c.activa; }).length;
  var plenas = bdContadoras.filter(function(c) { return c.activa && c.tipo === 'plena'; }).length;

  h += '<div class="bd-summary">';
  h += '<div class="bd-summary-item"><div class="bd-summary-count">' + activas + '</div><div class="bd-summary-label">Activas</div></div>';
  h += '<div class="bd-summary-item"><div class="bd-summary-count">' + plenas + '</div><div class="bd-summary-label">Plenas</div></div>';
  h += '<div class="bd-summary-item"><div class="bd-summary-count">' + (bdContadoras.length - activas) + '</div><div class="bd-summary-label">Inactivas</div></div>';
  h += '</div>';

  if (userRole === 'admin') {
    h += '<div style="margin-bottom:14px"><button class="btn-add" onclick="bdContOpenModal()">+ Nueva contadora</button></div>';
  }

  bdContadoras.sort(function(a, b) { return (a.nombre || '').localeCompare(b.nombre || '', 'es'); });

  h += '<table class="bd-cont-table">';
  h += '<thead><tr><th style="width:36px">#</th><th>Nombre</th><th>Tipo</th><th>Capacidad</th><th>Estado</th><th>Notas</th>';
  if (userRole === 'admin') h += '<th></th>';
  h += '</tr></thead><tbody>';

  bdContadoras.forEach(function(c, idx) {
    var tipoCls = 'bd-tipo-' + c.tipo;
    var tipoLabel = c.tipo === 'plena' ? 'Plena' : (c.tipo === 'facturacion' ? 'Facturación' : 'Freelance');
    h += '<tr>';
    h += '<td style="color:var(--muted);font-size:0.75rem">' + (idx + 1) + '</td>';
    h += '<td style="font-weight:600;color:var(--navy)">' + esc(c.nombre) + '</td>';
    h += '<td><span class="' + tipoCls + '">' + tipoLabel + '</span></td>';
    h += '<td>' + (c.capacidad ? c.capacidad.toLocaleString() : '<span style="color:var(--light)">—</span>') + '</td>';
    h += '<td><span class="' + (c.activa ? 'cl-badge-activo' : 'cl-badge-inactivo') + '">' + (c.activa ? 'Activa' : 'Inactiva') + '</span></td>';
    h += '<td style="font-size:0.8rem;color:var(--muted)">' + esc(c.notas || '') + '</td>';
    if (userRole === 'admin') {
      h += '<td><button style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:white;font-size:0.75rem;cursor:pointer;color:var(--muted)" onclick="bdContOpenModal(\'' + c.id + '\')">Editar</button></td>';
    }
    h += '</tr>';
  });

  h += '</tbody></table>';
  el.innerHTML = h;
}

function bdContOpenModal(editId) {
  bdContEditingId = editId || null;
  if (bdContEditingId) {
    var c = bdContadoras.find(function(x) { return x.id === bdContEditingId; });
    if (!c) return;
    document.getElementById('bd-cont-modal-title').textContent = 'Editar contadora';
    document.getElementById('bd-cont-m-nombre').value = c.nombre || '';
    document.getElementById('bd-cont-m-tipo').value = c.tipo || 'plena';
    document.getElementById('bd-cont-m-capacidad').value = c.capacidad || '';
    document.getElementById('bd-cont-m-activa').value = c.activa ? 'true' : 'false';
    document.getElementById('bd-cont-m-notas').value = c.notas || '';
  } else {
    document.getElementById('bd-cont-modal-title').textContent = 'Nueva contadora';
    document.getElementById('bd-cont-m-nombre').value = '';
    document.getElementById('bd-cont-m-tipo').value = 'plena';
    document.getElementById('bd-cont-m-capacidad').value = '';
    document.getElementById('bd-cont-m-activa').value = 'true';
    document.getElementById('bd-cont-m-notas').value = '';
  }
  document.getElementById('bd-cont-m-nombre-err').style.display = 'none';
  document.getElementById('bd-cont-modal-overlay').classList.remove('hidden');
}

function bdContCloseModal() {
  document.getElementById('bd-cont-modal-overlay').classList.add('hidden');
  bdContEditingId = null;
}

async function bdContSave() {
  var nombre = document.getElementById('bd-cont-m-nombre').value.trim();
  if (!nombre) {
    document.getElementById('bd-cont-m-nombre-err').style.display = 'block';
    return;
  }
  document.getElementById('bd-cont-m-nombre-err').style.display = 'none';

  var capVal = document.getElementById('bd-cont-m-capacidad').value;
  var record = {
    nombre: nombre,
    tipo: document.getElementById('bd-cont-m-tipo').value,
    activa: document.getElementById('bd-cont-m-activa').value === 'true',
    capacidad: capVal ? parseInt(capVal) : null,
    notas: document.getElementById('bd-cont-m-notas').value.trim() || ''
  };

  var btn = document.getElementById('bd-cont-m-save');
  btn.disabled = true; btn.textContent = 'Guardando...';

  var result;
  if (bdContEditingId) {
    result = await sb.from('contadoras').update(record).eq('id', bdContEditingId);
  } else {
    result = await sb.from('contadoras').insert(record);
  }

  btn.disabled = false; btn.textContent = 'Guardar';

  if (result.error) {
    gerShowToast('Error: ' + result.error.message, 'error');
    console.error(result.error);
    return;
  }

  bdContCloseModal();
  await bdLoadContadoras();
  bdRenderContadoras();
  gerShowToast(bdContEditingId ? 'Contadora actualizada' : 'Contadora agregada');
}

// ═══════════════════════════════════════════
// BD SUB-TAB: ASIGNACIONES
// ═══════════════════════════════════════════

function bdGetContadorasForAsig() {
  // Active contadoras excluding facturacion type
  if (bdContadoras.length > 0) {
    return bdContadoras.filter(function(c) { return c.activa && c.tipo !== 'facturacion'; }).map(function(c) { return c.nombre; });
  }
  // Fallback: derive from asignaciones data
  var names = {};
  bdAsignaciones.forEach(function(a) {
    if (a.contadora && a.contadora !== 'Karina') names[a.contadora] = true;
  });
  return Object.keys(names).sort();
}

function bdGetAsigForMes(mes) {
  // Get assignments for selected month, exclude facturación contadoras
  var facContadoras = bdContadoras.filter(function(c) { return c.tipo === 'facturacion'; }).map(function(c) { return c.nombre; });
  if (facContadoras.length === 0) facContadoras = ['Karina']; // fallback

  return bdAsignaciones.filter(function(a) {
    return a.mes === mes && facContadoras.indexOf(a.contadora) < 0;
  }).sort(function(a, b) {
    return (a.cliente || '').localeCompare(b.cliente || '');
  });
}

function bdRenderAsignaciones() {
  var el = document.getElementById('bd-content');
  var h = '';

  // Month pills
  h += '<div class="bd-month-pills">';
  BD_MESES.forEach(function(m, i) {
    h += '<button class="bd-month-pill ' + (bdAsigMes === m ? 'active' : '') + '" onclick="bdSwitchAsigMes(\'' + m + '\')">' + BD_MESES_SHORT[i] + '</button>';
  });
  h += '</div>';

  var rows = bdGetAsigForMes(bdAsigMes);
  var contadoraNames = bdGetContadorasForAsig();

  // Summary
  var contadoraCounts = {};
  rows.forEach(function(r) {
    var c = r.contadora || 'Sin asignar';
    contadoraCounts[c] = (contadoraCounts[c] || 0) + 1;
  });
  var sinAsignar = contadoraCounts['Sin asignar'] || 0;

  h += '<div class="bd-summary">';
  h += '<div class="bd-summary-item"><div class="bd-summary-count">' + rows.length + '</div><div class="bd-summary-label">Clientes asignados</div></div>';
  h += '<div class="bd-summary-item"><div class="bd-summary-count">' + Object.keys(contadoraCounts).filter(function(k) { return k !== 'Sin asignar'; }).length + '</div><div class="bd-summary-label">Contadoras activas</div></div>';
  h += '<div class="bd-summary-item"><div class="bd-summary-count" style="color:' + (sinAsignar > 0 ? 'var(--red)' : 'var(--green)') + '">' + sinAsignar + '</div><div class="bd-summary-label">Sin asignar</div></div>';
  h += '</div>';

  if (rows.length === 0) {
    h += '<div class="cl-empty"><p>No hay asignaciones para ' + bdAsigMes.charAt(0).toUpperCase() + bdAsigMes.slice(1) + ' 2026.</p></div>';
    el.innerHTML = h;
    return;
  }

  // Toolbar
  if (userRole === 'admin') {
    h += '<div class="bd-asig-toolbar">';
    h += '<button class="bd-asig-add" onclick="bdAsigAddRow()">+ Agregar asignación</button>';
    h += '<div>';
    if (bdAsigDirty) h += '<span class="bd-dirty-indicator" title="Cambios sin guardar"></span> ';
    h += '<button class="bd-asig-save" id="bdAsigSaveBtn" onclick="bdAsigSaveAll()" ' + (bdAsigDirty ? '' : 'disabled') + '>Guardar cambios</button>';
    h += '</div>';
    h += '</div>';
  }

  // Table
  h += '<div class="table-wrap"><table class="bd-asig-table">';
  h += '<thead><tr><th>#</th><th>Cliente</th><th>Contadora</th><th style="text-align:right">Serv</th><th style="text-align:right">Adm</th>';
  if (userRole === 'admin') h += '<th></th>';
  h += '</tr></thead><tbody>';

  rows.forEach(function(r, idx) {
    var edited = bdAsigEdits[idx];
    var contVal = edited ? edited.contadora : r.contadora;
    var servVal = edited ? edited.serv : r.serv;
    var admVal = edited ? edited.adm : r.adm;

    h += '<tr>';
    h += '<td style="color:var(--light);font-size:0.75rem">' + (idx + 1) + '</td>';
    h += '<td style="font-weight:600;color:var(--navy)">' + esc(r.cliente) + '</td>';

    if (userRole === 'admin') {
      h += '<td><select onchange="bdAsigEdit(' + idx + ',\'contadora\',this.value)">';
      h += '<option value="Sin asignar"' + (contVal === 'Sin asignar' ? ' selected' : '') + '>Sin asignar</option>';
      contadoraNames.forEach(function(cn) {
        h += '<option value="' + esc(cn) + '"' + (contVal === cn ? ' selected' : '') + '>' + esc(cn) + '</option>';
      });
      h += '</select></td>';
      h += '<td><input type="number" value="' + (servVal || 0) + '" onchange="bdAsigEdit(' + idx + ',\'serv\',this.value)" style="text-align:right"></td>';
      h += '<td><input type="number" value="' + (admVal || 0) + '" onchange="bdAsigEdit(' + idx + ',\'adm\',this.value)" style="text-align:right"></td>';
      h += '<td><button style="padding:3px 8px;border:1px solid #fecaca;border-radius:6px;background:white;font-size:0.72rem;cursor:pointer;color:var(--red)" onclick="bdAsigDeleteRow(' + r.id + ')">✕</button></td>';
    } else {
      h += '<td>' + esc(contVal || 'Sin asignar') + '</td>';
      h += '<td style="text-align:right">' + (servVal || 0) + '</td>';
      h += '<td style="text-align:right">' + (admVal || 0) + '</td>';
    }

    h += '</tr>';
  });

  h += '</tbody></table></div>';
  el.innerHTML = h;
}

function bdSwitchAsigMes(mes) {
  if (bdAsigDirty) {
    if (!confirm('Tienes cambios sin guardar. ¿Cambiar de mes sin guardar?')) return;
  }
  bdAsigMes = mes;
  bdAsigDirty = false;
  bdAsigEdits = {};
  bdRenderAsignaciones();
}

function bdAsigEdit(idx, field, value) {
  if (!bdAsigEdits[idx]) {
    var rows = bdGetAsigForMes(bdAsigMes);
    var r = rows[idx];
    bdAsigEdits[idx] = { contadora: r.contadora, serv: r.serv, adm: r.adm, id: r.id };
  }
  if (field === 'serv' || field === 'adm') value = parseFloat(value) || 0;
  bdAsigEdits[idx][field] = value;
  bdAsigDirty = true;

  // Update save button state without full re-render
  var btn = document.getElementById('bdAsigSaveBtn');
  if (btn) btn.disabled = false;
}

async function bdAsigSaveAll() {
  var btn = document.getElementById('bdAsigSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  var keys = Object.keys(bdAsigEdits);
  var errors = [];

  for (var i = 0; i < keys.length; i++) {
    var edit = bdAsigEdits[keys[i]];
    if (!edit.id) continue;
    var { error } = await sb.from('asignaciones')
      .update({ contadora: edit.contadora, serv: edit.serv, adm: edit.adm })
      .eq('id', edit.id);
    if (error) errors.push(error.message);
  }

  if (btn) { btn.textContent = 'Guardar cambios'; }

  if (errors.length > 0) {
    gerShowToast('Error: ' + errors[0], 'error');
  } else {
    bdAsigDirty = false;
    bdAsigEdits = {};
    await bdLoadAsignaciones();
    bdRenderAsignaciones();
    gerShowToast('Asignaciones actualizadas');
  }
}

async function bdAsigAddRow() {
  // Get list of clients not yet assigned for this month
  var rows = bdGetAsigForMes(bdAsigMes);
  var assigned = {};
  rows.forEach(function(r) { assigned[r.cliente] = true; });

  var available = bdClientes.filter(function(c) {
    return c.activo !== false && !assigned[c.nombre];
  });

  if (available.length === 0) {
    gerShowToast('Todos los clientes activos ya están asignados para este mes', 'error');
    return;
  }

  // Insert the first available client as "Sin asignar"
  var clienteNombre = available[0].nombre;
  var nombre = prompt('Cliente a agregar para ' + bdAsigMes + ':\n\nDisponibles: ' + available.map(function(c) { return c.nombre; }).join(', '), clienteNombre);
  if (!nombre) return;

  // Verify client exists
  var match = available.find(function(c) { return c.nombre.toLowerCase() === nombre.toLowerCase(); });
  if (!match) {
    gerShowToast('Cliente no encontrado entre los disponibles', 'error');
    return;
  }

  var { error } = await sb.from('asignaciones').insert({
    mes: bdAsigMes, anio: 2026, contadora: 'Sin asignar', cliente: match.nombre, serv: 0, adm: 0
  });

  if (error) {
    gerShowToast('Error: ' + error.message, 'error');
    return;
  }

  await bdLoadAsignaciones();
  bdRenderAsignaciones();
  gerShowToast('Asignación agregada: ' + match.nombre);
}

async function bdAsigDeleteRow(id) {
  if (!confirm('¿Eliminar esta asignación?')) return;
  var { error } = await sb.from('asignaciones').delete().eq('id', id);
  if (error) {
    gerShowToast('Error: ' + error.message, 'error');
    return;
  }
  await bdLoadAsignaciones();
  bdRenderAsignaciones();
  gerShowToast('Asignación eliminada');
}

// ══════════════════════════════════════════════════════════════
// ██  SHOW APP
// ══════════════════════════════════════════════════════════════

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrapper').classList.remove('hidden');
  document.getElementById('user-display-name').textContent = userName;

  // Load all modules' data in parallel
  await Promise.all([
    ccLoadData(),
    ccLoadImplementaciones(),
    ccLoadSoftwareClientes(),
    ccLoadPerfilesFromDB(),
    ccLoadKpiFromDB(),
    ctdLoadContadoras(),
    bdLoadAll()
  ]);

  // Init CC state
  ccActiveMainTab = 'dashboard';
  ccActiveSubTab = null;

  // Init CTD state
  ctdSelectedMes = ctdGetCurrentReportMonth();

  // Init BD state
  bdActiveSubTab = 'clientes';
  // Set asignaciones month to current month or latest with data
  var now = new Date();
  var curMes = BD_MESES[now.getMonth()];
  var mesConDatos = bdAsignaciones.filter(function(a) { return a.mes === curMes; });
  bdAsigMes = mesConDatos.length > 0 ? curMes : (bdAsignaciones.length > 0 ? bdAsignaciones[bdAsignaciones.length - 1].mes : curMes);

  // Render
  renderGerMainTabs();
  switchGerTab(gerMainTab);
}

// Enter key handlers
var loginPwdEl = document.getElementById('login-password');
var loginEmailEl = document.getElementById('login-email');
if (loginPwdEl) loginPwdEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
if (loginEmailEl) loginEmailEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('login-password').focus(); });

// Embed mode
var isEmbed = new URLSearchParams(window.location.search).get('embed') === '1';
if (isEmbed) document.body.classList.add('embed');

// Init
async function init() {
  var result = await sb.auth.getSession();
  var session = result.data ? result.data.session : null;
  if (session) { await loadUserProfile(); await showApp(); }
  else if (isEmbed) { document.body.innerHTML = '<div style="text-align:center;padding:60px;color:#7c8495;">Sesion no encontrada. Recarga la pagina principal.</div>'; }
}
init();
</script>
