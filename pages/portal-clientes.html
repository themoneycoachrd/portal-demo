  h += '<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px">';
  h += '<div><div style="font-weight:700">Mayo — Diciembre</div><div style="font-size:0.7rem;color:var(--light)">Cuota Mensual</div></div>';
  h += '<div style="font-weight:700;font-size:1.1rem">$' + pmFormatMoney(antTramo2) + '</div></div>';
  var ultimoPagado = antTramo1;
  h += '<div style="background:#f8fafc;padding:14px;border-radius:8px;display:flex;justify-content:space-between;align-items:center">';
  h += '<div><div style="font-weight:700;font-size:0.75rem;text-transform:uppercase">Último Anticipo Pagado</div>';
  h += '<div style="font-size:0.7rem;color:var(--light)">Monto del último mes</div></div>';
  h += '<div style="font-weight:800;font-size:1.4rem;color:var(--blue)">$' + pmFormatMoney(ultimoPagado) + '</div></div>';
  h += '</div></div>';

  h += '<div class="pm-panel pm-panel-dark"><div class="pm-panel-hdr">';
  h += '<h3 style="text-transform:uppercase;font-size:0.78rem;letter-spacing:0.3px">Proyección Anticipo Próx. Año</h3></div>';
  h += '<div class="pm-panel-body" style="padding:0"><table style="font-size:0.82rem"><tbody>';
  h += '<tr><td style="padding:10px 20px;color:var(--muted)">Ingresos Totales</td><td class="pm-text-right" style="padding:10px 20px;font-weight:700">$' + pmFormatMoney(projV) + '</td></tr>';
  h += '<tr><td style="padding:10px 20px;color:var(--muted)">ISR Liquidado (Base)</td><td class="pm-text-right" style="padding:10px 20px;font-weight:700">$' + pmFormatMoney(isrProyectado) + '</td></tr>';
  h += '<tr><td style="padding:10px 20px;color:var(--muted)">T.E.T. (Tasa Efectiva)</td><td class="pm-text-right" style="padding:10px 20px;font-weight:600;color:var(--blue)">' + tet.toFixed(0) + '%</td></tr>';
  h += '<tr style="background:#fffbeb"><td style="padding:10px 20px;font-weight:600">Total Anticipo Calculado</td><td class="pm-text-right" style="padding:10px 20px;font-weight:700;color:var(--amber)">$' + pmFormatMoney(totalAntCalc) + '</td></tr>';
  h += '<tr style="border-top:1px solid var(--border)"><td style="padding:14px 20px;font-weight:700">Anticipo Mensual Estimado</td>';
  h += '<td class="pm-text-right" style="padding:14px 20px"><div style="font-weight:800;font-size:1.3rem;color:var(--amber)">$' + pmFormatMoney(antMensualProx) + '</div>';
  if (antActual > 0) {
    var arrow = varAntPct < 0 ? '↓' : '↑';
    var varColor = varAntPct < 0 ? 'var(--green)' : 'var(--red)';
    h += '<div style="font-size:0.7rem;font-weight:700;color:' + varColor + ';margin-top:2px">' + arrow + ' ' + Math.abs(varAntPct).toFixed(1) + '% vs Anticipo Actual</div>';
  }
  h += '</td></tr></tbody></table></div></div></div>';

  h += '<div class="pm-panel" style="margin-bottom:16px;overflow:hidden">';
  h += '<div class="pm-panel-hdr" style="background:var(--navy);border-bottom:none">';
  h += '<h3 style="color:white;text-transform:uppercase;font-size:0.78rem;letter-spacing:0.3px">Contribución de Residuos Sólidos (CRS)</h3></div>';
  h += '<div class="pm-crs-banner">';
  h += '<div><div style="color:rgba(255,255,255,0.7);font-size:0.78rem">Ingresos Brutos Proyectados (Anual)</div>';
  h += '<div style="color:white;font-size:1.4rem;font-weight:800;font-family:monospace">$' + pmFormatMoney(projV) + '</div></div>';
  h += '<div class="pm-crs-pill"><span style="color:white;font-weight:700;font-size:0.95rem">Contribución Anual (Ley 98-25)</span>';
  h += '<span style="color:#fbbf24;font-weight:800;font-size:1.6rem">$' + pmFormatMoney(crsMonto) + '</span></div></div></div>';

  // Anticipos Mensuales — dos tablas lado a lado
  var totalAntAnual = 0;
  var antHalves = [
    { titulo: 'Ene — Jun', desde: 1, hasta: 6 },
    { titulo: 'Jul — Dic', desde: 7, hasta: 12 }
  ];
  h += '<div class="pm-panel" style="margin-bottom:16px"><div class="pm-panel-hdr" style="background:var(--navy);border-bottom:none"><h3 style="color:white;text-transform:uppercase;font-size:0.78rem;letter-spacing:0.3px">Anticipos Mensuales — Comparativo de Tramos</h3></div><div class="pm-panel-body" style="padding:16px">';
  h += '<div class="pm-dual">';
  for (var hi = 0; hi < 2; hi++) {
    var half = antHalves[hi];
    var subtotal = 0;
    h += '<div class="pm-card" style="margin-bottom:0"><div class="pm-card-title" style="font-size:0.82rem;padding:10px 14px">' + half.titulo + '</div>';
    h += '<table style="width:100%;table-layout:auto"><thead><tr><th style="white-space:nowrap">Mes</th><th class="pm-text-right" style="white-space:nowrap">Anticipo RD$</th><th class="pm-text-center" style="white-space:nowrap">Tramo</th><th style="width:40%">Nota</th></tr></thead><tbody>';
    for (var am = half.desde; am <= half.hasta; am++) {
      var antMonto = am <= 4 ? antTramo1 : antTramo2;
      subtotal += antMonto;
      totalAntAnual += antMonto;
      var tramo = am <= 4 ? 'Anterior' : 'Nuevo';
      var tramoCls = am <= 4 ? 'na' : 'verde';
      var nota = '';
      if (am === 4) nota = 'Último mes tramo anterior';
      if (am === 5) {
        var diff5 = antTramo2 - antTramo1;
        var pct5 = antTramo1 ? (diff5 / antTramo1 * 100) : 0;
        nota = (diff5 < 0 ? '↓' : '↑') + ' Cambio — ' + (diff5 < 0 ? 'baja' : 'sube') + ' $' + pmFormatMoney(Math.abs(diff5)) + ' (' + Math.abs(pct5).toFixed(1) + '%)';
      }
      var rowStyle = am === 5 ? ' style="background:#fffbeb"' : '';
      h += '<tr' + rowStyle + '><td' + (am === 5 ? ' class="pm-font-bold"' : '') + '>' + MESES_FULL[am - 1] + '</td>';
      h += '<td class="pm-text-right pm-font-bold">' + pmFormatMoney(antMonto) + '</td>';
      h += '<td class="pm-text-center"><span class="pm-sem ' + tramoCls + '"><span class="pm-dot"></span>' + tramo + '</span></td>';
      h += '<td style="color:' + (am === 5 ? 'var(--amber);font-weight:600' : 'var(--muted)') + ';font-size:0.75rem">' + nota + '</td></tr>';
    }
    h += '<tr class="pm-row-total"><td class="pm-font-bold">Subtotal</td><td class="pm-text-right pm-font-bold">' + pmFormatMoney(subtotal) + '</td><td></td><td></td></tr>';
    h += '</tbody></table></div>';
  }
  h += '</div>';
  h += '<div style="text-align:right;padding:8px 14px;font-weight:700;font-size:0.9rem;color:var(--navy)">Total Anual: $' + pmFormatMoney(totalAntAnual) + '</div>';
  h += '</div></div>';

  return h;
}

// ── DECLARACIONES ──
// Calcula color semáforo: verde (antes de firma), amarillo (entre firma y deadline), rojo (después de deadline), na (sin datos)
var PM_OBLIGACIONES = ['TSS', 'Infotep', 'IR-3', 'IR-17', 'Anticipo', 'ITBIS'];
var PM_DIA_LIMITE = { 'TSS': 3, 'Infotep': 3, 'IR-3': 10, 'IR-17': 10, 'Anticipo': 15, 'ITBIS': 20 };

function pmGetFechaFromChecklist(mesNum, obligacion) {
  var ck = pmImpChecklist.find(function(c) { return c.mes === String(mesNum) && c.impuesto === obligacion; });
  if (!ck) {
    ck = pmImpChecklist.find(function(c) { return parseInt(c.mes) === mesNum && c.impuesto === obligacion; });
  }
  if (!ck || !ck.datos) return null;
  var d = ck.datos;
  var steps = ['pagado', 'anticipo_pagado', 'aprobado_cliente', 'aprobada_impuestos', 'borrador_presentado', 'presentada_contadora'];
  for (var i = 0; i < steps.length; i++) {
    if (d[steps[i]] && d[steps[i]].done && d[steps[i]].fecha) return d[steps[i]].fecha;
  }
  return null;
}

function pmDeclColor(d, mesNum, obligacion) {
  if (d && (d.estado === 'no_aplico' || d.estado === 'pendiente')) return 'na';
  var fechaPres = (d && d.fecha_presentado) ? d.fecha_presentado : (mesNum && obligacion ? pmGetFechaFromChecklist(mesNum, obligacion) : null);
  var fechaLim = d ? d.fecha_limite : null;
  if (!fechaPres || !fechaLim) return 'na';
  var pres = new Date(fechaPres + 'T00:00:00');
  var limite = new Date(fechaLim + 'T00:00:00');
  var firma = new Date(limite); firma.setDate(firma.getDate() - 5);
  if (pres <= firma) return 'verde';
  if (pres <= limite) return 'amarillo';
  return 'rojo';
}

function renderDeclaracionesDetail() {
  var h = '<button class="pc-back-btn" onclick="pmCloseDetail()">← Volver</button>';
  var mesNum = pmGetMesIdx(selectedMes);
  var obligaciones = PM_OBLIGACIONES;

  var declMes = pmDeclaraciones.filter(function(d) { return d.mes === mesNum; });
  var presentadas = declMes.filter(function(d) { return d.estado === 'a_tiempo' || d.estado === 'tarde'; }).length;
  var noAplico = declMes.filter(function(d) { return d.estado === 'no_aplico'; }).length;
  var totalMonto = 0;
  declMes.forEach(function(d) { totalMonto += (d.monto || 0); });

  var prevMes = mesNum > 1 ? mesNum - 1 : 12;
  var declPrev = pmDeclaraciones.filter(function(d) { return d.mes === prevMes; });
  var totalPrev = 0;
  declPrev.forEach(function(d) { totalPrev += (d.monto || 0); });

  // Summary cards
  var greenCount = 0, yellowCount = 0, redCount = 0;
  obligaciones.forEach(function(ob) {
    var d = declMes.find(function(x) { return x.obligacion === ob; });
    var c = pmDeclColor(d, mesNum, ob);
    if (c === 'verde') greenCount++;
    else if (c === 'amarillo') yellowCount++;
    else if (c === 'rojo') redCount++;
  });

  h += '<div class="pm-summary-row">';
  h += '<div class="pm-summary-card pm-green-accent"><div class="pm-sc-label">Presentadas</div>';
  h += '<div class="pm-sc-value navy">' + presentadas + ' / ' + obligaciones.length + '</div>';
  if (noAplico > 0) h += '<div class="pm-sc-sub">' + noAplico + ' no aplicaron</div>';
  h += '</div>';

  h += '<div class="pm-summary-card pm-blue-accent"><div class="pm-sc-label">Pagado ' + MESES_FULL[mesNum - 1] + '</div>';
  h += '<div class="pm-sc-value navy">RD$' + pmFormatMoneyShort(totalMonto) + '</div>';
  h += '<div class="pm-sc-sub">' + MESES_FULL[prevMes - 1] + ': RD$' + pmFormatMoneyShort(totalPrev) + '</div></div>';

  h += '<div class="pm-summary-card" style="border-left:4px solid var(--navy)"><div class="pm-sc-label">Puntualidad</div>';
  h += '<div style="display:flex;gap:10px;margin-top:6px">';
  if (greenCount) h += '<span class="pm-sem verde"><span class="pm-dot"></span>' + greenCount + '</span>';
  if (yellowCount) h += '<span class="pm-sem amarillo"><span class="pm-dot"></span>' + yellowCount + '</span>';
  if (redCount) h += '<span class="pm-sem rojo"><span class="pm-dot"></span>' + redCount + '</span>';
  if (!greenCount && !yellowCount && !redCount) h += '<span class="pm-sem na"><span class="pm-dot"></span>—</span>';
  h += '</div></div>';
  h += '</div>';

  // Últimos 3 meses para puntualidad inline
  var histMeses = [];
  for (var hm = mesNum; hm >= 1 && histMeses.length < 3; hm--) { histMeses.unshift(hm); }

  // Tabla principal
  h += '<div class="pm-card"><div class="pm-card-title">Detalle de Declaraciones — ' + MESES_FULL[mesNum - 1] + ' ' + pmYear + '</div>';
  h += '<table><thead><tr>';
  h += '<th>Obligación</th><th class="pm-text-center">Fecha Límite</th><th class="pm-text-center">Presentado</th>';
  h += '<th class="pm-text-right">Pagado ' + MESES_FULL[prevMes - 1].substring(0, 3) + '.</th><th class="pm-text-right">Pagado ' + MESES_FULL[mesNum - 1].substring(0, 3) + '.</th>';
  h += '<th class="pm-text-center">Variación</th>';
  histMeses.forEach(function(hm) { h += '<th class="pm-text-center" style="font-size:0.65rem">' + MESES_FULL[hm - 1].substring(0, 3) + '</th>'; });
  h += '</tr></thead><tbody>';

  var totalMontoDecl = 0, totalPrevDecl = 0;
  obligaciones.forEach(function(ob) {
    var d = pmGetDeclForMes(mesNum, ob);
    var prev = pmGetDeclForMes(prevMes, ob);
    var monto = d ? (d.monto || 0) : 0;
    var montoPrev = prev ? (prev.monto || 0) : 0;
    totalMontoDecl += monto;
    totalPrevDecl += montoPrev;

    h += '<tr><td class="pm-font-bold">' + ob + '</td>';

    // Fecha límite (fija por tipo de obligación, cae en el mes SIGUIENTE al de trabajo)
    var diaLim = PM_DIA_LIMITE[ob];
    var mesLimIdx = mesNum < 12 ? mesNum : 0;
    var fechaLimTxt = diaLim ? (diaLim + ' de ' + MESES_FULL[mesLimIdx].toLowerCase()) : '';
    h += '<td class="pm-text-center">' + (fechaLimTxt || '<span style="color:var(--muted)">—</span>') + '</td>';

    // Presentado: primero portal_declaraciones, fallback a checklist de impuestos
    var fechaPres = (d && d.fecha_presentado) ? d.fecha_presentado : pmGetFechaFromChecklist(mesNum, ob);
    h += '<td class="pm-text-center">' + (fechaPres ? pmFormatDate(fechaPres) : '<span style="color:var(--muted)">—</span>') + '</td>';

    // Pagado mes anterior
    h += '<td class="pm-text-right">' + (montoPrev > 0 ? pmFormatMoney(montoPrev) : '<span style="color:var(--muted)">—</span>') + '</td>';

    // Pagado este mes
    h += '<td class="pm-text-right">' + (monto > 0 ? pmFormatMoney(monto) : '<span style="color:var(--muted)">—</span>') + '</td>';

    // Variación
    if (montoPrev > 0 && monto > 0) {
      var varPct = ((monto - montoPrev) / montoPrev * 100);
      if (Math.abs(varPct) < 0.5) {
        h += '<td class="pm-text-center"><span class="pm-var-neutral">— 0%</span></td>';
      } else if (varPct > 0) {
        h += '<td class="pm-text-center"><span class="pm-var-up">↑ +' + varPct.toFixed(1) + '%</span></td>';
      } else {
        h += '<td class="pm-text-center"><span class="pm-var-down">↓ ' + varPct.toFixed(1) + '%</span></td>';
      }
    } else {
      h += '<td class="pm-text-center"><span class="pm-var-neutral">—</span></td>';
    }

    // Puntualidad: dot por cada mes del historial
    histMeses.forEach(function(hm) {
      var dh = pmGetDeclForMes(hm, ob);
      var col = pmDeclColor(dh, hm, ob);
      h += '<td class="pm-text-center"><span class="pm-sem-dot ' + col + '"><span class="pm-dot"></span></span></td>';
    });

    h += '</tr>';
  });

  // Fila total
  h += '<tr class="pm-row-total"><td class="pm-font-bold">Total</td><td></td><td></td>';
  h += '<td class="pm-text-right pm-font-bold">' + pmFormatMoney(totalPrevDecl) + '</td>';
  h += '<td class="pm-text-right pm-font-bold">' + pmFormatMoney(totalMontoDecl) + '</td>';
  if (totalPrevDecl > 0 && totalMontoDecl > 0) {
    var totalVar = ((totalMontoDecl - totalPrevDecl) / totalPrevDecl * 100);
    h += '<td class="pm-text-center"><span class="' + (totalVar > 0 ? 'pm-var-up' : totalVar < 0 ? 'pm-var-down' : 'pm-var-neutral') + '">' + (totalVar > 0 ? '↑ +' : totalVar < 0 ? '↓ ' : '') + totalVar.toFixed(1) + '%</span></td>';
  } else {
    h += '<td class="pm-text-center"><span class="pm-var-neutral">—</span></td>';
  }
  for (var ti = 0; ti < histMeses.length; ti++) h += '<td></td>';
  h += '</tr></tbody></table></div>';

  // Nota del mes (solo lectura en vista cliente)
  var ejMes = pmGetEjecucionMes(mesNum);
  var notaVal = ejMes ? (ejMes.nota_declaraciones || '') : '';
  if (notaVal) {
    h += '<div class="pm-card"><div class="pm-card-title">Nota del Mes</div>';
    h += '<div style="padding:10px 14px;font-size:0.85rem;color:var(--navy);line-height:1.5">' + esc(notaVal) + '</div>';
    h += '</div>';
  }

  return h;
}

function pmFormatDate(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr + 'T00:00:00');
  var months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

// ==================== START ====================
init();
</script>
