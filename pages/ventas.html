async function loadTracker() {
  const [rows, meta] = await Promise.all([
    sb.from('comercial_tracker').select('*').eq('anio', ANIO),
    sb.from('comercial_tracker_meta').select('*').eq('anio', ANIO)
  ]);
  if (rows.error) console.error('Error cargando tracker:', rows.error);
  APP.trkData = rows.data || [];
  APP.trkMeta = {};
  (meta.data || []).forEach(m => { APP.trkMeta[m.mes] = !!m.hubo_webinar; });
  return true;
}
function trkRow(mes, semana) { return APP.trkData.find(r => r.mes === mes && r.semana === semana) || null; }
// Seguidores de la última semana con dato ANTES de (mes, semana) — cruza meses.
function trkPrevSeguidores(mes, semana) {
  const myKey = MONTHS.indexOf(mes) * 10 + semana;
  let prev = null, prevKey = -1;
  APP.trkData.forEach(r => {
    if (r.seguidores == null) return;
    const k = MONTHS.indexOf(r.mes) * 10 + r.semana;
    if (k < myKey && k > prevKey) { prevKey = k; prev = r.seguidores; }
  });
  return prev;
}

function renderTracker() {
  const container = document.getElementById('tab-tracker');
  if (!APP.trkMonth) APP.trkMonth = MONTHS[new Date().getMonth()];
  const mes = APP.trkMonth;
  const weeks = [1,2];                          // quincenas: 1 = Q1 (1-15), 2 = Q2 (16-fin)
  const QLAB = { 1:'Q1 (1–15)', 2:'Q2 (16–fin)' };
  const hayWeb = !!APP.trkMeta[mes];

  // Formatos: costos unitarios = 2 decimales; todo lo demás = entero.
  const fmtInt = (n) => Math.round(Number(n)||0).toLocaleString('es-DO');
  const fmtMoneyInt = (n) => 'US$ ' + fmtInt(n);
  const fmtCost = (n) => 'US$ ' + (Number(n)||0).toFixed(2);
  const fmtPctInt = (n) => Math.round(Number(n)||0) + '%';

  const sumW = (field) => weeks.reduce((s,w)=>{ const r=trkRow(mes,w); return s + (r && r[field]!=null ? Number(r[field]) : 0); }, 0);
  const cell = (w, field, fmtFn) => {
    const editing = APP.trkEditing && APP.trkEditing.semana===w && APP.trkEditing.field===field;
    const r = trkRow(mes,w);
    const raw = (r && r[field]!=null) ? r[field] : '';
    if (editing) return '<td><input class="inline-edit trk-input" type="number" step="any" data-trk-week="'+w+'" data-trk-field="'+field+'" value="'+raw+'" autofocus></td>';
    const disp = raw==='' ? '<span style="color:var(--muted)">—</span>' : fmtFn(Number(raw));
    return '<td class="editable trk-edit-cell" data-trk-week="'+w+'" data-trk-field="'+field+'">'+disp+'</td>';
  };
  const der = (val, fmtFn) => (val==null||isNaN(val)) ? '<td style="background:#f7f8fa;color:var(--muted)">—</td>' : '<td style="background:#f7f8fa">'+fmtFn(val)+'</td>';
  const labelTd = (txt,opts) => '<td style="text-align:left'+((opts&&opts.bold)?';font-weight:700':'')+((opts&&opts.indent)?';padding-left:26px;color:var(--muted)':'')+'">'+txt+'</td>';
  const rowEdit = (label, field, fmtFn, indent) => '<tr>'+labelTd(label,{indent:indent})+weeks.map(w=>cell(w,field,fmtFn)).join('')+der(sumW(field),fmtFn)+'</tr>';

  // Cierres automáticos por quincena: por la fecha de cierre del lead (del checklist comercial) o, en su defecto, la fecha demo.
  const cierreFechaDe = (lead) => {
    const chk = (APP.chkData||[]).find(r => r.lead_id === lead._id);
    if (chk && chk.data && chk.data.lead_cerrado && chk.data.lead_cerrado.fecha) return chk.data.lead_cerrado.fecha;
    return lead.demo || null;
  };
  const ganadosMesT = ((APP.data && APP.data.pipeline && APP.data.pipeline[mes]) ? APP.data.pipeline[mes] : []).filter(l => l.f === 'Cerrado Ganado');
  const cierresQ = {1:0, 2:0};
  ganadosMesT.forEach(l => { const f=cierreFechaDe(l); const dia=f?new Date(f+'T00:00:00').getDate():1; cierresQ[(dia<=15)?1:2]++; });
  const cierresMesAuto = ganadosMesT.length;

  // Derivados
  const showW = (w) => { const r=trkRow(mes,w); if(!r||r.citas==null) return null; return Number(r.citas||0)-Number(r.no_show||0); };
  const totShow = sumW('citas')-sumW('no_show');
  const pctW = (w) => { const sh=showW(w); if(sh==null||sh<=0) return null; return cierresQ[w]/sh*100; };
  const cpCitaW = (w) => { const r=trkRow(mes,w); if(!r||!r.citas) return null; return Number(r.inv_citas||0)/Number(r.citas); };
  const cpRegW = (w) => { const r=trkRow(mes,w); if(!r||!r.webinar_reg) return null; return Number(r.inv_webinar||0)/Number(r.webinar_reg); };
  const invW = (w) => { const r=trkRow(mes,w); if(!r) return 0; return Number(r.inv_awareness||0)+Number(r.inv_citas||0)+(hayWeb?Number(r.inv_webinar||0):0); };

  // Resumen
  const totInv = sumW('inv_awareness')+sumW('inv_citas')+(hayWeb?sumW('inv_webinar'):0);
  // Seguidores: cada quincena tiene inicio y fin. `seguidores` = fin; `seguidores_inicio` = inicio.
  // El inicio de Q2 hala el fin de Q1 (y el de Q1 hala el fin del mes anterior), editable.
  const finW = (w) => { const r=trkRow(mes,w); return (r&&r.seguidores!=null)?Number(r.seguidores):null; };
  const inicioRawW = (w) => { const r=trkRow(mes,w); return (r&&r.seguidores_inicio!=null)?Number(r.seguidores_inicio):null; };
  const inicioEffW = (w) => { const raw=inicioRawW(w); if(raw!=null) return raw; return (w===1) ? trkPrevSeguidores(mes,1) : finW(1); };
  const nuevosW = (w) => { const f=finW(w), i=inicioEffW(w); return (f!=null&&i!=null)?(f-i):null; };
  // Costo por seguidor por quincena = inversión awareness de la quincena / seguidores nuevos de la quincena
  const cpSegW = (w) => { const n=nuevosW(w); if(n==null||n<=0) return null; const r=trkRow(mes,w); return Number(r.inv_awareness||0)/n; };
  const inicioPeriodo = inicioEffW(1);
  let finPeriodo=null; weeks.forEach(w=>{ const f=finW(w); if(f!=null) finPeriodo=f; });
  const hayNuevos = weeks.some(w=>nuevosW(w)!=null);
  const nuevosPeriodo = weeks.reduce((s,w)=>{ const n=nuevosW(w); return s+(n!=null?n:0); }, 0);
  const cpSeg = (hayNuevos && nuevosPeriodo>0) ? sumW('inv_awareness')/nuevosPeriodo : null;

  let html = '';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px">';
  html += '<h3 style="font-size:1rem;margin:0">Tracker quincenal · '+ANIO+'</h3>';
  html += '<label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;font-weight:600;cursor:pointer"><input type="checkbox" id="trk-webinar-toggle"'+(hayWeb?' checked':'')+'> ¿Hubo webinar este mes?</label>';
  html += '</div>';
  html += '<div class="month-tabs">';
  MONTHS.forEach((m,i)=>{ html += '<button class="month-tab trk-month'+(m===mes?' active':'')+'" data-trk-month="'+m+'">'+MONTH_LABELS[i]+'</button>'; });
  html += '</div>';

  // ── Resumen (cards) ──
  // Venta del mes = neto (con descuentos) de los leads Cerrado Ganado del mes seleccionado.
  const ventaMes = ganadosMesT.reduce((s,l) => s + leadVendido(l, true), 0);
  const cierresMes = cierresMesAuto;
  const card=(lbl,val,cls)=>'<div class="stat-card"><div class="label">'+lbl+'</div><div class="value '+(cls||'')+'">'+val+'</div></div>';
  html += '<div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin:14px 0">';
  html += card('Venta del mes', fmtMoneyInt(ventaMes), 'green');
  html += card('Total invertido', fmtMoneyInt(totInv), 'navy');
  html += card('Cierres', fmtInt(cierresMes), 'green');
  html += card('Seguidores inicio', inicioPeriodo!=null?fmtInt(inicioPeriodo):'—', 'navy');
  html += card('Seguidores fin', finPeriodo!=null?fmtInt(finPeriodo):'—', 'navy');
  html += card('Seguidores nuevos', hayNuevos?((nuevosPeriodo>=0?'+':'')+fmtInt(nuevosPeriodo)):'—', 'green');
  html += card('Costo/Seguidor', cpSeg!=null?fmtCost(cpSeg):'—', 'amber');
  html += '</div>';

  html += '<div class="roas-table-wrapper"><table class="roas-table">';
  html += '<thead><tr><th>KPI</th>'+weeks.map(w=>'<th>'+QLAB[w]+'</th>').join('')+'<th>Total</th></tr></thead><tbody>';

  // Celda copiada (solo lectura, gris) de un campo de otra sección
  const copyCell = (w, field, fmtFn) => { const r=trkRow(mes,w); return der((r && r[field]!=null)?Number(r[field]):null, fmtFn); };

  // ── 1) Inversión Total (header = suma de las 3 inversiones) ──
  const invCells = weeks.map(w=>der(invW(w),fmtMoneyInt)).join('')+der(weeks.reduce((s,w)=>s+invW(w),0),fmtMoneyInt);
  html += '<tr class="trk-group" data-trk-group="inversion" style="cursor:pointer"><td style="text-align:left;font-weight:700">'+(APP.trkExpand.inversion?'▾':'▸')+' Inversión Total</td>'+invCells+'</tr>';
  if (APP.trkExpand.inversion) {
    html += rowEdit('Inversión Awareness','inv_awareness',fmtMoneyInt,true);
    html += rowEdit('Inversión Citas','inv_citas',fmtMoneyInt,true);
    if (hayWeb) html += rowEdit('Inversión Webinar','inv_webinar',fmtMoneyInt,true);
    // Resultados de eficiencia (calculados): awareness → costo/seguidor; citas → costo/lead
    const cpLeadTot = sumW('citas')>0 ? sumW('inv_citas')/sumW('citas') : null;
    html += '<tr>'+labelTd('$ Costo por seguidor',{indent:true})+der(cpSegW(1),fmtCost)+der(cpSegW(2),fmtCost)+der(cpSeg,fmtCost)+'</tr>';
    html += '<tr>'+labelTd('$ Costo por lead',{indent:true})+der(cpCitaW(1),fmtCost)+der(cpCitaW(2),fmtCost)+der(cpLeadTot,fmtCost)+'</tr>';
  }

  // ── 2) Seguidores (header = seguidores actuales) ──
  // Total de Seguidores = los nuevos (resta Q2−Q1), no el snapshot repetido.
  // Celda de "inicio" editable: si no se ha tecleado, muestra (en gris) el valor halado del fin anterior.
  const inicioCell = (w) => {
    const editing = APP.trkEditing && APP.trkEditing.semana===w && APP.trkEditing.field==='seguidores_inicio';
    const raw = inicioRawW(w), eff = inicioEffW(w);
    if (editing) {
      const v = raw!=null ? raw : (eff!=null ? eff : '');
      return '<td><input class="inline-edit trk-input" type="number" step="any" data-trk-week="'+w+'" data-trk-field="seguidores_inicio" value="'+v+'" autofocus></td>';
    }
    let disp;
    if (raw!=null) disp = fmtInt(raw);
    else if (eff!=null) disp = '<span style="color:var(--muted)" title="Halado del fin de la quincena anterior — clic para cambiar">'+fmtInt(eff)+'</span>';
    else disp = '<span style="color:var(--muted)">—</span>';
    return '<td class="editable trk-edit-cell" data-trk-week="'+w+'" data-trk-field="seguidores_inicio">'+disp+'</td>';
  };
  const segCells = der(inicioPeriodo,fmtInt)+der(finPeriodo,fmtInt)+der(hayNuevos?nuevosPeriodo:null, n=>(n>=0?'+':'')+fmtInt(n));
  const segHdr = ' Seguidores' +
    ((inicioPeriodo!=null||finPeriodo!=null)?' — '+(inicioPeriodo!=null?fmtInt(inicioPeriodo):'?')+' → '+(finPeriodo!=null?fmtInt(finPeriodo):'?'):'') +
    (hayNuevos?' · <span style="color:var(--green)">'+(nuevosPeriodo>=0?'+':'')+fmtInt(nuevosPeriodo)+' nuevos</span>':'');
  html += '<tr class="trk-group" data-trk-group="seguidores" style="cursor:pointer"><td style="text-align:left;font-weight:700">'+(APP.trkExpand.seguidores?'▾':'▸')+segHdr+'</td>'+segCells+'</tr>';
  if (APP.trkExpand.seguidores) {
    // Inicio editable por quincena (Q2 hala el fin de Q1); Fin editable por quincena
    html += '<tr>'+labelTd('Seguidores inicio',{indent:true})+inicioCell(1)+inicioCell(2)+der(inicioPeriodo,fmtInt)+'</tr>';
    html += '<tr>'+labelTd('Seguidores fin del período',{indent:true})+cell(1,'seguidores',fmtInt)+cell(2,'seguidores',fmtInt)+der(finPeriodo,fmtInt)+'</tr>';
    // Nuevos por quincena = fin − inicio; total = suma del período
    html += '<tr>'+labelTd('Seguidores nuevos',{indent:true})+der(nuevosW(1), n=>(n>=0?'+':'')+fmtInt(n))+der(nuevosW(2), n=>(n>=0?'+':'')+fmtInt(n))+der(hayNuevos?nuevosPeriodo:null, n=>(n>=0?'+':'')+fmtInt(n))+'</tr>';
    html += '<tr>'+labelTd('Inversión Awareness',{indent:true})+weeks.map(w=>copyCell(w,'inv_awareness',fmtMoneyInt)).join('')+der(sumW('inv_awareness'),fmtMoneyInt)+'</tr>';
    html += '<tr>'+labelTd('$ Costo/Seguidor',{indent:true})+der(cpSegW(1),fmtCost)+der(cpSegW(2),fmtCost)+der(cpSeg,fmtCost)+'</tr>';
  }

  // ── 3) Citas (header = cantidad de citas) ──
  const citasCells = weeks.map(w=>copyCell(w,'citas',fmtInt)).join('')+der(sumW('citas'),fmtInt);
  html += '<tr class="trk-group" data-trk-group="citas" style="cursor:pointer"><td style="text-align:left;font-weight:700">'+(APP.trkExpand.citas?'▾':'▸')+' Citas</td>'+citasCells+'</tr>';
  if (APP.trkExpand.citas) {
    html += rowEdit('Cantidad de citas','citas',fmtInt,true);
    html += '<tr>'+labelTd('Inversión Citas',{indent:true})+weeks.map(w=>copyCell(w,'inv_citas',fmtMoneyInt)).join('')+der(sumW('inv_citas'),fmtMoneyInt)+'</tr>';
    html += rowEdit('No show','no_show',fmtInt,true);
    html += '<tr>'+labelTd('Show',{indent:true})+weeks.map(w=>der(showW(w),fmtInt)).join('')+der(totShow,fmtInt)+'</tr>';
    // Cierres: automáticos por la fecha del cierre (no editable), para que cuadren con el pipeline
    html += '<tr>'+labelTd('Cierres',{indent:true})+der(cierresQ[1],fmtInt)+der(cierresQ[2],fmtInt)+der(cierresMesAuto,fmtInt)+'</tr>';
    html += '<tr>'+labelTd('% Cierre',{indent:true})+weeks.map(w=>der(pctW(w),fmtPctInt)).join('')+der(totShow>0?cierresMesAuto/totShow*100:null,fmtPctInt)+'</tr>';
    html += '<tr>'+labelTd('$ Costo por lead',{indent:true})+weeks.map(w=>der(cpCitaW(w),fmtCost)).join('')+der(sumW('citas')>0?sumW('inv_citas')/sumW('citas'):null,fmtCost)+'</tr>';
  }

  html += '</tbody></table></div>';
  html += '<p style="font-size:0.75rem;color:var(--muted);margin-top:8px">Las celdas en gris se calculan o se copian (no se editan). Haz clic en un número editable para cambiarlo; se guarda al salir. Q1 = días 1–15, Q2 = 16 a fin de mes. Toca cada grupo para ver el detalle.</p>';
  container.innerHTML = html;
  bindTrackerEvents();
}

function bindTrackerEvents() {
  document.querySelectorAll('.trk-month').forEach(b=>{ b.onclick=()=>{ APP.trkMonth=b.dataset.trkMonth; APP.trkEditing=null; renderTracker(); }; });
  document.querySelectorAll('.trk-group').forEach(g=>{ g.onclick=()=>{ const k=g.dataset.trkGroup; APP.trkExpand[k]=!APP.trkExpand[k]; renderTracker(); }; });
  const tog = document.getElementById('trk-webinar-toggle');
  if (tog) tog.onchange = () => trkSaveWebinar(APP.trkMonth, tog.checked);
  document.querySelectorAll('.trk-edit-cell').forEach(cell=>{
    cell.onclick = () => { APP.trkEditing = { semana: parseInt(cell.dataset.trkWeek), field: cell.dataset.trkField }; renderTracker(); const inp=document.querySelector('.trk-input'); if(inp){inp.focus();inp.select();} };
  });
  document.querySelectorAll('.trk-input').forEach(inp=>{
    inp.onblur = () => trkSaveCell(inp);
    inp.onkeydown = (e) => { if(e.key==='Enter') trkSaveCell(inp); if(e.key==='Escape'){ APP.trkEditing=null; renderTracker(); } };
  });
}

async function trkSaveCell(input) {
  const semana = parseInt(input.dataset.trkWeek);
  const field = input.dataset.trkField;
  let v = input.value === '' ? null : parseFloat(input.value);
  if (v != null && isNaN(v)) v = null;
  APP.trkEditing = null;
  const mes = APP.trkMonth;
  let r = trkRow(mes, semana);
  if (!r) { r = { anio: ANIO, mes, semana }; APP.trkData.push(r); }
  const prev = r[field];
  r[field] = v;
  renderTracker();
  // Persistir sin pisar otras columnas: UPDATE si ya existe, INSERT si es nueva.
  if (r.id) {
    const { error } = await sb.from('comercial_tracker').update({ [field]: v }).eq('id', r.id);
    if (error) { r[field] = prev; alert('No se pudo guardar el cambio.'); renderTracker(); }
  } else {
    const payload = { anio: ANIO, mes, semana }; payload[field] = v;
    const { data, error } = await sb.from('comercial_tracker').insert(payload).select();
    if (error) { r[field] = prev; alert('No se pudo guardar el cambio.'); renderTracker(); }
    else if (data && data[0]) { r.id = data[0].id; }
  }
}
async function trkSaveWebinar(mes, val) {
  APP.trkMeta[mes] = val;
  renderTracker();
  const { error } = await sb.from('comercial_tracker_meta').upsert({ anio: ANIO, mes, hubo_webinar: val }, { onConflict: 'anio,mes' });
  if (error) { APP.trkMeta[mes] = !val; alert('No se pudo guardar.'); renderTracker(); }
}

// ==================== COMISIONES ====================
var COMISION_PCT = 0.15;

// Capitalizar nombre de mes
function comCap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

// Todos los cierres (Cerrado Ganado) de gestores comerciales (resp definido y != Felix)
function comCierresGestores() {
  var out = [];
  MONTHS.forEach(function(m) {
    (APP.data.pipeline[m] || []).forEach(function(l) {
      if (l.f !== 'Cerrado Ganado') return;
      var gestor = (l.resp || '').trim();
      if (!gestor || gestor === 'Felix') return;
      // Base de implementación (Impl + FE netos, sin Servicio ni Software).
      var base = comBaseLead(l);
      // Incluir el cierre si tiene CUALQUIER monto comisionable (implementación o servicio).
      if (base <= 0 && comServBase(l) <= 0) return;
      out.push({ lead: l, gestor: gestor, mes: m, mesIdx: MONTHS.indexOf(m), base: base, comisionTotal: base * COMISION_PCT });
    });
  });
  return out;
}

// Día 5 del mes (cierreIdx + partida): cierra junio -> P1 = 5 jul, P2 = 5 ago
function comPartidaVence(mesIdx, partida) {
  var idx = mesIdx + partida;
  var anio = ANIO + Math.floor(idx / 12);
  return new Date(anio, idx % 12, 5);
}
function comFmtFecha(d) {
  return d.getDate() + ' ' + MONTHS[d.getMonth()].slice(0, 3) + ' ' + d.getFullYear();
}
function comPagoDe(leadId, partida) {
  return (APP.comisionesPagos || []).find(function(p) { return p.lead_id === leadId && p.partida === partida; });
}
function comLeadById(id) {
  for (var i = 0; i < MONTHS.length; i++) {
    var arr = APP.data.pipeline[MONTHS[i]] || [];
    for (var j = 0; j < arr.length; j++) { if (arr[j]._id === id) return arr[j]; }
  }
  return null;
}

async function loadComisionesPagos() {
  var res = await Promise.all([
    sb.from('comisiones_pagos').select('*'),
    sb.from('comisiones_servicio').select('*')
  ]);
  if (res[0].error) { console.error('Error cargando comisiones_pagos:', res[0].error); APP.comisionesPagos = []; }
  else APP.comisionesPagos = res[0].data || [];
  if (res[1].error) { console.error('Error cargando comisiones_servicio:', res[1].error); APP.comisionesServicio = []; }
  else APP.comisionesServicio = res[1].data || [];
  APP.comisionesPagosLoaded = true;
}
function comServicioDe(leadId) {
  return (APP.comisionesServicio || []).find(function(s) { return s.lead_id === leadId; });
}
// Base de servicio de un lead: 1 mes de Servicio, neto de su descuento
function comServBase(l) {
  var ds = (l.desc_serv != null ? l.desc_serv : 0) / 100;
  return (l.serv || 0) * (1 - ds);
}
// Selector del mes de arranque del servicio (para la partida 3)
function comServSelect(leadId, sel) {
  var st = 'padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:0.78rem;font-family:inherit;background:white';
  var s = '<select onchange="programarServicioComision(' + leadId + ', this.value)" style="' + st + '">';
  s += '<option value="">— mes de arranque —</option>';
  MONTHS.forEach(function(m) { s += '<option value="' + m + '"' + (sel === m ? ' selected' : '') + '>' + comCap(m) + '</option>'; });
  s += '</select>';
  return s;
}
// Programar (o cambiar) el mes en que arranca el servicio de un lead
async function programarServicioComision(leadId, mes) {
  if (!mes) { // limpiar
    await sb.from('comisiones_servicio').delete().eq('lead_id', leadId);
    APP.comisionesServicio = (APP.comisionesServicio || []).filter(function(s) { return s.lead_id !== leadId; });
    renderComisiones();
    return;
  }
  var lead = comLeadById(leadId);
  var cierreIdx = lead ? MONTHS.indexOf(comLeadMes(leadId)) : -1;
  var mesIdx = MONTHS.indexOf(mes);
  // Si el mes de servicio es anterior o igual al de cierre, es del año siguiente
  var anio = (cierreIdx >= 0 && mesIdx <= cierreIdx) ? ANIO + 1 : ANIO;
  var fila = { lead_id: leadId, mes: mes, anio: anio, marcado_por: APP.userId, updated_at: new Date().toISOString() };
  var { error } = await sb.from('comisiones_servicio').upsert(fila, { onConflict: 'lead_id' });
  if (error) { alert('No se pudo programar el servicio: ' + error.message); return; }
  var ex = comServicioDe(leadId);
  if (ex) { ex.mes = mes; ex.anio = anio; }
  else APP.comisionesServicio.push(fila);
  renderComisiones();
}
// Mes (bucket) del lead en el pipeline
function comLeadMes(leadId) {
  for (var i = 0; i < MONTHS.length; i++) {
    var arr = APP.data.pipeline[MONTHS[i]] || [];
    for (var j = 0; j < arr.length; j++) { if (arr[j]._id === leadId) return MONTHS[i]; }
  }
  return null;
}

// Base comisionable de un lead: solo Implementación + FE (netos), sin Servicio ni Software
function comBaseLead(l) {
  var di = (l.desc_impl != null ? l.desc_impl : 0) / 100;
  var df = (l.desc_fe != null ? l.desc_fe : 0) / 100;
  return (l.impl || 0) * (1 - di) + (l.fe || 0) * (1 - df);
}

async function marcarComisionPagada(leadId, partida) {
  var lead = comLeadById(leadId);
  if (!lead) return;
  // Partidas 1 y 2 = mitad de la comisión de implementación; partida 3 = comisión del servicio (1 mes)
  var monto = (partida === 3) ? (comServBase(lead) * COMISION_PCT) : (comBaseLead(lead) * COMISION_PCT / 2);
  var hoy = new Date().toISOString().split('T')[0];
  var fila = { lead_id: leadId, partida: partida, pagada: true, fecha_pago: hoy, monto: monto, gestor: (lead.resp || '').trim(), marcado_por: APP.userId, updated_at: new Date().toISOString() };
  var { error } = await sb.from('comisiones_pagos').upsert(fila, { onConflict: 'lead_id,partida' });
  if (error) { alert('No se pudo guardar el pago: ' + error.message); return; }
  var ex = comPagoDe(leadId, partida);
  if (ex) { ex.pagada = true; ex.fecha_pago = hoy; ex.monto = monto; }
  else APP.comisionesPagos.push(fila);
  renderComisiones();
}

async function quitarComisionPago(leadId, partida) {
  if (!confirm('¿Marcar esta partida como NO pagada?')) return;
  var { error } = await sb.from('comisiones_pagos').delete().eq('lead_id', leadId).eq('partida', partida);
  if (error) { alert('No se pudo deshacer: ' + error.message); return; }
  APP.comisionesPagos = (APP.comisionesPagos || []).filter(function(p) { return !(p.lead_id === leadId && p.partida === partida); });
  renderComisiones();
}

function comFilterChange(field, value) {
  if (field === 'gestor') APP.comFilterGestor = value;
  renderComisiones();
}
function comSetMonth(m) { APP.comMonth = m; renderComisiones(); }
function comToggleOcultar() { APP.comOcultarPagadas = !APP.comOcultarPagadas; renderComisiones(); }

// Construir todas las partidas (impl 1, impl 2, servicio) a partir de una lista de cierres
function comBuildPartidas(cierres, hoy) {
  var filas = [];
  cierres.forEach(function(c) {
    var cliente = c.lead.n || c.lead.e || '(sin nombre)';
    // Partidas 1 y 2 (implementación) solo si hay base de implementación
    if (c.base > 0) [1, 2].forEach(function(partida) {
      var vence = comPartidaVence(c.mesIdx, partida);
      var pago = comPagoDe(c.lead._id, partida);
      var pagada = !!(pago && pago.pagada);
      filas.push({
        leadId: c.lead._id, cliente: cliente, gestor: c.gestor, mes: c.mes, tipo: 'impl',
        base: c.base, partida: partida, label: partida + ' de 2 · Implementación',
        monto: c.comisionTotal / 2, vence: vence, programado: true,
        pagada: pagada, fechaPago: pago ? pago.fecha_pago : null,
        vencida: !pagada && vence < hoy
      });
    });
    var servBase = comServBase(c.lead);
    if (servBase > 0) {
      var sm = comServicioDe(c.lead._id);
      var venceServ = null, programado = false;
      if (sm) {
        programado = true;
        var idx = MONTHS.indexOf(sm.mes) + 1;
        venceServ = new Date(sm.anio + Math.floor(idx / 12), idx % 12, 5);
      }
      var pagoS = comPagoDe(c.lead._id, 3);
      var pagadaS = !!(pagoS && pagoS.pagada);
      filas.push({
        leadId: c.lead._id, cliente: cliente, gestor: c.gestor, mes: c.mes, tipo: 'serv',
        base: servBase, partida: 3, label: 'Servicio (1 mes)',
        monto: servBase * COMISION_PCT, vence: venceServ, programado: programado,
        mesServicio: sm ? sm.mes : '',
        pagada: pagadaS, fechaPago: pagoS ? pagoS.fecha_pago : null,
        vencida: programado && !pagadaS && venceServ < hoy
      });
    }
  });
  return filas;
}

async function renderComisiones() {
  var cont = document.getElementById('tab-comisiones');
  if (!APP.comisionesPagosLoaded) {
    cont.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Cargando comisiones…</div>';
    await loadComisionesPagos();
  }

  var isAdmin = APP.userRole === 'admin';
  var hoy = new Date(); hoy.setHours(0, 0, 0, 0);

  // Todos los cierres de gestores; lista de gestores para el filtro (admin)
  var todos = comCierresGestores();
  var gestores = [];
  todos.forEach(function(c) { if (gestores.indexOf(c.gestor) < 0) gestores.push(c.gestor); });
  gestores.sort();

  // Alcance: admin ve todos (o filtra por gestor); no-admin solo lo suyo
  var miGestor = isAdmin ? '' : chkDetectResponsable();
  var fg = isAdmin ? APP.comFilterGestor : miGestor;
  var cierres = fg ? todos.filter(function(c) { return c.gestor === fg; }) : todos;

  var filas = comBuildPartidas(cierres, hoy);

  // Agregados por mes (del año ANIO)
  var vendidoMes = {}, aCobrarMes = {}, cobradoMes = {};
  MONTHS.forEach(function(m) { vendidoMes[m] = 0; aCobrarMes[m] = 0; cobradoMes[m] = 0; });
  cierres.forEach(function(c) { vendidoMes[c.mes] += leadVendido(c.lead, false); });
  filas.forEach(function(f) {
    if (f.vence && f.vence.getFullYear() === ANIO) {
      var vm = MONTHS[f.vence.getMonth()];
      aCobrarMes[vm] += f.monto;
      if (f.pagada) cobradoMes[vm] += f.monto;
    }
  });

  // Mes seleccionado
  if (!APP.comMonth) APP.comMonth = APP.currentMonth;
  var selMes = APP.comMonth;
  var vendidoSel = vendidoMes[selMes], comGenSel = vendidoSel * COMISION_PCT;
  var selMesIdx = MONTHS.indexOf(selMes);
  var aCobrarSel = aCobrarMes[selMes];
  // Pendiente por cobrar en próximos meses = partidas sin pagar que vencen DESPUÉS del mes seleccionado
  var pendProx = filas.filter(function(f) {
    if (f.pagada || !f.vence) return false;
    if (f.vence.getFullYear() > ANIO) return true;
    return f.vence.getFullYear() === ANIO && f.vence.getMonth() > selMesIdx;
  }).reduce(function(s, f) { return s + f.monto; }, 0);

  var h = '';
  h += '<div style="margin-bottom:14px">';
  h += '<h2 style="font-size:1.05rem;margin:0 0 2px;color:var(--navy)">Comisiones' + (isAdmin ? '' : ' — ' + esc(miGestor)) + '</h2>';
  h += '<p style="margin:0;color:var(--muted);font-size:0.82rem">Comisión 15%. Implementación (Impl + FE): 2 partidas; Servicio: 1 partida. Elige un mes para ver lo vendido y lo que se cobra.</p>';
  h += '</div>';

  // Filtro de gestor (solo admin)
  if (isAdmin) {
    var selStyle = 'padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.82rem;font-family:inherit;background:white';
    h += '<div style="margin-bottom:12px"><select onchange="comFilterChange(\'gestor\', this.value)" style="' + selStyle + '"><option value="">Todos los gestores</option>';
    gestores.forEach(function(g) { h += '<option value="' + esc(g) + '"' + (fg === g ? ' selected' : '') + '>' + esc(g) + '</option>'; });
    h += '</select></div>';
  }

  // Pills de meses (cada uno muestra lo que se cobra ese mes)
  h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px">';
  MONTHS.forEach(function(m) {
    var activo = m === selMes;
    var hayAlgo = vendidoMes[m] > 0 || aCobrarMes[m] > 0;
    var bg = activo ? 'var(--navy)' : 'white';
    var col = activo ? 'white' : (hayAlgo ? 'var(--text)' : 'var(--muted)');
    var bd = activo ? 'var(--navy)' : 'var(--border)';
    h += '<button onclick="comSetMonth(\'' + m + '\')" style="border:1px solid ' + bd + ';background:' + bg + ';color:' + col + ';border-radius:10px;padding:7px 11px;cursor:pointer;font-family:inherit;text-align:center;min-width:62px">';
    h += '<div style="font-size:0.72rem;font-weight:700;text-transform:capitalize">' + m.slice(0, 3) + '</div>';
    h += '<div style="font-size:0.7rem;opacity:' + (hayAlgo ? '1' : '0.55') + ';margin-top:1px">' + (aCobrarMes[m] > 0 ? fmtCurrency(aCobrarMes[m]) : '—') + '</div>';
    h += '</button>';
  });
  h += '</div>';

  // KPI cards del mes seleccionado
  h += '<div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:8px">';
  h += '<div class="stat-card"><div class="label">Vendido en ' + comCap(selMes) + '</div><div class="value navy">' + fmtCurrency(vendidoSel) + '</div><div style="font-size:0.62rem;color:var(--muted);margin-top:2px">genera comisión (sin software)</div></div>';
  h += '<div class="stat-card"><div class="label">Comisión generada</div><div class="value blue">' + fmtCurrency(comGenSel) + '</div><div style="font-size:0.62rem;color:var(--muted);margin-top:2px">15% de lo vendido</div></div>';
  h += '<div class="stat-card"><div class="label">A cobrar en ' + comCap(selMes) + '</div><div class="value navy">' + fmtCurrency(aCobrarSel) + '</div><div style="font-size:0.62rem;color:var(--muted);margin-top:2px">vence este mes</div></div>';
  h += '<div class="stat-card"><div class="label">Pendiente próximos meses</div><div class="value ' + (pendProx > 0 ? 'amber' : 'green') + '">' + fmtCurrency(pendProx) + '</div><div style="font-size:0.62rem;color:var(--muted);margin-top:2px">vence después de ' + comCap(selMes) + '</div></div>';
  h += '</div>';

  // Desglose: lo que se cobra en el mes
  var desglose = filas.filter(function(f) { return f.vence && f.vence.getFullYear() === ANIO && MONTHS[f.vence.getMonth()] === selMes; });
  if (APP.comOcultarPagadas) desglose = desglose.filter(function(f) { return !f.pagada; });
  desglose.sort(function(a, b) { return a.vence - b.vence; });

  h += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin:22px 0 8px">';
  h += '<h3 style="font-size:0.92rem;margin:0;color:var(--navy)">A cobrar en ' + comCap(selMes) + '</h3>';
  h += '<label style="font-size:0.78rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px"><input type="checkbox"' + (APP.comOcultarPagadas ? ' checked' : '') + ' onchange="comToggleOcultar()"> Ocultar pagadas</label>';
  h += '</div>';

  if (desglose.length === 0) {
    h += '<div style="text-align:center;padding:28px;color:var(--muted);font-size:0.88rem;border:1px dashed var(--border);border-radius:10px">No hay comisiones a cobrar en ' + comCap(selMes) + '.</div>';
  } else {
    h += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.83rem">';
    h += '<thead><tr>';
    var cols = ['Cliente'];
    if (isAdmin && !fg) cols.push('Gestor');
    cols = cols.concat(['Partida', 'Monto', 'Vence', 'Estado']);
    cols.forEach(function(th) {
      var align = (th === 'Monto') ? 'right' : 'left';
      h += '<th style="text-align:' + align + ';padding:8px 10px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600">' + th + '</th>';
    });
    h += '</tr></thead><tbody>';
    desglose.forEach(function(f) {
      h += '<tr style="border-bottom:1px solid #f1f5f9">';
      h += '<td style="padding:9px 10px">' + esc(f.cliente) + '</td>';
      if (isAdmin && !fg) h += '<td style="padding:9px 10px;color:var(--muted);white-space:nowrap">' + esc(f.gestor) + '</td>';
      h += '<td style="padding:9px 10px;white-space:nowrap">' + f.label + '<span style="color:var(--muted)"> · cerró ' + comCap(f.mes) + '</span></td>';
      h += '<td style="padding:9px 10px;text-align:right;font-weight:700">' + fmtCurrency(f.monto) + '</td>';
      h += '<td style="padding:9px 10px;white-space:nowrap;color:' + (f.vencida ? 'var(--red)' : 'var(--text)') + '">' + comFmtFecha(f.vence) + '</td>';
      h += '<td style="padding:9px 10px;white-space:nowrap">';
      if (f.pagada) {
        var fp = f.fechaPago ? new Date(f.fechaPago + 'T00:00:00').toLocaleDateString('es-DO', { day: '2-digit', month: 'short' }) : '';
        h += '<span style="color:var(--green);font-weight:600;font-size:0.78rem">✓ Pagada' + (fp ? ' ' + fp : '') + '</span>';
        if (isAdmin) h += ' <button onclick="quitarComisionPago(' + f.leadId + ',' + f.partida + ')" title="Deshacer" style="border:none;background:none;color:var(--muted);cursor:pointer;font-size:0.72rem;text-decoration:underline">deshacer</button>';
      } else if (isAdmin) {
        h += '<button onclick="marcarComisionPagada(' + f.leadId + ',' + f.partida + ')" style="padding:4px 10px;border:1px solid var(--green);border-radius:6px;background:white;color:var(--green);font-size:0.76rem;font-weight:600;cursor:pointer">Marcar pagada</button>';
      } else {
        h += '<span style="color:var(--amber);font-weight:600;font-size:0.78rem">Pendiente</span>';
      }
      h += '</td></tr>';
    });
    h += '</tbody></table></div>';
  }

  // Cierres del mes (de dónde viene lo vendido)
  var cierresMes = cierres.filter(function(c) { return c.mes === selMes; });
  if (cierresMes.length) {
    h += '<h3 style="font-size:0.92rem;margin:22px 0 8px;color:var(--navy)">Cierres de ' + comCap(selMes) + '</h3>';
    h += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.83rem">';
    h += '<thead><tr>';
    var cc = ['Cliente']; if (isAdmin && !fg) cc.push('Gestor'); cc = cc.concat(['Vendido', 'Comisión total']);
    cc.forEach(function(th) {
      var align = (th === 'Vendido' || th === 'Comisión total') ? 'right' : 'left';
      h += '<th style="text-align:' + align + ';padding:8px 10px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600">' + th + '</th>';
    });
    h += '</tr></thead><tbody>';
    cierresMes.forEach(function(c) {
      var vend = leadVendido(c.lead, false);
      h += '<tr style="border-bottom:1px solid #f1f5f9">';
      h += '<td style="padding:9px 10px">' + esc(c.lead.n || c.lead.e || '(sin nombre)') + '</td>';
      if (isAdmin && !fg) h += '<td style="padding:9px 10px;color:var(--muted);white-space:nowrap">' + esc(c.gestor) + '</td>';
      h += '<td style="padding:9px 10px;text-align:right">' + fmtCurrency(vend) + '</td>';
      h += '<td style="padding:9px 10px;text-align:right;font-weight:700">' + fmtCurrency(vend * COMISION_PCT) + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // Comparativo por mes (vendido vs a cobrar)
  var mesesAct = MONTHS.filter(function(m) { return vendidoMes[m] > 0 || aCobrarMes[m] > 0; });
  if (mesesAct.length) {
    h += '<h3 style="font-size:0.92rem;margin:22px 0 8px;color:var(--navy)">Comparativo por mes</h3>';
    h += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.83rem">';
    h += '<thead><tr>';
    ['Mes', 'Vendido', 'Comisión generada', 'A cobrar', 'Cobrado'].forEach(function(th, i) {
      h += '<th style="text-align:' + (i === 0 ? 'left' : 'right') + ';padding:8px 10px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600">' + th + '</th>';
    });
    h += '</tr></thead><tbody>';
    mesesAct.forEach(function(m) {
      var sel = m === selMes;
      h += '<tr style="border-bottom:1px solid #f1f5f9;cursor:pointer;' + (sel ? 'background:#f0f6ff' : '') + '" onclick="comSetMonth(\'' + m + '\')">';
      h += '<td style="padding:9px 10px;font-weight:' + (sel ? '700' : '600') + ';color:var(--navy);text-transform:capitalize">' + m + '</td>';
      h += '<td style="padding:9px 10px;text-align:right">' + fmtCurrency(vendidoMes[m]) + '</td>';
      h += '<td style="padding:9px 10px;text-align:right;color:var(--blue)">' + fmtCurrency(vendidoMes[m] * COMISION_PCT) + '</td>';
      h += '<td style="padding:9px 10px;text-align:right;font-weight:600">' + fmtCurrency(aCobrarMes[m]) + '</td>';
      h += '<td style="padding:9px 10px;text-align:right;color:var(--green)">' + fmtCurrency(cobradoMes[m]) + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // Servicios por programar (solo admin) — cierres con servicio sin mes de arranque
  if (isAdmin) {
    var sinProg = cierres.filter(function(c) { return comServBase(c.lead) > 0 && !comServicioDe(c.lead._id); });
    if (sinProg.length) {
      h += '<h3 style="font-size:0.92rem;margin:22px 0 8px;color:var(--navy)">Servicios por programar (' + sinProg.length + ')</h3>';
      h += '<p style="margin:0 0 8px;color:var(--muted);font-size:0.78rem">Marca el mes en que arranca el servicio para que su comisión entre al calendario de cobro.</p>';
      h += '<div class="card" style="padding:0">';
      sinProg.forEach(function(c, i) {
        h += '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;' + (i ? 'border-top:1px solid #f1f5f9' : '') + '">';
        h += '<div><b>' + esc(c.lead.n || c.lead.e || '(sin nombre)') + '</b><span style="color:var(--muted);font-size:0.78rem"> · ' + esc(c.gestor) + ' · cerró ' + comCap(c.mes) + ' · comisión ' + fmtCurrency(comServBase(c.lead) * COMISION_PCT) + '</span></div>';
        h += comServSelect(c.lead._id, '');
        h += '</div>';
      });
      h += '</div>';
    }
  }

  if (todos.length === 0) {
    h += '<div style="text-align:center;padding:40px;color:var(--muted);font-size:0.9rem">Aún no hay cierres de gestores comerciales para comisionar.</div>';
  }

  cont.innerHTML = h;
}

// ==================== SEGUIMIENTO A LEADS (estilo HubSpot) ====================
// Cola de seguimiento: el equipo comercial arma su lista de leads existentes con notas,
// tareas y próxima fecha de contacto. Tablas: lead_seguimiento, lead_notas, lead_tareas.
var SEG_ITEMS = [];        // filas de lead_seguimiento
var SEG_NOTAS = {};        // { lead_id: [notas...] }
var SEG_TAREAS = {};       // { lead_id: [tareas...] }
var SEG_SCOPE = 'todos';   // todos | mios (alcance de la cola)
var SEG_ESP = '';          // pill de métrica activo: vencidos|hoy|semana|sin_fecha|frio|ganado|perdido
var SEG_PICKER = false;
var SEG_PICK_Q = '';
var SEG_OPEN = null;       // lead_id abierto en el panel
var SEG_ESTADOS = ['activo','ganado','perdido','pausado'];
var SEG_ESTADO_COLOR = { activo:'var(--blue)', ganado:'var(--green)', perdido:'var(--red)', pausado:'var(--muted)' };

function segHoy(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function segFmtFecha(f){ if(!f) return '—'; try{ return new Date(f+'T00:00:00').toLocaleDateString('es-DO',{day:'2-digit',month:'short'}); }catch(e){ return f; } }
function segEsc(s){ return esc(s==null?'':String(s)); }
function segLinkify(s){ return segEsc(s).replace(/(https?:\/\/[^\s<]+)/g,function(u){ return '<a href="'+u+'" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:underline">'+u+'</a>'; }); }
function segIsFollowing(id){ return SEG_ITEMS.some(function(x){ return Number(x.lead_id)===Number(id); }); }
function segItem(id){ return SEG_ITEMS.find(function(x){ return Number(x.lead_id)===Number(id); }); }
function segLeadInfo(id){ var d=APP.data?APP.data.pipeline:{}; for(var m in d){ var arr=d[m]||[]; for(var i=0;i<arr.length;i++){ if(Number(arr[i]._id)===Number(id)) return arr[i]; } } return null; }

async function loadSegItems(){ try{ var s=await sb.from('lead_seguimiento').select('*'); SEG_ITEMS=s.data||[]; }catch(e){ SEG_ITEMS=[]; } }
async function loadSegAllActivity(){
  SEG_NOTAS={}; SEG_TAREAS={};
  var ids=SEG_ITEMS.map(function(x){ return x.lead_id; });
  if(!ids.length) return;
  try{ var n=await sb.from('lead_notas').select('*').in('lead_id',ids).order('created_at',{ascending:false}); (n.data||[]).forEach(function(r){ (SEG_NOTAS[r.lead_id]=SEG_NOTAS[r.lead_id]||[]).push(r); }); }catch(e){}
  try{ var t=await sb.from('lead_tareas').select('*').in('lead_id',ids).order('created_at'); (t.data||[]).forEach(function(r){ (SEG_TAREAS[r.lead_id]=SEG_TAREAS[r.lead_id]||[]).push(r); }); }catch(e){}
}
async function loadSegDetail(id){
  SEG_NOTAS[id]=[]; SEG_TAREAS[id]=[];
  try{ var n=await sb.from('lead_notas').select('*').eq('lead_id',id).order('created_at',{ascending:false}); SEG_NOTAS[id]=n.data||[]; }catch(e){}
  try{ var t=await sb.from('lead_tareas').select('*').eq('lead_id',id).order('created_at'); SEG_TAREAS[id]=t.data||[]; }catch(e){}
}

async function renderSeguimiento(){
  var container=document.getElementById('tab-seguimiento');
  container.innerHTML='<div class="container" style="padding:20px;color:var(--muted)">Cargando seguimiento…</div>';
  await loadSegItems();
  await loadSegAllActivity();
  segRender();
}
// Métricas de la cola de seguimiento (el reloj es la FECHA pactada de próximo contacto).
function segPlusDays(d,n){ var x=new Date(d+'T00:00:00'); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0]; }
function segEsp(r,key,hoy){
  var s=r.s, activo=(s.estado==='activo');
  if(key==='vencidos') return activo && s.proxima_fecha && s.proxima_fecha < hoy;
  if(key==='hoy') return activo && s.proxima_fecha === hoy;
  if(key==='semana'){ if(!activo||!s.proxima_fecha) return false; return s.proxima_fecha > hoy && s.proxima_fecha <= segPlusDays(hoy,7); }
  if(key==='sin_fecha') return activo && !s.proxima_fecha;
  if(key==='frio'){ if(!activo) return false; var last=r.ultimaNota?r.ultimaNota.created_at:s.created_at; if(!last) return false; return new Date(last).getTime() < Date.now()-14*86400000; }
  if(key==='ganado') return s.estado==='ganado';
  if(key==='perdido') return s.estado==='perdido';
  return true;
}
var SEG_PILL_DEFS=[
  {key:'vencidos',label:'Vencidos',color:'var(--red)'},
  {key:'hoy',label:'Para hoy',color:'var(--amber)'},
  {key:'semana',label:'Esta semana',color:'var(--blue)'},
  {key:'sin_fecha',label:'Sin fecha',color:'#8b5cf6'},
  {key:'frio',label:'Sin contacto +14d',color:'var(--amber)'},
  {key:'ganado',label:'Ganados',color:'var(--green)'},
  {key:'perdido',label:'Perdidos',color:'var(--muted)'}
];
function segRender(){
  var container=document.getElementById('tab-seguimiento');
  var hoy=segHoy();
  var allRows=SEG_ITEMS.map(function(s){
    var L=segLeadInfo(s.lead_id);
    var tareas=SEG_TAREAS[s.lead_id]||[]; var pend=tareas.filter(function(t){ return !t.done; }).length;
    var notas=SEG_NOTAS[s.lead_id]||[];
    return { s:s, L:L, pend:pend, totalT:tareas.length, ultimaNota:(notas.length?notas[0]:null) };
  });
  var _esMio=function(r){ var me=APP.userName||''; var rp=r.s.responsable||''; return rp && me && (rp===me || me.indexOf(rp)>=0 || rp.indexOf(me)>=0); };
  var miosCount=allRows.filter(_esMio).length;
  var scoped = SEG_SCOPE==='mios' ? allRows.filter(_esMio) : allRows;
  var rows = SEG_ESP ? scoped.filter(function(r){ return segEsp(r,SEG_ESP,hoy); }) : scoped;
  rows.sort(function(a,b){
    var ac=(a.s.estado==='ganado'||a.s.estado==='perdido'), bc=(b.s.estado==='ganado'||b.s.estado==='perdido');
    if(ac!==bc) return ac?1:-1;
    var af=a.s.proxima_fecha||'9999-99', bf=b.s.proxima_fecha||'9999-99';
    return af<bf?-1:(af>bf?1:0);
  });
  var html='<div class="container">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">'+
    '<div><div style="font-weight:700;color:var(--navy);font-size:1.05rem">Seguimiento a leads</div><div style="font-size:0.8rem;color:var(--muted)">Tu cola de contacto: notas, tareas y próximo seguimiento.</div></div>'+
    '<button class="btn btn-primary" onclick="segTogglePicker()">+ Agregar lead</button></div>';
  // Alcance (Todos / Míos)
  html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
    segScopeBtn('todos','Todos',allRows.length)+segScopeBtn('mios','Míos',miosCount)+'</div>';
  // Pills de métrica (clicables, cuentan dentro del alcance)
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:10px;margin-bottom:16px">'+
    SEG_PILL_DEFS.map(function(d){ var n=scoped.filter(function(r){ return segEsp(r,d.key,hoy); }).length; return segStatPill(d,n); }).join('')+'</div>';
  if(SEG_PICKER) html+=segPickerHTML();
  if(!rows.length){
    html+='<div class="card" style="padding:24px;text-align:center;color:var(--muted)">No hay leads en tu cola'+((SEG_SCOPE==='mios'||SEG_ESP)?' con ese filtro':'')+'. Usa <b>+ Agregar lead</b> o el botón <b>Seguir</b> dentro de un lead en el Pipeline.</div>';
  } else {
    html+='<div class="card"><div class="table-wrapper"><table><thead><tr><th>Lead</th><th>Resp</th><th>Última nota</th><th>Tareas</th><th>Próximo</th><th>Estado</th><th></th></tr></thead><tbody>';
    rows.forEach(function(r){
      var L=r.L; var nombre=L?(L.n||'—'):('Lead #'+r.s.lead_id); var emp=L?(L.e||L.t||''):'';
      var venc=r.s.estado==='activo'&&r.s.proxima_fecha&&r.s.proxima_fecha<hoy;
      var hoyEs=r.s.estado==='activo'&&r.s.proxima_fecha===hoy;
      var fc=venc?'color:var(--red);font-weight:700':(hoyEs?'color:var(--amber);font-weight:700':'color:var(--muted)');
      html+='<tr style="cursor:pointer" onclick="segOpen('+r.s.lead_id+')">'+
        '<td><strong>'+segEsc(nombre)+'</strong>'+(emp?'<div style="font-size:0.74rem;color:var(--light)">'+segEsc(emp)+'</div>':'')+'</td>'+
        '<td><span style="font-size:0.74rem;font-weight:600;color:var(--muted)">'+segEsc(r.s.responsable||'—')+'</span></td>'+
        '<td style="max-width:220px;font-size:0.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(r.ultimaNota?segEsc(r.ultimaNota.texto):'—')+'</td>'+
        '<td style="font-size:0.8rem">'+(r.totalT?((r.pend?('<b style="color:var(--amber)">'+r.pend+'</b> pend / '):'')+r.totalT):'—')+'</td>'+
        '<td style="white-space:nowrap;'+fc+'">'+segFmtFecha(r.s.proxima_fecha)+(venc?' ⚠':'')+'</td>'+
        '<td><span style="font-size:0.66rem;font-weight:600;padding:2px 8px;border-radius:999px;color:#fff;background:'+(SEG_ESTADO_COLOR[r.s.estado]||'var(--muted)')+'">'+segEsc(r.s.estado)+'</span></td>'+
        '<td style="text-align:right"><button onclick="event.stopPropagation();segOpen('+r.s.lead_id+')" class="btn btn-ghost" style="padding:4px 10px;font-size:0.76rem">Abrir</button></td></tr>';
    });

  }

}
function segScopeBtn(key,label,count){ return '<button onclick="segSetScope(\''+key+'\')" class="btn '+(SEG_SCOPE===key?'btn-primary':'btn-ghost')+'" style="font-size:0.8rem">'+label+(count!=null?(' ('+count+')'):'')+'</button>'; }
function segSetScope(k){ SEG_SCOPE=k; segRender(); }
function segStatPill(d,n){

}

// Campanita del Pipeline: agendar/mover la próxima fecha de seguimiento de un lead en un clic.
function segIsScheduled(id){ var s=segItem(id); return !!(s && s.proxima_fecha); }
function segBellTitle(id){ var s=segItem(id); return (s && s.proxima_fecha) ? ('Próximo seguimiento: '+segFmtFecha(s.proxima_fecha)) : 'Agendar seguimiento'; }
function segBell(leadId, ev){
  if(ev) ev.stopPropagation();
  var s=segItem(leadId); var cur=(s && s.proxima_fecha)?s.proxima_fecha:'';
  var L=segLeadInfo(leadId); var nom=L?(L.n||'Lead'):'Lead';
  var m=document.createElement('div'); m.id='seg-bell';
  m.setAttribute('style','position:fixed;inset:0;background:rgba(30,40,60,.45);display:flex;align-items:center;justify-content:center;z-index:4000;padding:16px');
  m.onclick=function(e){ if(e.target===m) segBellClose(); };
  m.innerHTML='<div style="background:#fff;border-radius:14px;max-width:360px;width:100%;padding:20px">'+
    '<div style="font-weight:700;color:var(--navy);font-size:1rem;margin-bottom:2px">Agendar seguimiento</div>'+
    '<div style="font-size:0.82rem;color:var(--muted);margin-bottom:14px">'+segEsc(nom)+'</div>'+
    '<div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.3px;color:var(--muted);font-weight:700;margin-bottom:5px">Próxima fecha de contacto</div>'+
    '<input type="date" id="seg-bell-date" value="'+cur+'" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.9rem;box-sizing:border-box">'+
    '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px"><button class="btn btn-ghost" onclick="segBellClose()">Cancelar</button><button class="btn btn-primary" onclick="segBellSave('+leadId+')">Guardar</button></div></div>';
  document.body.appendChild(m);
  setTimeout(function(){ var d=document.getElementById('seg-bell-date'); if(d) d.focus(); },40);

function segBellClose(){ var m=document.getElementById('seg-bell'); if(m) m.remove(); }
async function segBellSave(leadId){
  var d=document.getElementById('seg-bell-date'); var fecha=(d&&d.value)?d.value:null;
  var existing=segItem(leadId);
  try{
    if(existing){ await sb.from('lead_seguimiento').update({ proxima_fecha:fecha, updated_at:new Date().toISOString() }).eq('lead_id',leadId); }
    else { var L=segLeadInfo(leadId); var resp=(L&&L.resp)?L.resp:APP.userName; var r=await sb.from('lead_seguimiento').insert({ lead_id:leadId, responsable:resp, estado:'activo', proxima_fecha:fecha }); if(r.error){ alert('Error: '+r.error.message); return; } }
  }catch(e){ alert('No se pudo guardar la fecha.'); return; }
  segBellClose();
  await loadSegItems();
  renderPipeline();
  if(APP.activeTab==='seguimiento'){ await loadSegAllActivity(); segRender(); }
}
function segTogglePicker(){ SEG_PICKER=!SEG_PICKER; SEG_PICK_Q=''; segRender(); if(SEG_PICKER){ var el=document.getElementById('seg-pick-inp'); if(el) el.focus(); } }
function segPickerListHTML(){

function segPickerHTML(){ return '<div class="card" style="margin-bottom:14px;padding:12px"><input id="seg-pick-inp" placeholder="Buscar lead por nombre o empresa…" value="'+segEsc(SEG_PICK_Q)+'" oninput="SEG_PICK_Q=this.value;segRenderPicker()" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.85rem;box-sizing:border-box"><div id="seg-pick-list" style="margin-top:6px;max-height:240px;overflow:auto">'+segPickerListHTML()+'</div></div>'; }

async function segAddFollow(id){

    '<div style="font-size:0.8rem;color:var(--muted);margin-bottom:16px">Cotizado: <b style="color:var(--navy)">'+fmtCurrency(cotizado)+'</b>'+(L&&L.resp?(' · Resp: <b>'+segEsc(L.resp)+'</b>'):'')+'</div>';
  var estOpts=SEG_ESTADOS.map(function(e){ return '<option value="'+e+'"'+(s.estado===e?' selected':'')+'>'+e+'</option>'; }).join('');
  var meta='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">'+
    '<div>'+lbl('Próximo seguimiento')+'<input type="date" id="seg-prox-fecha" value="'+(s.proxima_fecha||'')+'" onchange="segSaveMeta()" style="'+inp+'"></div>'+

      '<button onclick="segDelTarea('+t.id+')" style="border:none;background:none;color:var(--light);cursor:pointer;font-size:1.1rem;line-height:1">&times;</button></div>';
  }).join(''):'<div style="font-size:0.8rem;color:var(--light)">Sin tareas.</div>';
  var tareasBox='<div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:16px">'+lbl('Tareas')+'<div id="seg-tareas">'+tareasList+'</div>'+
    '<div style="display:flex;gap:6px;margin-top:8px"><input id="seg-tarea-txt" placeholder="Nueva tarea…" onkeydown="if(event.key===\'Enter\')segAddTarea()" style="'+inp+';flex:1"><input type="date" id="seg-tarea-fecha" style="'+inp+'"><button class="btn btn-primary" onclick="segAddTarea()" style="padding:6px 12px">+</button></div></div>';
  var notasList=notas.length?notas.map(function(nt){ var f=nt.created_at?new Date(nt.created_at).toLocaleDateString('es-DO',{day:'2-digit',month:'short'}):''; return '<div style="background:#f6f8fa;border-radius:8px;padding:9px 11px;margin-bottom:7px"><div style="display:flex;justify-content:space-between"><span style="font-size:0.68rem;font-weight:700;color:var(--navy)">'+segEsc(nt.autor||'—')+'</span><span style="font-size:0.64rem;color:var(--light)">'+f+'</span></div><div style="font-size:0.85rem;color:var(--navy);white-space:pre-wrap">'+segLinkify(nt.texto)+'</div></div>'; }).join(''):'<div style="font-size:0.8rem;color:var(--light)">Sin notas todavía.</div>';
  var notasBox='<div style="border-top:1px solid var(--border);padding-top:14px">'+lbl('Notas / seguimiento')+'<div id="seg-notas">'+notasList+'</div>'+
    '<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px"><textarea id="seg-nota-txt" rows="2" placeholder="Escribe la última nota o seguimiento…" style="'+inp+';resize:vertical"></textarea><button class="btn btn-primary" onclick="segAddNota()" style="align-self:flex-end;padding:6px 14px">Agregar nota</button></div></div>';
  var m=document.createElement('div'); m.id='seg-modal';
  m.setAttribute('style','position:fixed;inset:0;background:rgba(30,40,60,.45);display:flex;align-items:center;justify-content:center;z-index:3000;padding:16px');
  m.onclick=function(ev){ if(ev.target===m) segClose(); };
  m.innerHTML='<div style="background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:92vh;overflow:auto;padding:22px">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div style="font-weight:800;color:var(--navy);font-size:1.25rem">'+segEsc(nombre)+'</div>'+(emp?'<div style="font-size:0.85rem;color:var(--muted)">'+segEsc(emp)+'</div>':'')+'</div>'+
    '<button onclick="segClose()" style="border:none;background:none;font-size:1.5rem;color:var(--light);cursor:pointer;line-height:1">&times;</button></div>'+

  document.body.appendChild(m);

async function segSaveMeta(){
  var id=SEG_OPEN; if(id==null) return;
  var fecha=document.getElementById('seg-prox-fecha').value||null;
  var estado=document.getElementById('seg-estado').value;
  try{ await sb.from('lead_seguimiento').update({ proxima_fecha:fecha, estado:estado, updated_at:new Date().toISOString() }).eq('lead_id',id); }catch(e){}
  var s=segItem(id); if(s){ s.proxima_fecha=fecha; s.estado=estado; }
}
async function segAddTarea(){
  var id=SEG_OPEN; var el=document.getElementById('seg-tarea-txt'); var tx=(el.value||'').trim(); if(!tx) return;
  var fecha=document.getElementById('seg-tarea-fecha').value||null;
  try{ var r=await sb.from('lead_tareas').insert({ lead_id:id, texto:tx, fecha_limite:fecha, autor:APP.userName }); if(r.error){ alert('Error: '+r.error.message); return; } }catch(e){ alert('No se pudo.'); return; }
  await loadSegDetail(id); segRenderModal();
}
async function segToggleTarea(tid,done){ try{ await sb.from('lead_tareas').update({ done:done }).eq('id',tid); }catch(e){} await loadSegDetail(SEG_OPEN); segRenderModal(); }
async function segDelTarea(tid){ try{ await sb.from('lead_tareas').delete().eq('id',tid); }catch(e){} await loadSegDetail(SEG_OPEN); segRenderModal(); }
async function segAddNota(){
  var id=SEG_OPEN; var el=document.getElementById('seg-nota-txt'); var tx=(el.value||'').trim(); if(!tx) return;
  try{ var r=await sb.from('lead_notas').insert({ lead_id:id, texto:tx, autor:APP.userName }); if(r.error){ alert('Error: '+r.error.message); return; } }catch(e){ alert('No se pudo.'); return; }
  await loadSegDetail(id); segRenderModal();
}
async function segRemove(id){
  if(!confirm('¿Quitar este lead de tu cola de seguimiento? (sus notas y tareas quedan guardadas por si lo retomas)')) return;
  try{ await sb.from('lead_seguimiento').delete().eq('lead_id',id); }catch(e){}
  var m=document.getElementById('seg-modal'); if(m) m.remove(); SEG_OPEN=null;
  await loadSegItems(); await loadSegAllActivity(); segRender();
}

function renderApp() {
  if (APP.activeTab === 'pipeline') {
    renderPipeline();
  } else if (APP.activeTab === 'movimiento') {
    renderMovimiento();
  } else if (APP.activeTab === 'checklist-com') {
    renderChecklistComercial();
  } else if (APP.activeTab === 'tracker') {
    renderTracker();
  } else if (APP.activeTab === 'comisiones') {
    renderComisiones();
  } else if (APP.activeTab === 'seguimiento') {
    renderSeguimiento();
  } else {
    renderROAS();
  }
}

// ==================== AUTH ====================

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  if (!email || !password) {
    errorEl.textContent = 'Ingresa email y contraseña.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errorEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = 'Email o contraseña incorrectos.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  await loadUserProfile();
  await loadMisPermisos();
  showApp();
}

async function handleLogout() {
  await sb.auth.signOut();
  APP.userRole = null;
  APP.userName = '';
  document.getElementById('app-wrapper').classList.add('hidden');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

async function loadUserProfile() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  const { data: profile } = await sb.from('profiles')
    .select('nombre, rol')
    .eq('id', user.id)
    .single();

  APP.userId = user.id;
  if (profile) {
    APP.userRole = profile.rol;
    APP.userName = profile.nombre || user.email;
  } else {
    // Si no tiene perfil, acceso básico
    APP.userRole = 'comercial';
    APP.userName = user.email;
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrapper').classList.remove('hidden');
  document.getElementById('user-display-name').textContent = APP.userName;

  startApp();
}

async function startApp() {
  var [data] = await Promise.all([loadData(), loadChecklistComercial(), loadTracker(), loadSegItems()]);
  APP.data = data;
  MONTHS.forEach(m => {
    if (!APP.data.pipeline[m]) APP.data.pipeline[m] = [];
    if (!APP.data.roas[m]) APP.data.roas[m] = { leads:0, presupuesto:0, ejecutado:0, cierres:0, vendido:0, cotizado:0, cpa:0, retorno:0, roas:0 };
  });
  ['mayo','junio','julio','agosto'].forEach(m => {
    if (APP.data.roas[m].leads === 0 && APP.data.roas[m].presupuesto === 0) {
      APP.data.roas[m].presupuesto = 2000;
    }
  });
  ['septiembre','octubre','noviembre','diciembre'].forEach(m => {
    if (APP.data.roas[m].leads === 0 && APP.data.roas[m].presupuesto === 0) {
      APP.data.roas[m].presupuesto = 3000;
    }
  });
  syncRoasFromPipeline();
  renderMainTabs();
  renderApp();
  segHandleHash();
}

// Deep-link desde el inicio del cerrador: #seg → pestaña Seguimiento; #seglead=ID → abre ese lead.
async function segHandleHash(){
  var hsh=(location.hash||'').replace('#','');
  if(hsh==='seg'){ APP.activeTab='seguimiento'; renderMainTabs(); renderApp(); return; }
  if(hsh.indexOf('seglead=')===0){
    var id=parseInt(hsh.split('=')[1],10);
    APP.activeTab='seguimiento'; renderMainTabs();
    await loadSegItems(); await loadSegAllActivity(); segRender();
    if(!isNaN(id)) segOpen(id);
  }
}
window.addEventListener('hashchange', segHandleHash);

// Allow login with Enter key
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

// Embed mode detection
const isEmbed = new URLSearchParams(window.location.search).get('embed') === '1';
if (isEmbed) document.body.classList.add('embed');

// Check if already logged in
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadUserProfile();
    await loadMisPermisos();
    showApp();
  } else if (isEmbed) {
    // In embed mode without session, show nothing (parent handles auth)
    document.body.innerHTML = '<div style="text-align:center;padding:60px;color:#7c8495;">Sesión no encontrada. Recarga la página principal.</div>';
  }
}

init();
</script>
