<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline de Ventas - Account One</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ==================== DESIGN SYSTEM ==================== */
:root {
  --navy: #1e3a5f;
  --blue: #3b82f6;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --bg: #f8fafc;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --muted: #6b7280;
  --light: #9ca3af;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

/* ==================== LAYOUT ==================== */
.header {
  background: linear-gradient(135deg, #1e3a5f, #2d4a7a);
  color: white;
  padding: 24px;
}
.header h1 { font-size: 1.5rem; font-weight: 700; }
.header p { opacity: 0.8; font-size: 0.9rem; margin-top: 4px; }

.breadcrumb-bar { display:flex; align-items:center; gap:6px; padding:10px 24px; background:white; border-bottom:1px solid var(--border); font-size:13px; }
.breadcrumb-bar a { color:var(--muted); text-decoration:none; font-weight:500; }
.breadcrumb-bar a:hover { color:var(--navy); text-decoration:underline; }
.breadcrumb-bar .sep { color:var(--light); font-size:11px; }
.breadcrumb-bar .current { color:var(--text); font-weight:600; }

.main-tabs {
  display: flex;
  background: var(--card);
  border-bottom: 2px solid var(--border);
}
.main-tab {
  padding: 12px 24px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--muted);
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  background: none;
  border-top: none; border-left: none; border-right: none;
}
.main-tab:hover { color: var(--text); }
.main-tab.active { color: var(--navy); border-bottom-color: var(--navy); }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}

/* ==================== MONTH TABS ==================== */
.month-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.month-tab {
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.2s;
}
.month-tab:hover { border-color: var(--blue); color: var(--blue); }
.month-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

/* ==================== SUMMARY STATS ==================== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.stats-grid-pipeline {
  grid-template-columns: repeat(5, 1fr);
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 6px;
  text-align: center;
}
.stat-card .label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.stat-card .value { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
.stat-card .value.green { color: var(--green); }
.stat-card .value.amber { color: var(--amber); }
.stat-card .value.red { color: var(--red); }
.stat-card .value.blue { color: var(--blue); }
.stat-card .value.navy { color: var(--navy); }

/* ==================== FUNNEL ==================== */
.funnel-bar {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 10px;
}
.funnel-label {
  width: 160px;
  text-align: right;
  font-size: 0.8rem;
  color: var(--muted);
  flex-shrink: 0;
}
.funnel-track { flex: 1; background: #f1f5f9; border-radius: 6px; height: 28px; position: relative; }
.funnel-fill {
  height: 100%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  font-size: 0.8rem;
  font-weight: 600;
  color: white;
  min-width: 30px;
  transition: width 0.4s ease;
}
.funnel-count { margin-left: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text); }

/* ==================== FILTER BAR ==================== */
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar label { font-size: 0.8rem; color: var(--muted); font-weight: 500; }
.filter-bar select {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.85rem;
  background: var(--card);
  color: var(--text);
  cursor: pointer;
}

/* ==================== BADGES ==================== */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
  white-space: nowrap;
}
.badge-caliente { background: #fee2e2; color: #991b1b; }
.badge-tibio { background: #fef3c7; color: #92400e; }
.badge-frio { background: #dbeafe; color: #1e40af; }
.badge-esperando-demo { background: #e0e7ff; color: #3730a3; }
.badge-esperando-cotizacion { background: #fef3c7; color: #92400e; }
.badge-cotizacion-enviada { background: #dbeafe; color: #1e40af; }
.badge-seguimiento { background: #ede9fe; color: #5b21b6; }
.badge-cerrado-ganado { background: #d1fae5; color: #065f46; }
.badge-cerrado-perdido { background: #fee2e2; color: #991b1b; }
.badge-no-show { background: #f3f4f6; color: #6b7280; }
.badge-no-aplica { background: #f3f4f6; color: #6b7280; }

/* ==================== TABLE ==================== */
.table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th {
  text-align: left;
  padding: 10px 8px;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:hover { background: #f8fafc; }
tr.expanded { background: #f0f9ff; }

/* ==================== EDIT FORM ==================== */
.edit-row td { padding: 16px 8px; background: #f0f9ff; }
.edit-form {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.edit-form .field label {
  display: block;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 500;
}
.edit-form .field input,
.edit-form .field select,
.edit-form .field textarea {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
  font-family: inherit;
}
.edit-form .field textarea { resize: vertical; min-height: 60px; }
.edit-actions { display: flex; gap: 8px; margin-top: 12px; }

/* ==================== BUTTONS ==================== */
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.btn-primary { background: var(--navy); color: white; }
.btn-primary:hover { background: #2d4a7a; }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: #f1f5f9; }
.btn-add {
  display: block;
  width: 100%;
  padding: 12px;
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-add:hover { border-color: var(--blue); color: var(--blue); }

/* ==================== ROAS ==================== */
.roas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.chart-card h3 { font-size: 0.9rem; color: var(--text); margin-bottom: 12px; }

.roas-table-wrapper { overflow-x: auto; }
.roas-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.roas-table th { text-align: right; padding: 8px; font-size: 0.75rem; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--border); }
.roas-table th:first-child { text-align: left; }
.roas-table td { text-align: right; padding: 8px; border-bottom: 1px solid var(--border); }
.roas-table td:first-child { text-align: left; font-weight: 600; }
.roas-table tr:hover { background: #f8fafc; }
/* Celdas editables: fondo y borde tenue para que se vea que se pueden llenar */
.roas-table .editable { cursor: pointer; background: #eff5ff; box-shadow: inset 0 0 0 1px #cfe0ff; border-radius: 4px; }
.roas-table .editable:hover { background: #dde9ff; box-shadow: inset 0 0 0 1px var(--blue); }
.roas-table input.inline-edit {
  width: 80px;
  padding: 2px 6px;
  border: 1px solid var(--blue);
  border-radius: 4px;
  font-size: 0.85rem;
  text-align: right;
  font-family: inherit;
}
.cat-checks { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
.cat-checks label { display:flex; align-items:center; gap:4px; font-size:0.8rem; cursor:pointer; padding:3px 8px; border:1px solid var(--border); border-radius:6px; transition:all 0.15s; }
.cat-checks label:hover { border-color:var(--blue); }
.cat-checks input[type="checkbox"] { margin:0; }
.cat-checks input[type="checkbox"]:checked + span { color:var(--blue); font-weight:600; }
.cat-badge { display:inline-block; background:#f0f4ff; color:#4361ee; font-size:10px; padding:2px 6px; border-radius:4px; margin:1px 2px; }

.roas-save-btn {
  padding: 3px 10px;
  font-size: 0.72rem;
  font-weight: 600;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  background: var(--blue);
  color: white;
  transition: background 0.15s;
}
.roas-save-btn:hover { background: #3451c7; }
.roas-save-btn.saved { background: var(--green); pointer-events: none; }

/* ==================== CHECKLIST COMERCIAL ==================== */
.chk-summary-stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.chk-summary-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 8px;
  text-align: center;
}
.chk-summary-stat .label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.chk-summary-stat .value { font-size: 1.2rem; font-weight: 700; margin-top: 2px; }

.chk-view-toggle-row { display:flex; justify-content:flex-start; margin-bottom:12px; }
.chk-view-toggle { display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:white; }
.chk-view-toggle-btn { padding:5px 12px; font-size:0.75rem; font-weight:600; cursor:pointer; border:none; background:white; color:var(--muted); font-family:inherit; transition:all 0.12s; display:flex; align-items:center; gap:5px; }
.chk-view-toggle-btn:not(:last-child) { border-right:1px solid var(--border); }
.chk-view-toggle-btn:hover { background:#f3f4f6; color:var(--text); }
.chk-view-toggle-btn.active { background:var(--navy); color:white; }
.chk-view-toggle-btn svg { width:14px; height:14px; }

.chk-client-table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; border:1px solid var(--border); margin-bottom:20px; }
.chk-client-table th { background:#f8f9fb; padding:10px 14px; text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); font-weight:700; border-bottom:1px solid var(--border); }
.chk-client-table td { padding:10px 14px; font-size:0.82rem; border-bottom:1px solid #f0f2f5; }
.chk-client-table tr:hover td { background:#fafbfc; cursor:pointer; }
.chk-client-table tr:last-child td { border-bottom:none; }

.chk-client-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.chk-client-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.chk-client-card:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(59,130,246,0.08); }
.chk-client-card .name { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; }
.chk-client-card .sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
.chk-client-card .bar-wrap { display: flex; align-items: center; gap: 8px; }
.chk-client-card .bar { flex: 1; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
.chk-client-card .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.chk-client-card .pct { font-size: 0.8rem; font-weight: 700; min-width: 36px; text-align: right; }
.chk-client-card .count { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

.chk-detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.chk-detail-back {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.85rem;
  cursor: pointer;
  color: var(--muted);
}
.chk-detail-back:hover { background: #f1f5f9; }
.chk-detail-title { font-size: 1.1rem; font-weight: 700; }
.chk-detail-sub { font-size: 0.8rem; color: var(--muted); }

.chk-progress-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding: 12px 16px;
  background: #f8fafc;
  border-radius: 8px;
}
.chk-progress-row .pr-bar { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.chk-progress-row .pr-fill { height: 100%; border-radius: 4px; }
.chk-progress-row .pr-pct { font-size: 0.95rem; font-weight: 700; }
.chk-progress-row .pr-count { font-size: 0.82rem; color: var(--muted); }

.chk-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.chk-table th {
  text-align: left;
  padding: 8px;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--muted);
  border-bottom: 2px solid var(--border);
}
.chk-table th.center { text-align: center; }
.chk-table td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.chk-table td.center { text-align: center; }
.chk-table tr:hover { background: #fafbfc; }
.chk-table .group-row td {
  background: #f1f5f9;
  font-weight: 700;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--navy);
  padding: 6px 8px;
}
.chk-table .row-done td { opacity: 0.5; }

.chk-toggle-group { display: inline-flex; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.chk-toggle-opt {
  padding: 4px 10px;
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: white;
  color: var(--muted);
  transition: all 0.15s;
}
.chk-toggle-opt.active-yes { background: var(--green); color: white; }
.chk-toggle-opt.active-no { background: var(--red); color: white; }

.chk-persona-pills {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.chk-persona-pill {
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.2s;
}
.chk-persona-pill:hover { border-color: var(--blue); color: var(--blue); }
.chk-persona-pill.active { background: var(--navy); color: white; border-color: var(--navy); }

.chk-save-bar {
  display: flex;
  justify-content: flex-end;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ==================== MISC ==================== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.footer {
  text-align: center;
  padding: 20px;
  font-size: 0.8rem;
  color: var(--muted);
}
.hidden { display: none; }
.currency { font-variant-numeric: tabular-nums; }

/* Embed mode: hide login, header, breadcrumb */
body.embed .login-overlay { display: none !important; }
body.embed .header { display: none !important; }
body.embed .breadcrumb-bar { display: none !important; }
body.embed #app-wrapper { display: block !important; }
body.embed .footer { display: none !important; }

/* ==================== LOGIN SCREEN ==================== */
.login-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #1e3a5f 0%, #2d4a7a 50%, #1e3a5f 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.login-box {
  background: white;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-box h2 {
  font-size: 1.4rem;
  color: var(--navy);
  margin-bottom: 4px;
}
.login-box .subtitle {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 24px;
}
.login-box .field {
  margin-bottom: 16px;
}
.login-box .field label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.login-box .field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: inherit;
  transition: border-color 0.2s;
}
.login-box .field input:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}
.login-btn:hover { background: #2d4a7a; }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error {
  color: var(--red);
  font-size: 0.8rem;
  margin-top: 12px;
  display: none;
}

/* ==================== USER BAR ==================== */
.user-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
}
.user-bar .user-name {
  font-size: 0.8rem;
  opacity: 0.9;
  background: rgba(255,255,255,0.15);
  padding: 4px 12px;
  border-radius: 20px;
}
.user-bar .user-role {
  font-size: 0.7rem;
  opacity: 0.7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.btn-logout {
  font-size: 0.75rem;
  padding: 4px 12px;
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-logout:hover { background: rgba(255,255,255,0.25); }
</style>

<!-- Account One Refinado theme layer (override) -->
<link rel="stylesheet" href="assets/theme.css">
<script src="assets/theme.js" defer></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-overlay" id="login-screen">
  <div class="login-box">
    <h2>Account One</h2>
    <p class="subtitle">Inicia sesión para continuar</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@accountone.do">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="btn-login" onclick="handleLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-wrapper" class="hidden">

<div class="header">

function parseCats(str) { return (str || '').split(',').map(s => { var t = s.trim(); return CAT_NORMALIZE[t] || CAT_NORMALIZE[t.toLowerCase()] || t; }).filter(Boolean); }
function renderCatBadges(str) {

function renderCatChecks(selected) {

// ==================== UTILS ====================
function fmt(n) { return n != null ? n.toLocaleString('es-DO') : '0'; }
function fmtCurrency(n) { return 'US$ ' + fmt(n); }
function fmtPct(n) { return (n || 0).toFixed(1) + '%'; }

function badgeClass(step) {

    .replace(/\u00f3/g,'o').replace(/\u00ed/g,'i')
    .replace(/ /g,'-');
}

function tempBadgeClass(temp) {

}

function leadTotal(lead) {
  return (lead.impl || 0) + (lead.fe || 0) + (lead.serv || 0) + (lead.soft || 0);
}

function leadVendido(lead, includeSoft) {
  // Vendido = cada servicio × (1 - su descuento individual)
  var di = (lead.desc_impl != null ? lead.desc_impl : 0) / 100;
  var df = (lead.desc_fe != null ? lead.desc_fe : 0) / 100;
  var ds = (lead.desc_serv != null ? lead.desc_serv : 0) / 100;
  var dw = (lead.desc_soft != null ? lead.desc_soft : 0) / 100;
  var total = (lead.impl || 0) * (1 - di) + (lead.fe || 0) * (1 - df) + (lead.serv || 0) * (1 - ds);
  if (includeSoft) total += (lead.soft || 0) * (1 - dw);
  return total;
}

async function dbUpdateLead(lead) {
  if (!lead._id) return;
  var prevFunnel = lead._prevFunnel || '';
  await sb.from('leads').update({
    nombre: lead.n, tipo: lead.t || '', empresa: lead.e || '',
    temperatura: lead.temp || 'Tibio', demo: lead.demo || null,
    funnel: lead.f, impl: lead.impl || 0, fe: lead.fe || 0,
    serv: lead.serv || 0, soft: lead.soft || 0,
    desc_impl: lead.desc_impl || 0, desc_fe: lead.desc_fe || 0,
    desc_serv: lead.desc_serv || 0, desc_soft: lead.desc_soft || 0,
    rnc: lead.rnc || '',
    notas: lead.notas || '',
    categoria: lead.categoria || '',
    responsable: lead.resp || null
  }).eq('id', lead._id);
  // Sincronizar responsable con checklist asociado
  if (lead.resp) {
    var chk = APP.chkData.find(r => r.lead_id === lead._id);
    if (chk && chk.responsable !== lead.resp) {
      await sb.from('checklist_comercial').update({ responsable: lead.resp }).eq('id', chk.id);
      chk.responsable = lead.resp;
    }
  }
  // Puente comercial → Base de Datos: crear pendiente si se cierra como Ganado
  if (lead.f === 'Cerrado Ganado' && prevFunnel !== 'Cerrado Ganado') {
    await dbCreatePendienteFromLead(lead);
    await dbCreateChecklistFromLead(lead);
    await dbCreateImplFEFromLead(lead);
  }
  delete lead._prevFunnel;
}

async function dbCreatePendienteFromLead(lead) {
  var cats = (lead.categoria || '').split(',').map(s => s.trim()).filter(Boolean);
  var hasAdm = cats.indexOf('Adm') >= 0;
  var hasRecurrente = cats.indexOf('Servicios Recurrentes') >= 0;
  // Si solo tiene FE sin Adm ni Recurrente, no crear pendiente (servicio puntual)
  if (!hasAdm && !hasRecurrente) return;

  var vendido = (lead.impl || 0) + (lead.fe || 0) + (lead.serv || 0) + (lead.soft || 0);
  var destinos = [];
  // Solo va a software si tiene Adm PERO NO tiene Servicios Recurrentes
  // (recurrentes usan Adm como herramienta incluida, no como producto aparte)
  if (hasAdm && !hasRecurrente) destinos.push('software');
  if (hasRecurrente) destinos.push('recurrente');

  for (var i = 0; i < destinos.length; i++) {
    // Verificar que no exista ya un pendiente para este lead+destino
    var { data: existing } = await sb.from('clientes_pendientes')
      .select('id').eq('lead_nombre', lead.n || lead.e || '').eq('destino', destinos[i]).eq('estado', 'pendiente');
    if (existing && existing.length > 0) continue;

    await sb.from('clientes_pendientes').insert({
      lead_nombre: lead.n || '',
      lead_empresa: lead.e || '',
      categorias: lead.categoria || '',
      destino: destinos[i],
      monto_vendido: vendido > 0 ? vendido : null,
      mes_cierre: APP.currentMonth,
      anio_cierre: ANIO,
      estado: 'pendiente'
    });
  }
}

// Crear checklist comercial al cerrar lead como ganado

  var responsable = lead.resp || chkDetectResponsable();

// Crear checklist FE en implementaciones si el lead tiene Facturación Electrónica

async function dbUpdateRoas(mes, r) {
  const payload = {
    mes: mes, anio: ANIO,
    leads: r.leads, presupuesto: r.presupuesto,
    ejecutado: r.ejecutado, cierres: r.cierres,

  };
  if (r._id) {

    if (data && data.id) r._id = data.id;
    if (error) console.error('Error insertando ROAS:', error);
  }
}

function syncRoasFromPipeline() {
  MONTHS.forEach((m, idx) => {
    const leads = APP.data.pipeline[m] || [];
    if (!APP.data.roas[m]) return;
    const ganados = leads.filter(l => l.f === 'Cerrado Ganado');
    const includeSoft = idx >= 2; // marzo en adelante
    const totalVendido = ganados.reduce((s, l) => s + leadVendido(l, includeSoft), 0);
    const totalCotizado = leads.reduce((s, l) => s + leadTotal(l), 0);
    APP.data.roas[m].leads = leads.length;
    APP.data.roas[m].cierres = ganados.length;
    APP.data.roas[m].vendido = Math.round(totalVendido * 100) / 100;
    APP.data.roas[m].cotizado = Math.round(totalCotizado * 100) / 100;
    // Recalcular derivados
    const ejec = APP.data.roas[m].ejecutado || 0;
    APP.data.roas[m].cpa = ganados.length > 0 ? Math.round(ejec / ganados.length * 100) / 100 : 0;
    APP.data.roas[m].retorno = Math.round((totalVendido - ejec) * 100) / 100;
    APP.data.roas[m].roas = ejec > 0 ? Math.round(totalVendido / ejec * 100) / 100 : 0;
  });
  // Guardar ROAS actualizados en Supabase (en background)
  MONTHS.forEach(m => {
    const r = APP.data.roas[m];
    if (r && (r._id || r.leads > 0)) dbUpdateRoas(m, r);
  });
}

var misPermisos = {};

async function loadMisPermisos() {
  misPermisos = {};
  var sessionData = await sb.auth.getUser();
  var user = sessionData.data ? sessionData.data.user : null;
  if (!user) return;
  var res1 = await sb.from('usuario_grupos').select('grupo_id').eq('user_id', user.id);
  if (!res1.data || res1.data.length === 0) return;
  var grupoIds = res1.data.map(function(a) { return a.grupo_id; });
  var res2 = await sb.from('grupos').select('permisos').in('id', grupoIds);
  if (!res2.data) return;
  function mergeInto(target, source) {
    if (!source || typeof source !== 'object') return;
    Object.keys(source).forEach(function(k) {
      if (typeof source[k] === 'boolean') { if (source[k] === true) target[k] = true; else if (target[k] === undefined) target[k] = false; }
      else if (typeof source[k] === 'object') { if (!target[k]) target[k] = {}; mergeInto(target[k], source[k]); }
    });
  }
  res2.data.forEach(function(g) { mergeInto(misPermisos, g.permisos || {}); });
}

function tengoPermiso(modId, scrId, habId, subtabId) {
  if (APP.userRole === 'admin') return true;
  var mod = misPermisos[modId];
  if (!mod) return false;
  var scr = mod[scrId];
  if (!scr) return false;
  if (subtabId) { var st = scr[subtabId]; return st && st[habId] === true; }
  return scr[habId] === true;
}

function renderPipeline() {
  const container = document.getElementById('tab-pipeline');
  const leads = APP.data.pipeline[APP.currentMonth] || [];

  // Apply filters
  let filtered = leads.slice();
  if (APP.searchText) {
    const q = APP.searchText.toLowerCase();
    filtered = filtered.filter(l => (l.n||'').toLowerCase().includes(q) || (l.e||'').toLowerCase().includes(q) || (l.t||'').toLowerCase().includes(q));
  }
  if (APP.filterTemp !== 'Todos') {
    filtered = filtered.filter(l => l.temp === APP.filterTemp);
  }
  if (APP.filterStep !== 'Todos') {
    filtered = filtered.filter(l => l.f === APP.filterStep);
  }

  // Sort: Ganado primero, luego por temperatura (Caliente > Tibio > Frio)
  const SORT_ORDER = { 'Cerrado Ganado': 0 };
  const TEMP_ORDER = { 'Caliente': 1, 'Tibio': 2, 'Frio': 3 };
  filtered.sort((a, b) => {
    const aGroup = SORT_ORDER[a.f] != null ? 0 : 1;
    const bGroup = SORT_ORDER[b.f] != null ? 0 : 1;
    if (aGroup !== bGroup) return aGroup - bGroup;
    return (TEMP_ORDER[a.temp] || 4) - (TEMP_ORDER[b.temp] || 4);
  });

  // Stats
  const totalLeads = leads.length;
  const totalCotizado = leads.reduce((s, l) => s + leadTotal(l), 0);
  const ganados = leads.filter(l => l.f === 'Cerrado Ganado');
  const cierres = ganados.length;
  const pctCierre = totalLeads > 0 ? (cierres / totalLeads * 100) : 0;
  const includeSoft = MONTHS.indexOf(APP.currentMonth) >= 2; // marzo en adelante suma software
  const totalVendido = ganados.reduce((s, l) => s + leadVendido(l, includeSoft), 0);
  const roasMonth = APP.data.roas[APP.currentMonth] || {};
  const invertido = roasMonth.ejecutado || 0;
  const ganancia = totalVendido - invertido;
  const roasVal = invertido > 0 ? totalVendido / invertido : 0;
  const cpl = totalLeads > 0 ? invertido / totalLeads : 0;
  const cpa = cierres > 0 ? invertido / cierres : 0;

  // Funnel counts (from all leads, not filtered)
  const funnelCounts = {};
  FUNNEL_STEPS.forEach(s => { funnelCounts[s] = 0; });
  leads.forEach(l => { if (funnelCounts[l.f] !== undefined) funnelCounts[l.f]++; });
  const maxFunnel = Math.max(1, ...Object.values(funnelCounts));

  let html = '';

  // Month tabs
  html += '<div class="month-tabs">';
  MONTHS.forEach((m, i) => {
    html += `<button class="month-tab ${m === APP.currentMonth ? 'active' : ''}" data-month="${m}">${MONTH_LABELS[i]}</button>`;
  });
  html += '</div>';

  // Summary stats — ocultar costos si no tiene permiso de ROAS
  const isVentas = !tengoPermiso('comercial', 'roas', 'consulta');
  html += '<div class="stats-grid stats-grid-pipeline">';
  html += `<div class="stat-card"><div class="label">Total Leads</div><div class="value navy">${totalLeads}</div></div>`;
  if (!isVentas) html += `<div class="stat-card"><div class="label">Costo x Lead</div><div class="value amber">${fmtCurrency(Math.round(cpl))}</div></div>`;
  html += `<div class="stat-card"><div class="label">Cierres</div><div class="value green">${cierres}</div></div>`;
  if (!isVentas) html += `<div class="stat-card"><div class="label">Costo Adquisición</div><div class="value amber">${fmtCurrency(Math.round(cpa))}</div></div>`;
  html += `<div class="stat-card"><div class="label">% de Cierre</div><div class="value navy">${fmtPct(pctCierre)}</div></div>`;
  html += '</div>';
  if (!isVentas) {
    html += '<div class="stats-grid stats-grid-pipeline">';
    html += `<div class="stat-card"><div class="label">Total Cotizado</div><div class="value blue">${fmtCurrency(totalCotizado)}</div></div>`;
    html += `<div class="stat-card"><div class="label">Total Vendido</div><div class="value green">${fmtCurrency(Math.round(totalVendido))}</div></div>`;
    html += `<div class="stat-card"><div class="label">Invertido</div><div class="value amber">${fmtCurrency(invertido)}</div></div>`;
    html += `<div class="stat-card"><div class="label">Ganancia</div><div class="value ${ganancia >= 0 ? 'green' : 'red'}">${fmtCurrency(Math.round(ganancia))}</div></div>`;
    html += `<div class="stat-card"><div class="label">ROAS</div><div class="value blue">${roasVal.toFixed(2)}x</div></div>`;
    html += '</div>';
  }

  // Funnel
  if (totalLeads > 0) {
    html += '<div class="card"><h3 style="font-size:0.9rem;margin-bottom:12px;">Embudo de Ventas</h3>';
    FUNNEL_STEPS.forEach(step => {
      const count = funnelCounts[step];
      const pct = (count / maxFunnel * 100);
      html += `<div class="funnel-bar">
        <div class="funnel-label">${step}</div>
        <div class="funnel-track">
          <div class="funnel-fill" style="width:${Math.max(pct, count > 0 ? 8 : 0)}%;background:${FUNNEL_COLORS[step]}">${count > 0 ? count : ''}</div>
        </div>
        <div class="funnel-count">${count}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Filters
  html += '<div class="filter-bar">';
  html += `<input type="text" id="search-lead" placeholder="Buscar por nombre..." value="${esc(APP.searchText)}" style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.85rem;width:200px;">`;
  html += '<label>Paso:</label><select id="filter-step"><option value="Todos">Todos</option>';
  FUNNEL_STEPS.forEach(s => { html += `<option value="${s}" ${APP.filterStep === s ? 'selected' : ''}>${s}</option>`; });
  html += '</select>';
  html += '<label>Temperatura:</label><select id="filter-temp"><option value="Todos">Todos</option>';
  TEMPS.forEach(t => { html += `<option value="${t}" ${APP.filterTemp === t ? 'selected' : ''}>${TEMP_DISPLAY[t]}</option>`; });
  html += '</select>';
  html += '</div>';

  // Add lead button + form (arriba de la tabla)
  html += `<button class="btn-add" id="btn-add-lead" style="margin-bottom:12px;">+ Agregar Lead</button>`;
  if (APP.addingLead) {
    html += renderAddLeadForm();
  }

  // Table
  if (filtered.length > 0) {
    html += '<div class="card"><div class="table-wrapper"><table>';
    html += '<thead><tr><th>#</th><th>Nombre</th><th>RNC</th><th>Empresa</th><th>Resp</th><th>Temp</th><th>Demo</th><th>Funnel</th><th>Impl</th><th>FE</th><th>Serv</th><th>Soft</th>';
    if (!isVentas) html += '<th>Cotizado</th><th>Desc%</th><th>Vendido</th>';
    html += '<th>Notas</th><th>Categoria</th><th style="text-align:center">Recordatorio</th></tr></thead>';
    html += '<tbody>';
    filtered.forEach((lead, idx) => {
      const realIdx = leads.indexOf(lead);
      const isExpanded = APP.expandedRow === realIdx;
      const isGanado = lead.f === 'Cerrado Ganado';
      var descVals = [lead.desc_impl||0, lead.desc_fe||0, lead.desc_serv||0, lead.desc_soft||0];
      var descNonZero = descVals.filter(function(d){return d > 0;});
      var descAvg = descNonZero.length > 0 ? Math.round(descNonZero.reduce(function(a,b){return a+b;},0) / descNonZero.length) : 0;
      const vendido = isGanado ? leadVendido(lead, includeSoft) : 0;
      html += `<tr class="${isExpanded ? 'expanded' : ''}${isGanado ? ' ganado-row' : ''}" data-idx="${realIdx}" style="cursor:pointer;${isGanado ? 'background:#ecfdf5;' : ''}">
        <td>${idx + 1}</td>
        <td><strong>${lead.n}</strong></td>
        <td style="font-size:0.78rem;color:var(--muted)">${lead.rnc || ''}</td>
        <td>${lead.e || lead.t}</td>
        <td><span style="font-size:0.72rem;font-weight:600;color:${lead.resp === 'Naomi' ? '#8b5cf6' : lead.resp === 'Felix' ? '#4361ee' : 'var(--muted)'}">${lead.resp || '—'}</span></td>
        <td><span class="badge ${tempBadgeClass(lead.temp)}">${TEMP_DISPLAY[lead.temp]}</span></td>
        <td>${lead.demo ? lead.demo.substring(5) : '-'}</td>
        <td><span class="badge ${badgeClass(lead.f)}">${lead.f}</span></td>
        <td class="currency">${fmt(lead.impl)}</td>
        <td class="currency">${fmt(lead.fe)}</td>
        <td class="currency">${fmt(lead.serv)}</td>
        <td class="currency">${fmt(lead.soft)}</td>
        ${!isVentas ? `<td class="currency"><strong>${fmt(leadTotal(lead))}</strong></td>
        <td>${isGanado ? descAvg + '%' : '-'}</td>
        <td class="currency">${isGanado ? '<strong>' + fmt(Math.round(vendido)) + '</strong>' : '-'}</td>` : ''}
        <td>${lead.notas}</td>
        <td>${renderCatBadges(lead.categoria)}</td>
        <td style="text-align:center">${lead._id ? `<button onclick="segBell(${lead._id},event)" title="${segBellTitle(lead._id)}" style="border:1px solid var(--border);background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer;font-size:0.9rem;line-height:1;${segIsScheduled(lead._id)?'':'opacity:0.5'}">🔔</button>` : ''}</td>
      </tr>`;
      if (isExpanded) {
        html += renderEditRow(lead, realIdx);
      }
    });
    html += '</tbody></table></div></div>';
  } else if (!APP.addingLead) {
    html += '<div class="empty-state">Sin datos para este mes.</div>';
  }

  container.innerHTML = html;
  bindPipelineEvents();
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}

function bindPipelineEvents() {
  // Month tabs
  document.querySelectorAll('.month-tab').forEach(tab => {
    tab.onclick = () => {
      APP.currentMonth = tab.dataset.month;
      APP.expandedRow = -1;
      APP.addingLead = false;
      renderPipeline();
    };
  });

  // Search + Filters
  const searchInput = document.getElementById('search-lead');
  if (searchInput) searchInput.oninput = () => { APP.searchText = searchInput.value; renderPipeline(); setTimeout(() => { const el = document.getElementById('search-lead'); if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; } }, 0); };
  const filterTemp = document.getElementById('filter-temp');
  const filterStep = document.getElementById('filter-step');
  if (filterTemp) filterTemp.onchange = () => { APP.filterTemp = filterTemp.value; renderPipeline(); };
  if (filterStep) filterStep.onchange = () => { APP.filterStep = filterStep.value; renderPipeline(); };

  // Row click to expand
  document.querySelectorAll('tr[data-idx]').forEach(row => {
    row.onclick = (e) => {
      if (e.target.closest('.edit-row') || e.target.closest('.edit-actions')) return;
      const idx = parseInt(row.dataset.idx);
      APP.expandedRow = APP.expandedRow === idx ? -1 : idx;
      APP.addingLead = false;
      renderPipeline();
    };
  });

  // Edit actions
  document.querySelectorAll('[data-action="save"]').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      const editRow = btn.closest('.edit-row');
      const lead = APP.data.pipeline[APP.currentMonth][idx];
      lead._prevFunnel = lead.f; // Guardar estado anterior para detectar cierre
      editRow.querySelectorAll('[data-field]').forEach(input => {
        const field = input.dataset.field;
        const val = input.value;
        if (['impl','fe','serv','soft','desc_impl','desc_fe','desc_serv','desc_soft'].includes(field)) {
          lead[field] = parseFloat(val) || 0;
        } else {
          lead[field] = val;
        }
      });
      // Recoger categorías de checkboxes
      const checkedCats = [];
      editRow.querySelectorAll('[data-cat]').forEach(cb => { if (cb.checked) checkedCats.push(cb.dataset.cat); });
      lead.categoria = checkedCats.join(',');
      // Si la fecha demo apunta a otro mes, mover el lead
      if (lead.demo) {
        var demoDate = new Date(lead.demo + 'T00:00:00');
        var demoMes = MONTHS[demoDate.getMonth()];
        if (demoMes && demoMes !== APP.currentMonth && demoDate.getFullYear() === ANIO) {
          // Mover: quitar del mes actual, agregar al mes destino, actualizar mes en Supabase
          APP.data.pipeline[APP.currentMonth].splice(idx, 1);
          if (!APP.data.pipeline[demoMes]) APP.data.pipeline[demoMes] = [];
          APP.data.pipeline[demoMes].push(lead);
          await sb.from('leads').update({ mes: demoMes }).eq('id', lead._id);
        }
      }
      await dbUpdateLead(lead); // Guardar en Supabase
      syncRoasFromPipeline();
      APP.expandedRow = -1;
      renderPipeline();
    };
  });

  document.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      if (confirm('Eliminar este lead?')) {
        const lead = APP.data.pipeline[APP.currentMonth][idx];
        var ok = await dbDeleteLead(lead);
        if (!ok) { alert('No se pudo eliminar el lead. Intenta de nuevo.'); return; }
        APP.data.pipeline[APP.currentMonth].splice(idx, 1);
        syncRoasFromPipeline();
        APP.expandedRow = -1;
        renderPipeline();
      }
    };
  });

  document.querySelectorAll('[data-action="cancel"]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      APP.expandedRow = -1;
      renderPipeline();
    };
  });

  // Add lead
  const btnAdd = document.getElementById('btn-add-lead');
  if (btnAdd) btnAdd.onclick = () => { APP.addingLead = true; APP.expandedRow = -1; renderPipeline(); };

  const btnSaveNew = document.getElementById('btn-save-new');
  if (btnSaveNew) {
    btnSaveNew.onclick = async () => {
      const form = document.getElementById('add-lead-form');
      const newLead = {};
      form.querySelectorAll('[data-field]').forEach(input => {
        const field = input.dataset.field;
        const val = input.value;
        if (['impl','fe','serv','soft','desc_impl','desc_fe','desc_serv','desc_soft'].includes(field)) {
          newLead[field] = parseFloat(val) || 0;
        } else {
          newLead[field] = val;
        }
      });
      // Recoger categorías de checkboxes
      const checkedCats = [];
      form.querySelectorAll('[data-cat]').forEach(cb => { if (cb.checked) checkedCats.push(cb.dataset.cat); });
      newLead.categoria = checkedCats.join(',');
      if (!newLead.n || !newLead.n.trim()) { alert('El nombre es obligatorio.'); return; }
      // Derivar mes de la fecha demo si existe, sino usar mes actual
      var targetMonth = APP.currentMonth;
      if (newLead.demo) {
        var demoDate = new Date(newLead.demo + 'T00:00:00');
        var demoMes = MONTHS[demoDate.getMonth()];
        if (demoMes && demoDate.getFullYear() === ANIO) targetMonth = demoMes;
      }
      // Insertar en Supabase y obtener ID antes de agregar al array
      const newId = await dbInsertLead(targetMonth, newLead);
      if (newId) newLead._id = newId;
      if (!APP.data.pipeline[targetMonth]) APP.data.pipeline[targetMonth] = [];
      APP.data.pipeline[targetMonth].push(newLead);
      syncRoasFromPipeline();
      APP.addingLead = false;
      renderPipeline();
    };
  }

  const btnCancelNew = document.getElementById('btn-cancel-new');
  if (btnCancelNew) btnCancelNew.onclick = () => { APP.addingLead = false; renderPipeline(); };
}

// ==================== ROAS COMPONENTS ====================

function renderROAS() {
  const container = document.getElementById('tab-roas');
  const roas = APP.data.roas;

  // Only months with data
  const activeMonths = MONTHS.filter(m => roas[m] && roas[m].leads > 0);

  // General totals across all active months
  const totLeads = activeMonths.reduce((s,m) => s + roas[m].leads, 0);
  const totPresupuesto = activeMonths.reduce((s,m) => s + roas[m].presupuesto, 0);
  const totEjecutado = activeMonths.reduce((s,m) => s + roas[m].ejecutado, 0);
  const totCierres = activeMonths.reduce((s,m) => s + roas[m].cierres, 0);
  const totVendido = activeMonths.reduce((s,m) => s + roas[m].vendido, 0);
  const totCpl = totLeads > 0 ? totEjecutado / totLeads : 0;
  const totPctCierre = totLeads > 0 ? (totCierres / totLeads * 100) : 0;
  const totCpa = totCierres > 0 ? totEjecutado / totCierres : 0;
  const totRetorno = totVendido - totEjecutado;
  const totRoas = totEjecutado > 0 ? totVendido / totEjecutado : 0;

  let html = '';

  const isVentas = !tengoPermiso('comercial', 'roas', 'consulta');

  // General summary cards
  if (activeMonths.length > 0) {
    html += '<h3 style="font-size:1rem;margin-bottom:12px;">Resumen General ' + ANIO + '</h3>';
    if (isVentas) {
      // Ventas solo ve: Leads, Cierres, % de Cierre
      html += '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">';
      html += `<div class="stat-card"><div class="label">Leads</div><div class="value navy">${fmt(totLeads)}</div></div>`;
      html += `<div class="stat-card"><div class="label">Cierres</div><div class="value green">${fmt(totCierres)}</div></div>`;
      html += `<div class="stat-card"><div class="label">% de Cierre</div><div class="value green">${fmtPct(totPctCierre)}</div></div>`;
      html += '</div>';
    } else {
      // Admin ve todo
      html += '<div class="stats-grid" style="grid-template-columns:repeat(5,1fr);">';
      html += `<div class="stat-card"><div class="label">Leads</div><div class="value navy">${fmt(totLeads)}</div></div>`;
      html += `<div class="stat-card"><div class="label">CPL</div><div class="value amber">${fmtCurrency(Math.round(totCpl * 100) / 100)}</div></div>`;

      const cpa = d.cierres > 0 ? d.ejecutado / d.cierres : 0;
      const retorno = d.vendido - d.ejecutado;
      const roasVal = d.ejecutado > 0 ? d.vendido / d.ejecutado : 0;

      html += '<tr>';

      } else {

      }

      const isEditingEjec = APP.editingRoas && APP.editingRoas.month === m && APP.editingRoas.field === 'ejecutado';

        html += `<td><input class="inline-edit" type="number" data-roas-month="${m}" data-roas-field="ejecutado" value="${d.ejecutado}" autofocus></td>`;
      } else {
        html += `<td class="editable" data-roas-month="${m}" data-roas-field="ejecutado">${fmtCurrency(d.ejecutado)}</td>`;

      html += `<td>${fmtCurrency(Math.round(cpl * 100) / 100)}</td>`;
      html += `<td>${fmt(d.cierres)}</td>`;

      html += `<td>${fmtCurrency(d.vendido)}</td>`;
      html += `<td>${fmtCurrency(Math.round(cpa * 100) / 100)}</td>`;
      html += `<td>${fmtCurrency(Math.round(retorno))}</td>`;
      html += `<td>${roasVal.toFixed(2)}x</td>`;
      html += `<td><button class="roas-save-btn" data-roas-save="${m}">Guardar</button></td>`;
      html += '</tr>';
    });

    html += '<tr style="font-weight:700;border-top:2px solid var(--navy);">';
    html += '<td>Total</td>';
    html += `<td>${fmt(totLeads)}</td>`;
    html += `<td>${fmtCurrency(totPresupuesto)}</td>`;
    html += `<td>${fmtCurrency(totEjecutado)}</td>`;
    html += `<td>${fmtCurrency(Math.round(totCpl * 100) / 100)}</td>`;
    html += `<td>${fmt(totCierres)}</td>`;

    html += `<td>${fmtCurrency(totVendido)}</td>`;
    html += `<td>${fmtCurrency(Math.round(totCpa * 100) / 100)}</td>`;
    html += `<td>${fmtCurrency(Math.round(totRetorno))}</td>`;
    html += `<td>${totRoas.toFixed(2)}x</td>`;
    html += '<td></td>';
    html += '</tr>';

    html += '</tbody></table></div></div>';
  }

  container.innerHTML = html;
  bindROASEvents();
  renderCharts();
}

function bindROASEvents() {
  // Click to edit ROAS cells
  document.querySelectorAll('.roas-table .editable').forEach(cell => {
    cell.onclick = () => {
      APP.editingRoas = { month: cell.dataset.roasMonth, field: cell.dataset.roasField };
      renderROAS();
      const input = document.querySelector('.inline-edit');
      if (input) { input.focus(); input.select(); }
    };
  });

  // Confirmar valor al salir del campo o presionar Enter (solo guarda en memoria local)
  document.querySelectorAll('.inline-edit').forEach(input => {
    const confirm = () => {
      const m = input.dataset.roasMonth;
      const field = input.dataset.roasField;
      APP.data.roas[m][field] = parseFloat(input.value) || 0;
      // Recalcular derivados locales
      const d = APP.data.roas[m];
      const leads = APP.data.pipeline[m] || [];
      const ganados = leads.filter(l => l.f === 'Cerrado Ganado');
      const ejec = d.ejecutado || 0;
      d.cpa = ganados.length > 0 ? Math.round(ejec / ganados.length * 100) / 100 : 0;
      const totalVendido = d.vendido || 0;
      d.retorno = Math.round((totalVendido - ejec) * 100) / 100;
      d.roas = ejec > 0 ? Math.round(totalVendido / ejec * 100) / 100 : 0;
      APP.editingRoas = null;
      renderROAS();
    };
    input.onblur = confirm;
    input.onkeydown = (e) => {
      if (e.key === 'Enter') confirm();
      if (e.key === 'Escape') { APP.editingRoas = null; renderROAS(); }
    };
  });

  // Botón Guardar por fila — graba en Supabase
  document.querySelectorAll('.roas-save-btn').forEach(btn => {
    btn.onclick = async () => {
      const m = btn.dataset.roasSave;
      const r = APP.data.roas[m];
      btn.textContent = 'Guardando...';
      btn.disabled = true;
      try {
        await dbUpdateRoas(m, r);
        btn.textContent = 'Guardado';
        btn.classList.add('saved');
        setTimeout(() => { btn.textContent = 'Guardar'; btn.classList.remove('saved'); btn.disabled = false; }, 2000);
      } catch (err) {
        console.error('Error guardando ROAS:', err);
        btn.textContent = 'Error';
        btn.style.background = 'var(--red)';
        setTimeout(() => { btn.textContent = 'Guardar'; btn.style.background = ''; btn.disabled = false; }, 2000);
      }
    };
  });
}

    responsive: true,

    plugins: { legend: { position: 'bottom', labels: { font: { size: 12 } } } },

  // 2. % de Cierre

    APP.charts.pctCierre = new Chart(ctx2, {

function chkIsDone(data, itemId) {
  var v = data[itemId];
  if (!v) return false;
  if (typeof v === 'object') return !!v.done;
  return !!v; // backward compat: old format was just true/false
}
function chkGetNota(data, itemId) {
  var v = data[itemId];
  if (v && typeof v === 'object') return v.nota || '';
  return '';
}
function chkGetFecha(data, itemId) {
  var v = data[itemId];
  if (v && typeof v === 'object') return v.fecha || '';
  return '';
}
function chkFormatDate(isoStr) {
  if (!isoStr) return '';
  var parts = isoStr.split('-');
  return parts[2] + '/' + parts[1];
}

function chkGetProgress(row) {
  var data = row.data || {};
  var total = CHK_ITEMS.length;
  var done = 0;
  CHK_ITEMS.forEach(function(item) {
    if (chkIsDone(data, item.id)) done++;
  });
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  return { done: done, total: total, pct: pct };
}

async function loadChecklistComercial() {
  var { data, error } = await sb.from('checklist_comercial').select('*').eq('anio', ANIO);
  if (error) { console.error('Error cargando checklist comercial:', error); return; }
  APP.chkData = data || [];
}

async function saveChecklistComercial(id, newData) {
  var { error } = await sb.from('checklist_comercial').update({ data: newData }).eq('id', id);
  if (error) { console.error('Error guardando checklist comercial:', error); return false; }
  // Actualizar local
  var row = APP.chkData.find(r => r.id === id);
  if (row) row.data = newData;
  return true;
}

async function createChecklistComercial(leadId, cliente, empresa, responsable, mes) {
  var payload = {
    lead_id: leadId || null,
    cliente: cliente,
    empresa: empresa || '',
    responsable: responsable,
    mes: mes,
    anio: ANIO,
    data: {}
  };
  // Si es lead cerrado, marcar el primer item con fecha
  if (leadId) payload.data = { lead_cerrado: { done: true, fecha: new Date().toISOString().slice(0,10), nota: '' } };
  var { data, error } = await sb.from('checklist_comercial').insert(payload).select();
  if (error) { console.error('Error creando checklist comercial:', error); return null; }
  if (data && data[0]) {
    APP.chkData.push(data[0]);
    return data[0];
  }
  return null;
}

function chkCollectNotas(container, row) {
  if (!row.data) row.data = {};
  container.querySelectorAll('.chk-nota-input').forEach(input => {
    var itemId = input.dataset.chkNota;
    var nota = input.value.trim();
    var prev = row.data[itemId];
    if (prev && typeof prev === 'object') {
      prev.nota = nota;
    } else {
      // Migrar formato viejo
      row.data[itemId] = { done: !!prev, fecha: '', nota: nota };
    }
  });
}

    btn.disabled = false;
    setTimeout(() => { btn.textContent = 'Guardar cambios'; }, 1500);
  };

  document.getElementById('chk-btn-delete').onclick = async () => {
    if (!confirm('¿Eliminar este checklist? Si tiene un lead asociado, volverá a "Seguimiento".')) return;
    // Si tiene lead_id, revertir el lead a Seguimiento
    if (row.lead_id) {
      await sb.from('leads').update({ funnel: 'Seguimiento' }).eq('id', row.lead_id);
      // Actualizar local
      Object.keys(APP.data.pipeline).forEach(mes => {
        var lead = APP.data.pipeline[mes].find(l => l._id === row.lead_id);
        if (lead) lead.f = 'Seguimiento';
      });
    }
    // Eliminar checklist
    await sb.from('checklist_comercial').delete().eq('id', row.id);
    APP.chkData = APP.chkData.filter(r => r.id !== row.id);
    APP.chkSelected = null;
    renderChecklistComercial();
  };
}

function chkDetectResponsable() {
  var name = (APP.userName || '').toLowerCase();
  for (var i = 0; i < CHK_PERSONAS.length; i++) {
    if (name.indexOf(CHK_PERSONAS[i].toLowerCase()) >= 0) return CHK_PERSONAS[i];
  }
  return CHK_PERSONAS[0]; // fallback
}

function showCrearChecklistModal() {
  var cliente = prompt('Nombre del cliente:');
  if (!cliente) return;
  var empresa = prompt('Empresa (opcional):', '');
  var defaultResp = chkDetectResponsable();
  var responsable = prompt('Responsable (Felix o Naomi):', defaultResp);
  if (!responsable || CHK_PERSONAS.indexOf(responsable) < 0) {
    if (responsable && responsable.toLowerCase() === 'naomi') responsable = 'Naomi';
    else if (responsable && responsable.toLowerCase() === 'felix') responsable = 'Felix';
    else responsable = defaultResp;
  }
  createChecklistComercial(null, cliente, empresa || '', responsable, APP.chkMonth).then(row => {
    if (row) renderChecklistComercial();
  });
}
